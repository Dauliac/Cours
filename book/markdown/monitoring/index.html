<header>Monitoring &amp; Observability Course</header>
<h2 id="monitoring-vs-observability">Monitoring vs Observability</h2>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="5" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="monitoring">Monitoring</h3>
<blockquote>
<p>Monitoring tells you <strong>when</strong> something is wrong.</p>
</blockquote>
<ul>
<li>Predefined dashboards and alerts</li>
<li>Known-unknowns: you know what to watch</li>
<li>Reactive: fires alerts after thresholds are breached</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="6" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="observability">Observability</h3>
<blockquote>
<p>Observability tells you <strong>why</strong> something is wrong.</p>
</blockquote>
<ul>
<li>Explore any dimension of your system on the fly</li>
<li>Unknown-unknowns: you can ask new questions without deploying new code</li>
<li>Proactive: enables debugging without prior instrumentation for every case</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="9" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="you-always-need-observability">You Always Need Observability</h3>
<p>A common misconception is that simple systems only need monitoring. In reality, <strong>every production system benefits from observability</strong> -- the difference is the depth required.</p>
<table>
<thead>
<tr>
<th>System type</th>
<th>Observability depth</th>
<th>Why</th>
</tr>
</thead>
<tbody>
<tr>
<td>Monolith, single DB</td>
<td>Logs + metrics + basic traces</td>
<td>Even monoliths have slow queries, memory leaks, and unexpected user behavior. &quot;Few moving parts&quot; doesn't mean &quot;no unknowns&quot;.</td>
</tr>
<tr>
<td>Microservices</td>
<td>Full stack (logs, metrics, traces, profiling)</td>
<td>Requests fan out, failures cascade, latency compounds across hops</td>
</tr>
<tr>
<td>Event-driven / async</td>
<td>Full stack + message tracing</td>
<td>No single request path to follow, messages can be lost or reprocessed silently</td>
</tr>
<tr>
<td>Serverless / FaaS</td>
<td>Full stack + cold start tracking</td>
<td>Ephemeral, distributed, cold starts, vendor-specific failure modes</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>The question is never &quot;do I need observability?&quot; -- it's &quot;how deep does my observability need to go?&quot;</strong> A monolith that handles payments needs the same rigor as a microservices platform. The architecture doesn't determine the need; the <strong>business criticality</strong> does.</p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="14" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="what-makes-a-good-log">What Makes a Good Log?</h2>
<p>A good log is:</p>
<ol>
<li><strong>Structured</strong>: machine-parseable (JSON, not free text)</li>
<li><strong>Contextual</strong>: carries correlation IDs, user IDs, request IDs</li>
<li><strong>Leveled</strong>: uses the right severity</li>
<li><strong>Actionable</strong>: helps a human or machine take the next step</li>
<li><strong>Safe</strong>: never leaks secrets, PII, or tokens</li>
</ol>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

<header>Monitoring &amp; Observability Course</header>
<h3 id="log-levels-use-them-right">Log Levels: Use Them Right</h3>
<table>
<thead>
<tr>
<th>Level</th>
<th>When to use</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>TRACE</code></td>
<td>Framework internals, never in prod</td>
<td><code>Entering parser state HEADER_VALUE</code></td>
</tr>
<tr>
<td><code>DEBUG</code></td>
<td>Developer troubleshooting</td>
<td><code>Cache miss for key user:42</code></td>
</tr>
<tr>
<td><code>INFO</code></td>
<td>Normal business events</td>
<td><code>Order 123 created, 3 items, total=59.90</code></td>
</tr>
<tr>
<td><code>WARN</code></td>
<td>Degraded but recoverable</td>
<td><code>Retry 2/3 for payment gateway timeout</code></td>
</tr>
<tr>
<td><code>ERROR</code></td>
<td>Failed operation, needs attention</td>
<td><code>Payment failed: card declined, orderId=123</code></td>
</tr>
<tr>
<td><code>FATAL</code></td>
<td>Process cannot continue</td>
<td><code>Database connection pool exhausted, shutting down</code></td>
</tr>
</tbody>
</table>

<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="18" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="structured-vs-unstructured">Structured vs Unstructured</h3>
<p><strong>Bad</strong> (unstructured):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>2024-03-15 10:23:45 ERROR Failed to process order 42 for user john@example.com
</code></pre>
<p>Problems: hard to parse, contains PII (email), no correlation ID, no stack trace.</p>
<p><strong>Good</strong> (structured JSON):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;timestamp&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;2024-03-15T10:23:45.123Z&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;level&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;ERROR&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;logger&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;com.app.OrderService&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;message&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Order processing failed&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;correlationId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;abc-123-def&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;orderId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">42</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;userId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;usr_k8x2p&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;error&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;PaymentDeclinedException&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;message&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Card declined by issuer&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;code&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;CARD_DECLINED&quot;</span>
  <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;spanId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;7a3f2b1c&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;traceId&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;4bf92f3577b34da6a3ce929d0e0e4736&quot;</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="19" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="how-to-write-good-errors">How to Write Good Errors</h2>
<blockquote>
<p>An error message should answer: <strong>What happened, why, and what can the user/operator do about it?</strong></p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="20" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="why-this-matters-the-alert-fatigue-death-spiral">Why This Matters: The Alert Fatigue Death Spiral</h3>
<p>Bad error messages are not just annoying -- they <strong>directly cause incidents</strong>. Here's the mechanism:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    BAD[&quot;Bad error messages&lt;br/&gt;&lt;i&gt;'Error', 'Something went wrong',&lt;br/&gt;'null', 'undefined'&lt;/i&gt;&quot;] --&gt; NOISE[&quot;Alerts fire but carry&lt;br/&gt;no useful context&quot;]
    NOISE --&gt; IGNORE[&quot;On-call learns to&lt;br/&gt;ignore alerts&lt;br/&gt;&lt;i&gt;(alert fatigue)&lt;/i&gt;&quot;]
    IGNORE --&gt; MISS[&quot;Real incident fires&lt;br/&gt;same noisy alert&quot;]
    MISS --&gt; OUTAGE[&quot;Outage goes unnoticed&lt;br/&gt;until users complain&quot;]
    OUTAGE --&gt; TRUST[&quot;Team loses trust&lt;br/&gt;in monitoring&quot;]
    TRUST --&gt; LESS[&quot;Less investment&lt;br/&gt;in observability&quot;]
    LESS --&gt; BAD

    style BAD fill:#e09b96
    style OUTAGE fill:#e09b96
</code></pre>
<p><strong>Alert fatigue</strong> is the #1 killer of on-call effectiveness. Studies show that when more than 30% of alerts are non-actionable, engineers start ignoring <strong>all</strong> alerts -- including the real ones.</p>
<p>The fix starts at the source: <strong>every error message must be clear enough that the person reading it at 3 AM knows exactly what to do.</strong> If your error says <code>&quot;Error&quot;</code>, the on-call engineer has to investigate from scratch every time. If it says <code>&quot;Payment gateway timeout after 5s, circuit breaker open, check stripe status page&quot;</code>, they know what to do in seconds.</p>
<table>
<thead>
<tr>
<th>Error quality</th>
<th>On-call experience</th>
<th>Result</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>&quot;Error&quot;</code></td>
<td>Investigate 20 min, find nothing, dismiss</td>
<td>Alert fatigue builds</td>
</tr>
<tr>
<td><code>&quot;Connection refused&quot;</code></td>
<td>Investigate 10 min, narrow it down</td>
<td>Slow but works</td>
</tr>
<tr>
<td><code>&quot;DB 'orders' at db.internal:5432 connection refused: pool exhausted (20/20), all busy &gt;30s. Scale pool or check slow queries.&quot;</code></td>
<td>Read, act, resolve in 2 min</td>
<td>Trust in alerts grows</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>Good errors reduce mean time to recovery (MTTR). Bad errors increase mean time to acknowledge (MTTA) -- because nobody wants to look at them anymore.</strong></p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="21" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="the-three-laws-of-error-messages">The Three Laws of Error Messages</h3>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="22" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<p><strong>1. State what happened (fact)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>BAD:  &quot;Error&quot;
BAD:  &quot;Something went wrong&quot;
GOOD: &quot;Failed to connect to database 'orders' at db.internal:5432&quot;
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="23" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<p><strong>2. Explain why (context)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>BAD:  &quot;Connection refused&quot;
GOOD: &quot;Connection refused: max pool size (20) reached, all connections busy for &gt;30s&quot;
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="24" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<p><strong>3. Suggest what to do (action)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>BAD:  &quot;Timeout&quot;
GOOD: &quot;Request to payment-service timed out after 5s. Check payment-service health at /healthz or increase timeout via PAYMENT_TIMEOUT_MS&quot;
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="25" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="error-anatomy">Error Anatomy</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    E[Error] --&gt; W[What]
    E --&gt; Y[Why]
    E --&gt; A[Action]
    W --&gt; W1[&quot;'Failed to write to disk'&quot;]
    Y --&gt; Y1[&quot;'Disk /data is 100% full'&quot;]
    A --&gt; A1[&quot;'Free space or increase volume size'&quot;]
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="26" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="27" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="error-patterns-by-audience">Error Patterns by Audience</h3>
<table>
<thead>
<tr>
<th>Audience</th>
<th>What they need</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td>End user</td>
<td>Friendly, no internals</td>
<td><code>&quot;We couldn't process your payment. Please try again or use a different card.&quot;</code></td>
</tr>
<tr>
<td>API consumer</td>
<td>Machine-readable, error code</td>
<td><code>{&quot;error&quot;: &quot;INSUFFICIENT_FUNDS&quot;, &quot;message&quot;: &quot;...&quot;, &quot;retryable&quot;: false}</code></td>
</tr>
<tr>
<td>Operator / SRE</td>
<td>Full context, correlation IDs</td>
<td><code>&quot;PaymentGateway.charge failed: HTTP 503 from stripe.com, traceId=abc, retry 3/3 exhausted&quot;</code></td>
</tr>
<tr>
<td>Developer</td>
<td>Stack trace, local state</td>
<td>Full exception with stack trace in DEBUG logs</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="28" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="error-anti-patterns">Error Anti-patterns</h3>
<ul>
<li><strong>Swallowing exceptions</strong>: catching errors and doing nothing</li>
<li><strong>Logging and throwing</strong>: creates duplicate noise</li>
<li><strong>Generic messages</strong>: <code>&quot;An error occurred&quot;</code> tells nobody anything</li>
<li><strong>Leaking internals to users</strong>: stack traces in API responses</li>
<li><strong>Missing error codes</strong>: forces consumers to parse human text</li>
<li><strong>Not distinguishing retryable vs permanent failures</strong></li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="29" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="rust-error-handling-done-right">Rust: Error Handling Done Right</h3>
<p>Rust takes a radically different approach to errors: <strong>no exceptions</strong>. Every fallible function returns <code>Result&lt;T, E&gt;</code> where <code>T</code> is the success type and <code>E</code> is an error enum. This makes errors <strong>explicit, typed, and exhaustively handled</strong> at compile time.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Result&amp;lt;T, E&amp;gt;&quot;
        R[&quot;Result&quot;] --&gt; OK[&quot;Ok(T)&lt;br/&gt;&lt;i&gt;Success value&lt;/i&gt;&quot;]
        R --&gt; ERR[&quot;Err(E)&lt;br/&gt;&lt;i&gt;Error value&lt;/i&gt;&quot;]
    end

    subgraph &quot;Error Enum (E)&quot;
        ERR --&gt; V1[&quot;Variant: NotFound&quot;]
        ERR --&gt; V2[&quot;Variant: Timeout(Duration)&quot;]
        ERR --&gt; V3[&quot;Variant: DatabaseError(sqlx::Error)&quot;]
        ERR --&gt; V4[&quot;Variant: InvalidInput(String)&quot;]
    end

    subgraph &quot;Compiler Guarantees&quot;
        V1 --&gt; CG[&quot;Match must be exhaustive&lt;br/&gt;Every variant handled&lt;br/&gt;or code won't compile&quot;]
    end
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="30" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h4 id="the-resultt-e-pattern">The <code>Result&lt;T, E&gt;</code> Pattern</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rust"><span class="hljs-comment">// Every error variant is an explicit, documented possibility</span>
<span class="hljs-keyword">enum</span> <span class="hljs-title class_">OrderError</span> {
    <span class="hljs-title function_ invoke__">NotFound</span>(OrderId),
    PaymentDeclined { reason: <span class="hljs-type">String</span>, retryable: <span class="hljs-type">bool</span> },
    InsufficientStock { product_id: <span class="hljs-type">u64</span>, available: <span class="hljs-type">u32</span>, requested: <span class="hljs-type">u32</span> },
    <span class="hljs-title function_ invoke__">DatabaseError</span>(sqlx::Error),
    Timeout { service: <span class="hljs-type">String</span>, duration: std::time::Duration },
}

<span class="hljs-comment">// The function signature tells you EXACTLY what can go wrong</span>
<span class="hljs-keyword">fn</span> <span class="hljs-title function_">create_order</span>(request: CreateOrderRequest) <span class="hljs-punctuation">-&gt;</span> <span class="hljs-type">Result</span>&lt;Order, OrderError&gt; {
    <span class="hljs-keyword">let</span> <span class="hljs-variable">stock</span> = <span class="hljs-title function_ invoke__">check_stock</span>(&amp;request.items)
        .<span class="hljs-title function_ invoke__">map_err</span>(|e| OrderError::InsufficientStock {
            product_id: e.product_id,
            available: e.available,
            requested: e.requested,
        })?;  <span class="hljs-comment">// ? propagates errors up the call chain</span>

    <span class="hljs-keyword">let</span> <span class="hljs-variable">payment</span> = <span class="hljs-title function_ invoke__">charge_card</span>(&amp;request.payment)
        .<span class="hljs-title function_ invoke__">map_err</span>(|e| OrderError::PaymentDeclined {
            reason: e.<span class="hljs-title function_ invoke__">to_string</span>(),
            retryable: e.<span class="hljs-title function_ invoke__">is_retryable</span>(),
        })?;

    <span class="hljs-title function_ invoke__">Ok</span>(Order::<span class="hljs-title function_ invoke__">new</span>(stock, payment))
}
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="31" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h4 id="exhaustive-matching-the-compiler-as-safety-net">Exhaustive Matching: The Compiler as Safety Net</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rust"><span class="hljs-comment">// The compiler FORCES you to handle every variant.</span>
<span class="hljs-comment">// Add a new variant? Every match in the codebase must be updated.</span>
<span class="hljs-keyword">fn</span> <span class="hljs-title function_">handle_order_error</span>(err: OrderError) <span class="hljs-punctuation">-&gt;</span> HttpResponse {
    <span class="hljs-keyword">match</span> err {
        OrderError::<span class="hljs-title function_ invoke__">NotFound</span>(id) =&gt;
            HttpResponse::<span class="hljs-title function_ invoke__">not_found</span>(<span class="hljs-built_in">format!</span>(<span class="hljs-string">&quot;Order {id} not found&quot;</span>)),

        OrderError::PaymentDeclined { reason, retryable } =&gt; {
            <span class="hljs-keyword">if</span> retryable {
                HttpResponse::<span class="hljs-title function_ invoke__">service_unavailable</span>(<span class="hljs-string">&quot;Payment failed, please retry&quot;</span>)
            } <span class="hljs-keyword">else</span> {
                HttpResponse::<span class="hljs-title function_ invoke__">bad_request</span>(<span class="hljs-built_in">format!</span>(<span class="hljs-string">&quot;Payment declined: {reason}&quot;</span>))
            }
        }

        OrderError::InsufficientStock { product_id, available, requested } =&gt;
            HttpResponse::<span class="hljs-title function_ invoke__">conflict</span>(
                <span class="hljs-built_in">format!</span>(<span class="hljs-string">&quot;Product {product_id}: {available} available, {requested} requested&quot;</span>)
            ),

        OrderError::<span class="hljs-title function_ invoke__">DatabaseError</span>(e) =&gt; {
            tracing::error!(?e, <span class="hljs-string">&quot;Database error&quot;</span>); <span class="hljs-comment">// log internals</span>
            HttpResponse::<span class="hljs-title function_ invoke__">internal_error</span>(<span class="hljs-string">&quot;Internal error&quot;</span>) <span class="hljs-comment">// hide from user</span>
        }

        OrderError::Timeout { service, duration } =&gt; {
            tracing::warn!(%service, ?duration, <span class="hljs-string">&quot;Service timeout&quot;</span>);
            HttpResponse::<span class="hljs-title function_ invoke__">gateway_timeout</span>(
                <span class="hljs-built_in">format!</span>(<span class="hljs-string">&quot;{service} did not respond within {duration:?}&quot;</span>)
            )
        }
    }
    <span class="hljs-comment">// Try commenting out any arm above: the compiler refuses to build.</span>
}
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="32" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h4 id="thiserror-derive-error-boilerplate-away"><a href="https://docs.rs/thiserror"><code>thiserror</code></a>: Derive Error Boilerplate Away</h4>
<p><a href="https://github.com/dtolnay/thiserror"><code>thiserror</code></a> auto-generates <code>Display</code> and <code>Error</code> trait implementations from your enum, keeping error definitions concise:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rust"><span class="hljs-keyword">use</span> thiserror::Error;

<span class="hljs-meta">#[derive(Debug, Error)]</span>
<span class="hljs-keyword">enum</span> <span class="hljs-title class_">OrderError</span> {
    <span class="hljs-meta">#[error(<span class="hljs-string">&quot;Order {0} not found&quot;</span>)]</span>
    <span class="hljs-title function_ invoke__">NotFound</span>(OrderId),

    <span class="hljs-meta">#[error(<span class="hljs-string">&quot;Payment declined: {reason}&quot;</span>)]</span>
    PaymentDeclined { reason: <span class="hljs-type">String</span>, retryable: <span class="hljs-type">bool</span> },

    <span class="hljs-meta">#[error(<span class="hljs-string">&quot;Insufficient stock for product {product_id}: {available} available, {requested} requested&quot;</span>)]</span>
    InsufficientStock {
        product_id: <span class="hljs-type">u64</span>,
        available: <span class="hljs-type">u32</span>,
        requested: <span class="hljs-type">u32</span>,
    },

    <span class="hljs-meta">#[error(<span class="hljs-string">&quot;Database error&quot;</span>)]</span>
    <span class="hljs-title function_ invoke__">DatabaseError</span>(<span class="hljs-meta">#[from]</span> sqlx::Error),  <span class="hljs-comment">// auto-converts sqlx::Error via From trait</span>

    <span class="hljs-meta">#[error(<span class="hljs-string">&quot;{service} timed out after {duration:?}&quot;</span>)]</span>
    Timeout {
        service: <span class="hljs-type">String</span>,
        duration: std::time::Duration,
    },
}
</code></pre>
<p>The <code>#[from]</code> attribute auto-implements <code>From&lt;sqlx::Error&gt;</code> for <code>OrderError</code>, so <code>?</code> converts automatically.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="33" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h4 id="error-composition-across-layers">Error Composition Across Layers</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Layered Error Enums&quot;
        direction TB
        API[&quot;ApiError&lt;br/&gt;#[error] enum&quot;] --&gt;|&quot;From&quot;| SVC[&quot;ServiceError&lt;br/&gt;#[error] enum&quot;]
        SVC --&gt;|&quot;From&quot;| REPO[&quot;RepositoryError&lt;br/&gt;#[error] enum&quot;]
        REPO --&gt;|&quot;From&quot;| DB[&quot;sqlx::Error&lt;br/&gt;(third-party)&quot;]
    end

    subgraph &quot;Each Layer&quot;
        direction TB
        L1[&quot;Handler: ApiError → HTTP status + JSON body&quot;]
        L2[&quot;Service: ServiceError → business logic decisions&quot;]
        L3[&quot;Repository: RepositoryError → retry, fallback&quot;]
    end

    API ~~~ L1
    SVC ~~~ L2
    REPO ~~~ L3
</code></pre>
<p>Each layer defines its <strong>own error enum</strong> and converts from the layer below using <code>#[from]</code>. This gives each layer the right abstraction level: the HTTP handler doesn't know about <code>sqlx::Error</code>, it knows about <code>ApiError::InternalError</code>.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="34" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h4 id="why-this-pattern-matters-for-observability">Why This Pattern Matters for Observability</h4>
<table>
<thead>
<tr>
<th>Benefit</th>
<th>How it helps</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>No hidden failures</strong></td>
<td>Every error path is visible in the type signature</td>
</tr>
<tr>
<td><strong>Structured by default</strong></td>
<td>Error variants carry typed fields, not free-text</td>
</tr>
<tr>
<td><strong>Retryable vs permanent</strong></td>
<td>Model it as a field on the variant</td>
</tr>
<tr>
<td><strong>Easy to log</strong></td>
<td><code>#[derive(Debug)]</code> + <code>tracing::error!(?err)</code> gives structured output</td>
</tr>
<tr>
<td><strong>Easy to metric</strong></td>
<td>Match on variant to increment the right counter</td>
</tr>
<tr>
<td><strong>Compile-time exhaustiveness</strong></td>
<td>Add a new failure mode, compiler shows every place to update</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>Takeaway</strong>: Rust's <code>Result</code> + enum errors + <code>thiserror</code> is the gold standard for error handling. Even in other languages, <strong>model your errors as typed variants, not exception hierarchies or string messages</strong>.</p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>

<header>Monitoring &amp; Observability Course</header>
<h3 id="when-to-use-what">When to Use What</h3>
