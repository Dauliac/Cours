<header>Monitoring &amp; Observability Course</header>
<h3 id="notable-modern-storage-backends">Notable Modern Storage Backends</h3>
<ul>
<li><strong>Grafana Loki</strong>: Log aggregation, labels-based indexing (like Prometheus for logs), uses object storage (S3/GCS) with compacted chunks</li>
<li><strong>Grafana Tempo</strong>: Trace storage on object storage, no index needed (search by traceId), Parquet-based</li>
<li><strong>Grafana Mimir</strong>: Horizontally-scalable Prometheus, long-term metrics storage</li>
<li><strong>ClickHouse</strong>: Columnar OLAP database, excellent for logs and traces at scale</li>
<li><strong>VictoriaMetrics</strong>: High-performance Prometheus-compatible time-series DB</li>
<li><strong><a href="https://quickwit.io/">Quickwit</a></strong>: Search engine built in Rust on object storage, designed for logs and traces. Sub-second search on Parquet/tantivy, directly competes with Elasticsearch at a fraction of the cost</li>
<li><strong><a href="https://openobserve.ai/">OpenObserve</a></strong>: Lightweight Elasticsearch alternative, built in Rust, stores on S3, ~140x lower storage cost</li>
<li><strong><a href="https://signoz.io/">SigNoz</a></strong>: Open-source alternative to Datadog, unified logs/metrics/traces UI on top of ClickHouse</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="105" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="105" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="grafana-alloy">Grafana Alloy</h2>
<p><a href="https://grafana.com/docs/alloy/">Grafana Alloy</a> is Grafana's <strong>distribution of the OTel Collector</strong> with added capabilities:</p>
<ul>
<li>Native Prometheus scraping</li>
<li>Loki log collection (replaces Promtail)</li>
<li>Tempo trace collection</li>
<li>Pyroscope continuous profiling</li>
<li><strong>Single agent</strong> for all telemetry types</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Before: Many Agents&quot;
        PA[Promtail] --&gt; L[Loki]
        PE[Prometheus] --&gt; M[Mimir]
        OC[OTel Collector] --&gt; T[Tempo]
        PY[Pyroscope Agent] --&gt; P[Pyroscope]
    end

    subgraph &quot;After: One Agent&quot;
        AL[Grafana Alloy] --&gt; L2[Loki]
        AL --&gt; M2[Mimir]
        AL --&gt; T2[Tempo]
        AL --&gt; P2[Pyroscope]
    end
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="106" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="106" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h1 id="continuous-profiling-the-fourth-pillar">Continuous Profiling: The Fourth Pillar</h1>
<p>Beyond logs, metrics, and traces, <strong>continuous profiling</strong> shows exactly which code paths consume CPU, memory, or I/O.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Four Pillars&quot;
        direction LR
        L2[&quot;Logs&lt;br/&gt;&lt;i&gt;Events&lt;/i&gt;&quot;]
        M2[&quot;Metrics&lt;br/&gt;&lt;i&gt;Aggregates&lt;/i&gt;&quot;]
        T2[&quot;Traces&lt;br/&gt;&lt;i&gt;Request flow&lt;/i&gt;&quot;]
        P2[&quot;Profiles&lt;br/&gt;&lt;i&gt;Code-level perf&lt;/i&gt;&quot;]
    end
    P2 --&gt; Q1[&quot;Where is CPU spent?&quot;]
    P2 --&gt; Q2[&quot;Which function allocates most memory?&quot;]
    P2 --&gt; Q3[&quot;Why is this endpoint slow?&quot;]
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="107" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="107" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<ul>
<li><strong>Pyroscope</strong> (Grafana): Continuous profiling with flame graphs</li>
<li><strong>pprof</strong> (Go): Built-in profiling</li>
<li><strong>async-profiler</strong> (JVM): Low-overhead Java/Kotlin profiling</li>
<li><strong>eBPF-based</strong>: Kernel-level profiling without code changes (Parca, Pixie)</li>
</ul>

<header>Monitoring &amp; Observability Course</header>
<h3 id="alert-fatigue-is-a-real-problem">Alert Fatigue is a Real Problem</h3>
<table>
<thead>
<tr>
<th>Problem</th>
<th>Impact</th>
<th>Solution</th>
</tr>
</thead>
<tbody>
<tr>
<td>Too many alerts</td>
<td>On-call ignores them</td>
<td>Reduce to SLO-based alerts</td>
</tr>
<tr>
<td>Noisy thresholds</td>
<td>False positives</td>
<td>Use burn-rate windows</td>
</tr>
<tr>
<td>No runbook</td>
<td>Slow response</td>
<td>Every alert links to a runbook</td>
</tr>
<tr>
<td>Missing context</td>
<td>Wastes investigation time</td>
<td>Include dashboard links, recent changes</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># Every alert should contain:</span>

  <span class="hljs-attr">description:</span> <span class="hljs-string">|

</span>  <span class="hljs-attr">impact:</span> <span class="hljs-string">&quot;Users cannot place orders&quot;</span>

<header>Monitoring &amp; Observability Course</header>
<h1 id="service-tiers-not-all-services-are-equal">Service Tiers: Not All Services Are Equal</h1>
<p>Not every error deserves the same response. A bug in the recommendation engine is not the same as a bug in the payment service. <strong>Service tiering</strong> classifies services by business criticality to determine the right observability depth, alerting severity, and incident response.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

<header>Monitoring &amp; Observability Course</header>
<h3 id="tier-determines-the-response-to-errors">Tier Determines the Response to Errors</h3>
<p>The same error type triggers very different responses depending on the tier:</p>
<table>
<thead>
<tr>
<th>Error</th>
<th>Tier 0 response</th>
<th>Tier 1 response</th>
<th>Tier 2 response</th>
<th>Tier 3 response</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>5xx error rate &gt; 1%</strong></td>
<td>Page on-call immediately</td>
<td>Page if sustained &gt; 5 min</td>
<td>Slack alert</td>
<td>Ticket</td>
</tr>
<tr>
<td><strong>Latency p99 &gt; 2s</strong></td>
<td>Page on-call</td>
<td>Alert if sustained &gt; 10 min</td>
<td>Investigate next sprint</td>
<td>Ignore unless extreme</td>
</tr>
<tr>
<td><strong>Pod OOMKilled</strong></td>
<td>Page + auto-rollback</td>
<td>Alert + investigate</td>
<td>Ticket</td>
<td>Fix when convenient</td>
</tr>
<tr>
<td><strong>Dependency timeout</strong></td>
<td>Page + activate circuit breaker</td>
<td>Alert + graceful degradation</td>
<td>Log + retry silently</td>
<td>Log</td>
</tr>
<tr>
<td><strong>Deployment failed</strong></td>
<td>Auto-rollback + page</td>
<td>Auto-rollback + alert</td>
<td>Manual rollback</td>
<td>Retry next day</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>

<header>Monitoring &amp; Observability Course</header>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="122" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="122" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="cascading-tier-elevation">Cascading Tier Elevation</h3>
<p>A Tier 2 service can become <strong>temporarily Tier 0</strong> if a Tier 0 service depends on it in the critical path.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Normal&quot;
        RECO[&quot;Recommendations&lt;br/&gt;&lt;b&gt;Tier 2&lt;/b&gt;&quot;]
    end
    subgraph &quot;During Checkout&quot;
        CHECKOUT[&quot;Checkout&lt;br/&gt;&lt;b&gt;Tier 0&lt;/b&gt;&quot;] --&gt;|&quot;calls&quot;| RECO2[&quot;Recommendations&lt;br/&gt;&lt;b&gt;Tier 0 (elevated)&lt;/b&gt;&quot;]
    end
</code></pre>
<blockquote>
<p>If your Tier 0 checkout service calls recommendations synchronously to display upsells, then recommendations is <strong>effectively Tier 0</strong> for that code path. Either decouple it (async, circuit breaker, cached fallback) or treat it with Tier 0 rigor.</p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="123" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="123" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="rules-for-tier-assignment">Rules for Tier Assignment</h3>
<ol>
<li><strong>Tier is based on worst-case business impact</strong>, not technical complexity</li>
<li><strong>Review tiers quarterly</strong> -- services evolve, dependencies change</li>
<li><strong>Dependencies inherit the caller's tier</strong> in the critical path (or must be decoupled)</li>
<li><strong>Every service must have an assigned tier</strong> -- untiered services are invisible during incidents</li>
<li><strong>Tier determines budget</strong>: Tier 0 gets the observability investment, Tier 3 gets the minimum</li>
</ol>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="124" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="124" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h1 id="observability-anti-patterns">Observability Anti-Patterns</h1>
<table>
<thead>
<tr>
<th>Anti-pattern</th>
<th>Why it's bad</th>
<th>What to do instead</th>
</tr>
</thead>
<tbody>
<tr>
<td>Log everything at DEBUG in prod</td>
<td>Storage explosion, noise</td>
<td>Use INFO default, enable DEBUG per-service via config</td>
</tr>
<tr>
<td>Metrics with unbounded cardinality</td>
<td>Prometheus OOM, series explosion</td>
<td>Never use userId, requestId, or IP as metric labels</td>
</tr>
<tr>
<td>No sampling on traces</td>
<td>Cost explosion</td>
<td>Tail-based sampling at 1-5% base rate</td>
</tr>
<tr>
<td>Dashboards nobody looks at</td>
<td>Wasted effort, stale</td>
<td>Alert-driven dashboards, delete unused ones</td>
</tr>
<tr>
<td>Separate tools for each signal</td>
<td>No correlation</td>
<td>Unified backend (Grafana stack) or correlate via traceId</td>
</tr>
<tr>
<td>Alerting on raw metrics</td>
<td>False positives</td>
<td>Alert on SLO burn rate</td>
</tr>
<tr>
<td>No correlation IDs</td>
<td>Can't trace requests</td>
<td>Inject traceId/correlationId at the edge</td>
</tr>
<tr>
<td>Logging PII</td>
<td>GDPR violation</td>
<td>Redact at the collection layer (Vector/OTel processor)</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="125" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="125" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="128" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="128" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="key-design-decisions">Key Design Decisions</h3>
<table>
<thead>
<tr>
<th>Decision</th>
<th>Recommendation</th>
<th>Why</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Protocol</strong></td>
<td>OTLP gRPC</td>
<td>Standard, efficient, supports all signals</td>
</tr>
<tr>
<td><strong>Collector topology</strong></td>
<td>Agent + Gateway</td>
<td>Agent on each node, gateway for processing</td>
</tr>
<tr>
<td><strong>Log format</strong></td>
<td>Structured JSON</td>
<td>Machine-parseable, queryable</td>
</tr>
<tr>
<td><strong>Metric cardinality</strong></td>
<td>&lt; 10 labels per metric</td>
<td>Prevents series explosion</td>
</tr>
<tr>
<td><strong>Trace sampling</strong></td>
<td>Tail-based, 5% base</td>
<td>Captures errors, controls cost</td>
</tr>
<tr>
<td><strong>Retention</strong></td>
<td>Metrics: 90d, Logs: 30d, Traces: 14d</td>
<td>Balance cost vs debug ability</td>
</tr>
<tr>
<td><strong>Compression</strong></td>
<td>zstd level 3</td>
<td>Best speed/ratio trade-off</td>
</tr>
<tr>
<td><strong>Storage</strong></td>
<td>Object storage (S3/GCS)</td>
<td>Cheap, durable, scalable</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="129" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h1 id="real-world-observability-guidelines">Real-World Observability Guidelines</h1>
<p>This section consolidates battle-tested rules from production environments running hundreds of microservices.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="130" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="the-zero-errors-when-healthy-principle">The &quot;Zero Errors When Healthy&quot; Principle</h2>
<blockquote>
<p>A well-monitored service should emit <strong>zero errors, zero alerts, and zero warnings</strong> during normal operation.</p>
</blockquote>
<p>If your dashboards show a constant background of errors that everyone ignores, you have lost the signal. Every error in your logs should be <strong>surprising and actionable</strong>. If it's expected, it's not an error -- it's a log at INFO level.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Healthy Service&quot;
        H1[&quot;ERROR count = 0&quot;]
        H2[&quot;WARN count = 0&quot;]
        H3[&quot;Alerts firing = 0&quot;]
    end
    subgraph &quot;Unhealthy Service&quot;
        U1[&quot;ERROR count = 47/min&lt;br/&gt;&lt;i&gt;'normal background noise'&lt;/i&gt;&quot;]
        U2[&quot;Team ignores alerts&quot;]
        U3[&quot;Real incident buried in noise&quot;]
    end
    H1 --&gt;|&quot;Any error = signal&quot;| ACT[&quot;Investigate immediately&quot;]
    U1 --&gt;|&quot;Can't distinguish real issues&quot;| MISS[&quot;Incidents missed&quot;]
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="131" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="131" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="132" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="132" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="rules-for-zero-error-baselines">Rules for Zero-Error Baselines</h3>
<table>
<thead>
<tr>
<th>Rule</th>
<th>Why</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Expected failures are not errors</strong></td>
<td>A 404 from a user typo is INFO, not ERROR</td>
</tr>
<tr>
<td><strong>Retried-and-succeeded is not an error</strong></td>
<td>Log the retry at WARN, the success at INFO</td>
</tr>
<tr>
<td><strong>Deprecation warnings must be fixed or silenced</strong></td>
<td>Noise trains people to ignore logs</td>
</tr>
<tr>
<td><strong>Health check logs must be suppressed</strong></td>
<td>They generate massive volume with zero signal</td>
</tr>
<tr>
<td><strong>Background noise must be driven to zero</strong></td>
<td>If you can't distinguish 47 errors/min from 48, you'll miss the real one</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="133" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="133" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="magic-numbers-thresholds-that-actually-work">Magic Numbers: Thresholds That Actually Work</h2>
<p>In monitoring, certain numeric thresholds appear repeatedly across organizations. These are not arbitrary -- they emerge from operational experience.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="134" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="134" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="the-authorized-magic-numbers">The Authorized Magic Numbers</h3>
<table>
<thead>
<tr>
<th>Number</th>
<th>Where it applies</th>
<th>Meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>0</strong></td>
<td>Error count in steady state</td>
<td>A healthy service has 0 errors. Any error is a signal.</td>
</tr>
<tr>
<td><strong>1</strong></td>
<td>Minimum event count for alerting</td>
<td>If you alert on count &lt; 1, you're alerting on absence of data (dead service).</td>
</tr>
<tr>
<td><strong>0.5</strong></td>
<td>SLO error budget burn rate (baseline)</td>
<td>Burning at 0.5x is normal. Burning at 2x means you'll exhaust budget early.</td>
</tr>
<tr>
<td><strong>0.1%</strong></td>
<td>Typical error rate SLO</td>
<td>99.9% success rate = 0.1% error budget</td>
</tr>
<tr>
<td><strong>50</strong></td>
<td>Max label/tag cardinality</td>
<td>Below 50 unique values per label is almost always safe for Prometheus/Datadog</td>
</tr>
<tr>
<td><strong>300</strong></td>
<td>Danger zone for cardinality</td>
<td>Above 300 unique values per label causes series explosion and cost blowup</td>
</tr>
<tr>
<td><strong>1,500</strong></td>
<td>Minimum events/hour for a custom metric</td>
<td>Below this threshold, the metric is too sparse to be useful -- build a back-office feature instead</td>
</tr>
<tr>
<td><strong>4 KB</strong></td>
<td>Target max log line size</td>
<td>Logs should stay under 4 KB. Large logs waste storage and slow queries.</td>
</tr>
<tr>
<td><strong>640 KB</strong></td>
<td>Absolute max log line size</td>
<td>Logs above this are truncated or dropped by most pipelines</td>
</tr>
<tr>
<td><strong>10M</strong></td>
<td>Daily log line budget per service</td>
<td>Above 10M lines/day, you must reduce volume or convert high-frequency events to counter metrics</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="135" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="135" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="136" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="136" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="burn-rate-windows-for-slo-alerting">Burn Rate Windows for SLO Alerting</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Multi-Window Burn Rate&quot;
        B1[&quot;1h window @ 14x burn&lt;br/&gt;&lt;i&gt;= Page immediately&lt;/i&gt;&quot;]
        B2[&quot;6h window @ 6x burn&lt;br/&gt;&lt;i&gt;= Page&lt;/i&gt;&quot;]
        B3[&quot;3d window @ 1x burn&lt;br/&gt;&lt;i&gt;= Ticket&lt;/i&gt;&quot;]
        B4[&quot;30d window @ 0.5x burn&lt;br/&gt;&lt;i&gt;= Normal&lt;/i&gt;&quot;]
    end
    B1 --&gt; P[&quot;PagerDuty&quot;]
    B2 --&gt; P
    B3 --&gt; T[&quot;Jira Ticket&quot;]
    B4 --&gt; OK[&quot;No action&quot;]
</code></pre>
<blockquote>
<p>Use multi-window burn rates instead of raw thresholds. A 14x burn rate over 1 hour means you'll exhaust your 30-day error budget in ~2 hours -- that's a real emergency.</p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="137" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="137" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="tagging-discipline">Tagging Discipline</h2>
<p>Every observability resource (monitors, dashboards, SLOs, metrics) <strong>must</strong> carry mandatory tags:</p>
<table>
<thead>
<tr>
<th>Tag</th>
<th>Rule</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>owner</code></td>
<td>Must be set and valid (team or individual)</td>
<td><code>owner:order-team</code></td>
</tr>
<tr>
<td><code>env</code></td>
<td>Must match the environment</td>
<td><code>env:prd</code>, <code>env:stg</code></td>
</tr>
<tr>
<td><code>service</code></td>
<td>The service name</td>
<td><code>service:order-service</code></td>
</tr>
<tr>
<td><code>domain</code></td>
<td>Business domain when applicable</td>
<td><code>domain:checkout</code></td>
</tr>
</tbody>
</table>
<ul>
<li>Critical-severity monitors are <strong>production-only</strong> -- never tag non-prod monitors as critical</li>
<li>Monitors posting to alerting channels <strong>must</strong> trigger on-call rotation</li>
<li>Monitors triggering on-call <strong>must</strong> link to a runbook</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="138" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="138" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="metric-naming-conventions">Metric Naming Conventions</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>&lt;scope&gt;.&lt;project_or_domain&gt;.&lt;what&gt;_&lt;unit&gt;
</code></pre>
<table>
<thead>
<tr>
<th>Scope</th>
<th>Convention</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td>Service metric</td>
<td><code>mm.&lt;project&gt;</code></td>
<td><code>mm.order.created_total</code></td>
</tr>
<tr>
<td>Tech metric</td>
<td><code>&lt;tech&gt;.&lt;what&gt;</code></td>
<td><code>java.gc.pause_seconds</code></td>
</tr>
<tr>
<td>Business metric</td>
<td><code>mm.business.&lt;domain&gt;</code></td>
<td><code>mm.business.checkout.conversion_ratio</code></td>
</tr>
</tbody>
</table>
<p>Rules:</p>
<ul>
<li>Use underscores <code>_</code>, never hyphens <code>-</code></li>
<li>End with SI unit suffix: <code>_seconds</code>, <code>_bytes</code>, <code>_ratio</code>, <code>_total</code></li>
<li>Set type (counter/gauge/histogram) and description metadata on every custom metric</li>
<li><strong>Never duplicate an existing metric</strong> -- check the metric catalog first</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="139" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="139" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="logging-discipline">Logging Discipline</h2>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="140" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="140" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="mandatory-rules">Mandatory Rules</h3>
<table>
<thead>
<tr>
<th>Rule</th>
<th>Rationale</th>
</tr>
</thead>
<tbody>
<tr>
<td>JSON to stdout/stderr</td>
<td>12-factor, Kubernetes-native, machine-parseable</td>
</tr>
<tr>
<td>Use standard attribute names</td>
<td><code>evt.name</code>, <code>evt.outcome</code>, <code>error.kind</code>, <code>error.message</code> -- not custom names</td>
</tr>
<tr>
<td>Duration in nanoseconds</td>
<td>Consistent across stacks, avoids unit confusion</td>
</tr>
<tr>
<td>No arrays as values</td>
<td>Use objects with keys instead (array values break monitor filters)</td>
</tr>
<tr>
<td>No PII in logs</td>
<td>No emails, names, phone numbers, passwords, IPs (GDPR critical)</td>
</tr>
<tr>
<td>TRACE/DEBUG disabled in staging and production</td>
<td>Cost and noise control</td>
</tr>
<tr>
<td>Health check endpoints never log</td>
<td>They generate massive volume with zero diagnostic value</td>
</tr>
<tr>
<td>HTTP access logs emitted by infra, not apps</td>
<td>Ingress/service mesh already handles this; don't duplicate</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="141" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="141" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="when-to-log-vs-when-to-metric">When to Log vs When to Metric</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    Q[&quot;High-volume event&lt;br/&gt;&gt;100K/day same content?&quot;]
    Q --&gt;|Yes| M[&quot;Replace with a counter metric&lt;br/&gt;e.g. cache_miss_total&quot;]
    Q --&gt;|No| L[&quot;Keep as a structured log&quot;]
    L --&gt; Q2[&quot;Does it carry unique context&lt;br/&gt;per occurrence?&quot;]
    Q2 --&gt;|Yes| KEEP[&quot;Log it (with correlation ID)&quot;]
    Q2 --&gt;|No| AGG[&quot;Consider aggregating&lt;br/&gt;into a metric instead&quot;]
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="142" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="142" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="dashboard-discipline">Dashboard Discipline</h2>
<blockquote>
<p>A dashboard must tell a story or answer a question. If it has no goal, delete it.</p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="143" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="143" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="rules">Rules</h3>
<ul>
<li>Add an <strong>intent statement</strong> at the top: what question does this dashboard answer?</li>
<li>Use <strong>sections</strong> to group related widgets</li>
<li>Add <strong>interpretive text</strong>: &quot;When this goes up, it means X... If it drops below Y, do Z&quot;</li>
<li>Never sum gauge values (meaningless); always sum count values</li>
<li>Use template variables for <code>region</code> and <code>env</code> -- never hardcode</li>
<li>Prefix experimental dashboards with <code>[TMP]</code> and delete when done</li>
<li>Augment time series with <strong>anomaly detection</strong> when available</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="144" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="144" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="production-governance-checklist">Production Governance Checklist</h2>
<p>Every service in production <strong>must</strong> have:</p>
<ul>
<li>[ ] Monitoring dashboard (with intent statement)</li>
<li>[ ] Alerting with on-call routing</li>
<li>[ ] SLO defined and tracked</li>
<li>[ ] Runbook (infra + debugging steps)</li>
<li>[ ] Backup &amp; disaster recovery plan</li>
<li>[ ] Rollback procedure documented</li>
<li>[ ] Team owns the service -- not SRE alone</li>
<li>[ ] Everyone on the team can deploy -- no single gatekeeper</li>
<li>[ ] Blameless post-mortem within 2 business days after any SLA-breaking incident</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="145" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="145" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h2 id="summary">Summary</h2>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="146" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="146" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="the-observability-checklist">The Observability Checklist</h3>
<ul>
<li>[ ] <strong>Structured logging</strong> with JSON and correlation IDs</li>
<li>[ ] <strong>Meaningful error messages</strong> (what, why, action)</li>
<li>[ ] <strong>Four golden signals</strong> instrumented (latency, traffic, errors, saturation)</li>
<li>[ ] <strong>Distributed tracing</strong> with OpenTelemetry</li>
<li>[ ] <strong>SLOs defined</strong> with error budgets</li>
<li>[ ] <strong>Alerts based on symptoms</strong> not causes</li>
<li>[ ] <strong>Runbooks</strong> linked from every alert</li>
<li>[ ] <strong>Dashboards</strong> driven by alerts, not vanity</li>
<li>[ ] <strong>PII redacted</strong> at collection layer</li>
<li>[ ] <strong>Sampling strategy</strong> for traces</li>
<li>[ ] <strong>Compression</strong> (zstd) and columnar storage for cost control</li>
<li>[ ] <strong>Single collector</strong> (OTel Collector or Grafana Alloy)</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="147" data-header="Monitoring &amp; Observability Course" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="147" style="--header:Monitoring &amp; Observability Course;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="147">
<header>Monitoring &amp; Observability Course</header>
<h3 id="key-takeaways">Key Takeaways</h3>
<ol>
<li><strong>Observability &gt; Monitoring</strong>: Don't just watch dashboards, build systems you can interrogate</li>
<li><strong>OpenTelemetry is the standard</strong>: Vendor-lock-in on telemetry is a losing strategy</li>
<li><strong>Errors are UX</strong>: Write errors for humans, not for log files</li>
<li><strong>Cost is the hidden enemy</strong>: Unbounded cardinality and no sampling will bankrupt your budget</li>
<li><strong>Correlation is everything</strong>: traceId connects logs, metrics, and traces into one story</li>
<li><strong>Modern tools matter</strong>: Vector, zstd, Parquet, Loki bring 10x efficiency over legacy stacks</li>
</ol>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
