<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="4" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="why-documentation-matters">Why Documentation Matters</h3>
<p>Documentation is an essential component of a project's lifecycle.<br />
Without it, knowledge lives only in people's heads — and when they leave, the knowledge leaves with them.</p>
<p>Good documentation serves four purposes:</p>
<ul>
<li><strong>Knowledge transfer</strong> — new team members ramp up faster</li>
<li><strong>Maintenance</strong> — understanding <em>why</em> decisions were made helps evolve systems safely</li>
<li><strong>Developer experience</strong> — clear docs reduce friction and frustration</li>
<li><strong>User experience</strong> — users can self-serve instead of filing support tickets</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="5" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="6" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="types-of-documentation">Types of Documentation</h3>
<p>Not all documentation is the same. At a high level, projects need:</p>
<table>
<thead>
<tr>
<th>Type</th>
<th>Audience</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>User documentation</strong></td>
<td>End users</td>
<td>How to use the product</td>
</tr>
<tr>
<td><strong>API documentation</strong></td>
<td>Integrators</td>
<td>Contract and behaviour of interfaces</td>
</tr>
<tr>
<td><strong>Architecture documentation</strong></td>
<td>Engineers</td>
<td>System design and decisions</td>
</tr>
<tr>
<td><strong>Operational documentation</strong></td>
<td>Operators / SREs</td>
<td>Runbooks, deployment, monitoring</td>
</tr>
<tr>
<td><strong>Contributor documentation</strong></td>
<td>Contributors</td>
<td>How to set up, develop, and submit changes</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="7" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="8" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h2 id="structuring-knowledge">Structuring Knowledge</h2>
<p>The hardest part of documentation is not writing — it is organising.<br />
Two methods stand out for structuring knowledge effectively.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="9" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="di%C3%A1taxis">Diátaxis</h3>
<p><a href="https://diataxis.fr/">Diátaxis</a> is a framework based on a simple insight: documentation serves practitioners in a domain of skill, and what they need changes based on two dimensions:</p>
<ol>
<li><strong>Action vs Cognition</strong> — are they doing something or understanding something?</li>
<li><strong>Acquisition vs Application</strong> — are they learning or working?</li>
</ol>
<p>These two axes create exactly four documentation types:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>                    ACQUISITION          APPLICATION
                  (learning)            (working)
              ┌────────────────────┬────────────────────┐
   ACTION     │                    │                    │
   (doing)    │    TUTORIALS       │   HOW-TO GUIDES    │
              │                    │                    │
              ├────────────────────┼────────────────────┤
   COGNITION  │                    │                    │
   (thinking) │   EXPLANATION      │    REFERENCE       │
              │                    │                    │
              └────────────────────┴────────────────────┘
</code></pre>
<h4 id="tutorials-learning-by-doing">Tutorials (learning by doing)</h4>
<p>The teacher is responsible for the learner's success.<br />
Every step must work. One path only, no alternatives.<br />
Focus on doing, not explaining.</p>
<p><strong>Language</strong>: &quot;We will create...&quot;, &quot;First, do X. Now, do Y.&quot;, &quot;Notice that...&quot;</p>
<h4 id="how-to-guides-working-to-achieve-goals">How-To Guides (working to achieve goals)</h4>
<p>Assume competence. The reader knows what they want — help them get there.<br />
Address real-world complexity with conditionals (&quot;If X, do Y&quot;).</p>
<p><strong>Language</strong>: &quot;This guide shows you how to...&quot;, &quot;To achieve W, do Z&quot;</p>
<h4 id="reference-facts-while-working">Reference (facts while working)</h4>
<p>Describe, don't instruct. Be austere and authoritative.<br />
Structure mirrors the product architecture. Completeness matters.</p>
<p><strong>Language</strong>: &quot;X is available as Y&quot;, &quot;Sub-commands are: A, B, C&quot;</p>
<h4 id="explanation-understanding-concepts">Explanation (understanding concepts)</h4>
<p>Answer &quot;why&quot;. Talk about the subject from multiple angles.<br />
Permit opinion. Provide context and bigger picture.</p>
<p><strong>Language</strong>: &quot;The reason for X is...&quot;, &quot;Some prefer W. This can be effective, but...&quot;</p>
<blockquote>
<p><strong>Key principle</strong>: keep these four types separate. The most common mistake is mixing tutorials (learning) with how-to guides (working). If content serves multiple needs, split it and link between documents.</p>
</blockquote>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="10" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="11" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="zettelkasten">Zettelkasten</h3>
<p><a href="https://zettelkasten.de/">Zettelkasten</a> is a knowledge management method based on interconnected atomic notes.<br />
Each note captures one idea and links to related notes, building a web of knowledge over time.</p>
<p>This approach is useful for:</p>
<ul>
<li>Research and critical thinking</li>
<li>Building a personal knowledge base</li>
<li>Discovering connections between ideas that were not obvious</li>
</ul>
<p>While Diátaxis structures project documentation, Zettelkasten structures personal knowledge. They are complementary.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

<header>Technical Documentation</header>
<h2 id="community-standard-files">Community Standard Files</h2>
<p>Open-source projects (and increasingly internal ones) follow a set of <strong>community standard files</strong> that live at the repository root. These files form the &quot;social contract&quot; of a project — they tell contributors, users, and machines how to interact with the codebase.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="14" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="the-essential-files">The Essential Files</h3>
<table>
<thead>
<tr>
<th>File</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>README.md</code></td>
<td>First impression. What this project is, how to install it, how to use it</td>
</tr>
<tr>
<td><code>CONTRIBUTING.md</code></td>
<td>How to contribute: setup, conventions, PR process, code style</td>
</tr>
<tr>
<td><code>CODE_OF_CONDUCT.md</code></td>
<td>Behavioural expectations for participants</td>
</tr>
<tr>
<td><code>LICENSE</code></td>
<td>Legal terms under which the code is distributed</td>
</tr>
<tr>
<td><code>CHANGELOG.md</code></td>
<td>What changed in each release (see <a href="https://keepachangelog.com/">Keep a Changelog</a>)</td>
</tr>
<tr>
<td><code>SECURITY.md</code></td>
<td>How to report security vulnerabilities responsibly</td>
</tr>
<tr>
<td><code>.github/ISSUE_TEMPLATE/</code></td>
<td>Structured templates for bug reports and feature requests</td>
</tr>
<tr>
<td><code>.github/PULL_REQUEST_TEMPLATE.md</code></td>
<td>Checklist and structure for pull requests</td>
</tr>
</tbody>
</table>
<p>GitHub, GitLab, and Forgejo all recognise these files and surface them in the UI. A project without them looks abandoned.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="15" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="16" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="contributingmd-in-depth">CONTRIBUTING.md in Depth</h3>
<p>The <code>CONTRIBUTING.md</code> file is the single most important file for project health after <code>README.md</code>. It answers:</p>
<ul>
<li><strong>How do I set up the development environment?</strong> (prerequisites, tools, commands)</li>
<li><strong>What conventions do you follow?</strong> (commit messages, branch naming, code style)</li>
<li><strong>How do I submit a change?</strong> (fork/branch workflow, PR checklist, review process)</li>
<li><strong>How do I run the tests?</strong> (unit, integration, linting)</li>
<li><strong>What should I not do?</strong> (anti-patterns, out-of-scope changes)</li>
</ul>
<p>A good <code>CONTRIBUTING.md</code> reduces friction for first-time contributors and enforces consistency across the team.</p>
<h4 id="example-structure">Example structure</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># Contributing to <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">project</span>&gt;</span></span></span>

<span class="hljs-section">## Prerequisites</span>
<span class="hljs-bullet">-</span> Nix (see [<span class="hljs-string">install guide</span>](<span class="hljs-link">./nix/INSTALL.md</span>))
<span class="hljs-bullet">-</span> direnv

<span class="hljs-section">## Getting started</span>
<span class="hljs-bullet">1.</span> Clone the repo
<span class="hljs-bullet">2.</span> Run <span class="hljs-code">`direnv allow`</span>
<span class="hljs-bullet">3.</span> Run <span class="hljs-code">`task build`</span>

<span class="hljs-section">## Conventions</span>
<span class="hljs-bullet">-</span> Commit messages follow [<span class="hljs-string">Conventional Commits</span>](<span class="hljs-link">https://www.conventionalcommits.org/</span>)
<span class="hljs-bullet">-</span> Code is formatted with <span class="hljs-code">`treefmt`</span>

<span class="hljs-section">## Submitting changes</span>
<span class="hljs-bullet">1.</span> Create a feature branch from <span class="hljs-code">`main`</span>
<span class="hljs-bullet">2.</span> Make your changes
<span class="hljs-bullet">3.</span> Run <span class="hljs-code">`task check`</span> to validate
<span class="hljs-bullet">4.</span> Open a pull request
</code></pre>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="17" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="18" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h2 id="ai-assisted-documentation-the-new-standard">AI-Assisted Documentation: The New Standard</h2>
<p>The rise of AI coding agents (Claude Code, Copilot, Cursor, Aider) has created a new category of documentation: <strong>files that instruct machines</strong> rather than humans.</p>
<p>These files are not optional extras — they are becoming as fundamental as <code>README.md</code> was in 2015.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="19" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="agentsmd-the-cross-tool-standard">AGENTS.md: The Cross-Tool Standard</h3>
<p><a href="https://agents.md/">AGENTS.md</a> is an open standard for guiding AI coding agents. Proposed by OpenAI in August 2025 through collaboration with Google, Cursor, Factory, and Sourcegraph, it is now governed by the <strong>Agentic AI Foundation (AAIF)</strong> under the <strong>Linux Foundation</strong>.</p>
<p>The format is plain Markdown, intentionally schema-free. The AAIF spec defines optional fields (<code>allowed_tools</code>, <code>disallowed_tools</code>, <code>agent_instructions</code>, <code>output_format</code>, <code>environment</code>) but tools read what they understand and skip the rest.</p>
<p>By mid-2026, AGENTS.md is read natively by 30+ tools: OpenAI Codex, Gemini CLI, Google Jules, Devin, Cursor, Windsurf, GitHub Copilot, Warp, Zed, and more. It is adopted by over 60,000 repositories.</p>
<h4 id="research-evidence">Research evidence</h4>
<p>An <a href="https://arxiv.org/html/2601.20404v2">ETH Zurich empirical study</a> on 10 repositories and 124 pull requests measured the impact of AGENTS.md files:</p>
<table>
<thead>
<tr>
<th>Metric</th>
<th>With AGENTS.md</th>
<th>Without</th>
</tr>
</thead>
<tbody>
<tr>
<td>Output tokens</td>
<td><strong>-20%</strong> (mean)</td>
<td>baseline</td>
</tr>
<tr>
<td>Wall-clock time</td>
<td><strong>-28.6%</strong> (median)</td>
<td>baseline</td>
</tr>
<tr>
<td>Total tokens</td>
<td><strong>-9.9%</strong> (mean)</td>
<td>baseline</td>
</tr>
</tbody>
</table>
<p>Critical finding: <strong>LLM-generated context files reduced task success rates</strong> in 5 of 8 settings while increasing inference costs by 20–23%. Human-curated files delivered ~4% success rate improvement. The takeaway: always write these files by hand.</p>
<h4 id="the-landscape-of-agent-instruction-files">The landscape of agent instruction files</h4>
<p>Different AI tools started with their own formats, but the ecosystem is converging:</p>
<table>
<thead>
<tr>
<th>Format</th>
<th>Tool</th>
<th>Location</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>AGENTS.md</code></td>
<td>Cross-tool standard</td>
<td>Repo root + subdirs</td>
<td>Open standard (AAIF / Linux Foundation)</td>
</tr>
<tr>
<td><code>CLAUDE.md</code></td>
<td>Claude Code</td>
<td>Repo root + subdirs + <code>~/.claude/</code></td>
<td>Anthropic-specific, richer memory model</td>
</tr>
<tr>
<td><code>.cursor/rules/*.mdc</code></td>
<td>Cursor</td>
<td><code>.cursor/rules/</code></td>
<td>Cursor-only, glob-scoped activation</td>
</tr>
<tr>
<td><code>.github/copilot-instructions.md</code></td>
<td>GitHub Copilot</td>
<td><code>.github/</code></td>
<td>GitHub-specific</td>
</tr>
<tr>
<td><code>.windsurfrules</code></td>
<td>Windsurf</td>
<td>Repo root</td>
<td>Migrating toward AGENTS.md</td>
</tr>
</tbody>
</table>
<p>The trend is clear: <strong>AGENTS.md is becoming the universal format</strong>, with tool-specific files layered on top for features unique to each agent.</p>
<h4 id="what-to-include">What to include</h4>
<p>An effective AGENTS.md contains <strong>what the agent cannot infer from code alone</strong>:</p>
<ol>
<li><strong>One-line project description</strong> — acts like a role-based prompt</li>
<li><strong>Tech stack</strong> — framework, language, versions, database</li>
<li><strong>Commands</strong> — the exact invocations for build, test, lint, deploy (not the conventional ones — the actual ones)</li>
<li><strong>Architecture</strong> — the 3–5 directories that matter and what each does</li>
<li><strong>Conventions</strong> — patterns that linters cannot catch (naming, module boundaries, import ordering)</li>
<li><strong>Boundaries</strong> — what the agent should never do (modify generated files, skip tests, etc.)</li>
</ol>
<p>The key principle is <strong>non-inferability</strong>: include only details the agent cannot figure out by reading the code. ETH Zurich found that architectural overviews did not reduce navigation time — removing an Architecture section while keeping commands, constraints, and non-standard patterns produces the same agent behaviour at lower token cost. Non-standard tooling (pixi, custom build systems, unusual package managers) delivers the highest ROI because these tools are underrepresented in LLM training data.</p>
<h4 id="effective-patterns">Effective patterns</h4>
<p><strong>Definition of Done</strong> — eliminates false completion claims:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## Definition of Done</span>
A task is complete when ALL of the following pass:
<span class="hljs-bullet">1.</span> <span class="hljs-code">`task lint`</span> exits 0
<span class="hljs-bullet">2.</span> <span class="hljs-code">`task test`</span> exits 0
<span class="hljs-bullet">3.</span> <span class="hljs-code">`task typecheck`</span> exits 0
<span class="hljs-bullet">4.</span> Commit message follows: <span class="hljs-code">`type(scope): description`</span>
</code></pre>
<p><strong>Escalation rules</strong> — prevents destructive workarounds when the agent is stuck:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## When Blocked</span>
<span class="hljs-bullet">-</span> Tests fail after 3 attempts: stop and report the error
<span class="hljs-bullet">-</span> Missing dependency: check requirements first, do not install without asking
<span class="hljs-bullet">-</span> Never: delete files to resolve errors, force push, skip tests
</code></pre>
<p><strong>Decision log</strong> — prevents agents from suggesting already-rejected alternatives:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## Architecture Decisions</span>
<span class="hljs-bullet">-</span> mdBook over Docusaurus (Markdown-native, fast builds)
<span class="hljs-bullet">-</span> Nix over Docker for dev environments (reproducibility)
<span class="hljs-bullet">-</span> Do NOT suggest switching these.
</code></pre>
<p><strong>Task-organised sections</strong> — reduces irrelevant context parsing:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## When Writing Code</span>
<span class="hljs-bullet">-</span> Run <span class="hljs-code">`task lint`</span> after every file change

<span class="hljs-section">## When Reviewing Code</span>
<span class="hljs-bullet">-</span> Check: <span class="hljs-code">`task security-scan`</span>

<span class="hljs-section">## When Releasing</span>
<span class="hljs-bullet">-</span> Update version in <span class="hljs-code">`flake.nix`</span>
</code></pre>
<h4 id="hooks-vs-instructions">Hooks vs instructions</h4>
<p>Anthropic draws a clear distinction:</p>
<ul>
<li><strong>CLAUDE.md instructions</strong> are <em>advisory</em>. The agent may not follow them, especially as context grows.</li>
<li><strong>Hooks</strong> are <em>deterministic</em>. Scripts that run automatically at specific points (before/after tool use, session start). Guaranteed to execute.</li>
</ul>
<p><strong>Rule of thumb</strong>: if an action must happen every time with zero exceptions (run a formatter after every edit, block writes to a protected directory), use a hook. If it is guidance, use CLAUDE.md.</p>
<h4 id="best-practices">Best practices</h4>
<p><strong>Keep it short.</strong> Aim for under 200 lines. Research shows that all frontier LLMs lose accuracy as input grows — some dropping from 95% to 60% past a threshold. For every line, ask: <em>&quot;Would removing this cause the agent to make mistakes?&quot;</em> If not, cut it.</p>
<p><strong>Commands over prose.</strong> Lead with exact commands, not explanations. Setup first, testing second, deployment third, debugging last.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># Good: actionable</span>
<span class="hljs-section">## Test</span>
<span class="hljs-bullet">-</span> <span class="hljs-code">`task test`</span> — run all tests
<span class="hljs-bullet">-</span> <span class="hljs-code">`task test -- -run TestAuth`</span> — run a single test

<span class="hljs-section"># Bad: vague</span>
<span class="hljs-section">## Testing</span>
Please make sure all tests pass before committing.
</code></pre>
<p><strong>Don't duplicate the linter.</strong> If <code>treefmt</code> enforces formatting and <code>eslint</code> enforces style, do not repeat those rules in AGENTS.md. LLMs are slow and expensive at jobs a linter does instantly and deterministically. Use <strong>hooks</strong> instead — they run automatically and catch mistakes before they are committed.</p>
<p><strong>Use progressive disclosure.</strong> Do not inline everything. Reference deeper docs by path — the agent pulls them only when relevant:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## Architecture</span>
See [<span class="hljs-string">docs/architecture.md</span>](<span class="hljs-link">./docs/architecture.md</span>) for the full diagram.
The key directories are:
<span class="hljs-bullet">-</span> <span class="hljs-code">`src/`</span> — source code
<span class="hljs-bullet">-</span> <span class="hljs-code">`tests/`</span> — test suites
<span class="hljs-bullet">-</span> <span class="hljs-code">`infra/`</span> — Terraform modules
</code></pre>
<p><strong>Review it regularly.</strong> Stale information actively poisons context. If your AGENTS.md says authentication logic lives in <code>src/auth/</code> and that directory was renamed to <code>src/identity/</code>, the agent will confidently look in the wrong place. Treat AGENTS.md like CI config — require PR reviews for changes.</p>
<p><strong>Start with <code>/init</code>, then rewrite.</strong> Most AI tools offer a scaffolding command (<code>/init</code> in Claude Code) that analyses your codebase to detect build systems, test frameworks, and patterns. Use it as a foundation, then rewrite by hand.</p>
<h4 id="hierarchy-and-scoping">Hierarchy and scoping</h4>
<p>AGENTS.md files follow a <strong>nearest-file-wins</strong> rule. Place them at different levels of your repository:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>repo/
├── AGENTS.md              # Root: global defaults
├── CLAUDE.md              # Claude Code (can import AGENTS.md)
├── packages/
│   ├── api/
│   │   └── AGENTS.md      # API-specific conventions
│   └── frontend/
│       └── AGENTS.md      # Frontend-specific conventions
</code></pre>
<p>Agents concatenate files from root to leaf, with <strong>closer files appearing later</strong> so they override earlier guidance. This lets different parts of a monorepo have different rules without conflict.</p>
<p>For Claude Code specifically, <code>CLAUDE.md</code> supports three tiers:</p>
<ol>
<li><strong>User-level</strong> (<code>~/.claude/CLAUDE.md</code>) — personal preferences across all projects</li>
<li><strong>Project-level</strong> (repo root) — project conventions</li>
<li><strong>Subdirectory-level</strong> — scoped overrides</li>
</ol>
<blockquote>
<p><strong>Bridging AGENTS.md and CLAUDE.md</strong>: Claude Code does not natively read <code>AGENTS.md</code>. The workaround is to create a <code>CLAUDE.md</code> whose first line is <code>@AGENTS.md</code> — an import directive that pulls in the shared file. This way, both Claude Code and every other agent read the same instructions.</p>
</blockquote>
<h4 id="anti-patterns">Anti-patterns</h4>
<table>
<thead>
<tr>
<th>Anti-pattern</th>
<th>Why it fails</th>
<th>Fix</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Vague instructions</strong> (&quot;be careful&quot;, &quot;write clean code&quot;)</td>
<td>No actionable command, no threshold to meet</td>
<td>Specific: &quot;Run <code>task lint</code> before committing&quot;</td>
</tr>
<tr>
<td><strong>Prose paragraphs</strong></td>
<td>LLMs skip or misinterpret long narrative</td>
<td>Bullet points with exact commands</td>
</tr>
<tr>
<td><strong>Contradictory priorities</strong></td>
<td>Agent oscillates between conflicting rules (ICLR 2026: -42% resolve rate)</td>
<td>Rank priorities explicitly</td>
</tr>
<tr>
<td><strong>Including secrets</strong></td>
<td>Leaked to anyone with repo access, cached in AI context</td>
<td>Use environment variables and <code>.env</code> files</td>
</tr>
<tr>
<td><strong>Documenting file paths that change</strong></td>
<td>Stale paths poison context more than no paths</td>
<td>Reference by pattern (<code>src/**/test_*.py</code>) or keep paths updated</td>
</tr>
<tr>
<td><strong>Too long (500+ lines)</strong></td>
<td>Causes &quot;agentic drift&quot; — agent starts strong then becomes incoherent</td>
<td>Under 200 lines; split into subdirectory files</td>
</tr>
<tr>
<td><strong>Human documentation instead of agent operations</strong></td>
<td>Agents need commands, not explanations</td>
<td>Write for a machine: what to run, what to check, what is &quot;done&quot;</td>
</tr>
<tr>
<td><strong>Auto-generating the file</strong></td>
<td>ETH Zurich: LLM-generated files reduced success in 5/8 settings, +20% cost</td>
<td>Always curate by hand; use <code>/init</code> only as a starting point</td>
</tr>
<tr>
<td><strong>Marking everything IMPORTANT</strong></td>
<td>Overuse dilutes emphasis; agent treats nothing as important</td>
<td>Reserve emphasis for truly non-negotiable rules</td>
</tr>
<tr>
<td><strong>Never updating</strong></td>
<td>Instructions drift as code evolves; stale info actively misleads</td>
<td>Review in PRs like code; prune when rules no longer apply</td>
</tr>
</tbody>
</table>
<h4 id="continuous-improvement-loop">Continuous improvement loop</h4>
<p>A powerful pattern is to ask the AI agent itself to improve the AGENTS.md:</p>
<blockquote>
<p>&quot;Summarise what you learned this session and suggest improvements to AGENTS.md.&quot;</p>
</blockquote>
<p>This creates a feedback loop where the agent helps refine its own instructions based on actual usage — what commands it needed to discover, what conventions it got wrong, what context was missing.</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="21" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="model-context-protocol-mcp">Model Context Protocol (MCP)</h3>
<p>The <a href="https://modelcontextprotocol.io/">Model Context Protocol</a> (MCP) is an open standard that defines how AI agents connect to external tools and data sources. Think of it as <strong>USB-C for AI</strong> — a universal plug that lets any agent talk to any service.</p>
<h4 id="the-problem-mcp-solves">The problem MCP solves</h4>
<p>Without MCP, every AI tool builds its own integrations:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Before MCP:
  Claude Code ──custom──&gt; GitHub
  Claude Code ──custom──&gt; Jira
  Copilot     ──custom──&gt; GitHub
  Copilot     ──custom──&gt; Jira
  Cursor      ──custom──&gt; GitHub
  ...

With MCP:
  Claude Code ──MCP──┐
  Copilot     ──MCP──┤──&gt; MCP Server (GitHub)
  Cursor      ──MCP──┘    MCP Server (Jira)
                           MCP Server (Datadog)
</code></pre>
<h4 id="how-mcp-works">How MCP works</h4>
<p>MCP follows a client-server architecture:</p>
<ul>
<li><strong>MCP Host</strong> — the AI application (Claude Code, an IDE plugin)</li>
<li><strong>MCP Client</strong> — maintains a 1:1 connection with a server</li>
<li><strong>MCP Server</strong> — exposes capabilities (tools, resources, prompts)</li>
</ul>
<p>Servers can provide three types of capabilities:</p>
<table>
<thead>
<tr>
<th>Capability</th>
<th>Description</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Tools</strong></td>
<td>Actions the AI can invoke</td>
<td><code>git_commit</code>, <code>create_jira_issue</code></td>
</tr>
<tr>
<td><strong>Resources</strong></td>
<td>Data the AI can read</td>
<td>File contents, database records</td>
</tr>
<tr>
<td><strong>Prompts</strong></td>
<td>Pre-built prompt templates</td>
<td>Code review checklist, PR description</td>
</tr>
</tbody>
</table>
<h4 id="mcp-in-practice">MCP in practice</h4>
<p>An MCP configuration for Claude Code lives in <code>.claude/settings.json</code> or the project's configuration:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;mcpServers&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;git&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;command&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;mcp-server-git&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;args&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;--repository&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;.&quot;</span><span class="hljs-punctuation">]</span>
    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;context7&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;command&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;npx&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;args&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;-y&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;@context7/mcp&quot;</span><span class="hljs-punctuation">]</span>
    <span class="hljs-punctuation">}</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<p>With this configuration, the AI agent can:</p>
<ul>
<li>Read git history, create branches, make commits</li>
<li>Fetch up-to-date library documentation instead of relying on training data</li>
</ul>
<h4 id="why-mcp-matters-for-documentation">Why MCP matters for documentation</h4>
<p>MCP servers like <a href="https://context7.com/">Context7</a> solve a fundamental documentation problem: <strong>AI models have a training cutoff</strong>. When a library releases a new version, the AI's knowledge is stale. MCP lets the agent fetch current documentation on demand, ensuring accurate and up-to-date guidance.</p>

<header>Technical Documentation</header>
<h3 id="skills">Skills</h3>
<p>Skills are <strong>reusable prompt packages</strong> that extend AI agents with specialised domain knowledge. They are to AI agents what libraries are to programming languages.</p>
<p>A skill encapsulates:</p>
<ul>
<li><strong>Domain expertise</strong> — best practices, patterns, anti-patterns</li>
<li><strong>Workflow</strong> — step-by-step procedures for common tasks</li>
<li><strong>Conventions</strong> — project or organisation-specific rules</li>
<li><strong>Tool orchestration</strong> — which tools to use and when</li>
</ul>
<h4 id="example-a-documentation-skill">Example: a documentation skill</h4>
<p>A Diátaxis documentation skill might contain:</p>
<ul>
<li>The four documentation types and their characteristics</li>
<li>Language patterns appropriate for each type</li>
<li>A workflow for evaluating and improving existing documentation</li>
<li>Common mistakes to avoid</li>
</ul>
<p>When activated, the AI agent applies this knowledge automatically — it does not need to be re-explained every session.</p>
<h4 id="skills-vs-agentsmd">Skills vs AGENTS.md</h4>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>AGENTS.md</th>
<th>Skills</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Scope</strong></td>
<td>One repository</td>
<td>Cross-repository</td>
</tr>
<tr>
<td><strong>Content</strong></td>
<td>Project-specific facts</td>
<td>Domain expertise and workflows</td>
</tr>
<tr>
<td><strong>Activation</strong></td>
<td>Automatic (agent reads on start)</td>
<td>On demand (invoked when relevant)</td>
</tr>
<tr>
<td><strong>Maintained by</strong></td>
<td>Repository owners</td>
<td>Skill authors (can be shared)</td>
</tr>
</tbody>
</table>
<p>They are complementary: <code>AGENTS.md</code> tells the agent <em>about this project</em>, skills tell the agent <em>how to do things well</em>.</p>

</section>

<h2 id="documentation-types-and-evolution">Documentation Types and Evolution</h2>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="26" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="adr-architectural-decision-records">ADR (Architectural Decision Records)</h3>
<p>An <a href="https://adr.github.io/">ADR</a> captures a single architectural decision: the context, the decision, and the consequences.</p>
<p>Why ADRs matter:</p>
<ul>
<li>They answer &quot;<strong>why</strong> was this done this way?&quot; — the question every new team member asks</li>
<li>They prevent relitigating decisions that were already carefully considered</li>
<li>They create a transparent, searchable decision trail</li>
</ul>
<h4 id="adr-format">ADR format</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># ADR-001: Use mdBook for course documentation</span>

<span class="hljs-section">## Status</span>
Accepted

<span class="hljs-section">## Context</span>
We need a documentation tool that supports Markdown, Mermaid diagrams,
and can be extended with preprocessors.

<span class="hljs-section">## Decision</span>
We will use mdBook with custom preprocessors.

<span class="hljs-section">## Consequences</span>
<span class="hljs-bullet">-</span> Positive: Markdown-native, fast builds, extensible
<span class="hljs-bullet">-</span> Negative: Less mature plugin ecosystem than Docusaurus
</code></pre>

<header>Technical Documentation</header>
<h3 id="tech-radar">Tech Radar</h3>
<p>A <a href="https://www.thoughtworks.com/radar">Tech Radar</a> is a living document that tracks the technologies a team or organisation uses, evaluates, or rejects.</p>
<p>It categorises technologies into rings:</p>
<ul>
<li><strong>Adopt</strong> — proven, use by default</li>
<li><strong>Trial</strong> — worth trying on real projects</li>
<li><strong>Assess</strong> — interesting, explore in side projects</li>
<li><strong>Hold</strong> — do not start new work with this</li>
</ul>
<p>The radar prevents technology sprawl and makes technical choices visible to the whole organisation.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>

<header>Technical Documentation</header>
<h3 id="eventstorming">EventStorming</h3>
<p><a href="https://www.eventstorming.com/">EventStorming</a> is a collaborative workshop format for modelling business processes. Participants use sticky notes to map out domain events, commands, and aggregates.</p>
<p>It produces documentation as a side effect: the resulting event map is itself a powerful architectural diagram that captures business flows.</p>

<header>Technical Documentation</header>
<h2 id="best-practices-for-writing-documentation">Best Practices for Writing Documentation</h2>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="31" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="clarity-and-structure">Clarity and Structure</h3>
<ul>
<li>Use simple, precise language — write for someone who has never seen the project</li>
<li>Organise content into coherent sections with clear headings</li>
<li>Use tables for structured data, code blocks for commands and config</li>
<li>Keep paragraphs short — three to five sentences maximum</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="32" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="consistency-and-uniformity">Consistency and Uniformity</h3>
<ul>
<li>Adhere to a style guide (or create one)</li>
<li>Use automated validation tools:
<ul>
<li><a href="https://github.com/errata-ai/vale">Vale</a> — prose linter with customisable rules</li>
<li><a href="https://doc-detective.com/">Doc Detective</a> — automated documentation testing</li>
<li><a href="https://github.com/DavidAnson/markdownlint">markdownlint</a> — Markdown style enforcement</li>
</ul>
</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="33" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="writing-style-techniques">Writing Style Techniques</h3>
<p>How you write matters as much as what you write. Style affects comprehension, trust, and how quickly a reader can act on information.</p>
<h4 id="active-voice-vs-passive-voice">Active voice vs passive voice</h4>
<p>Active voice makes sentences shorter, clearer, and more direct. Passive voice obscures who does what.</p>
<table>
<thead>
<tr>
<th>Passive (avoid)</th>
<th>Active (prefer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;The configuration file is read by the application&quot;</td>
<td>&quot;The application reads the configuration file&quot;</td>
</tr>
<tr>
<td>&quot;Errors are logged when a request is failed&quot;</td>
<td>&quot;The server logs errors when a request fails&quot;</td>
</tr>
<tr>
<td>&quot;The tests should be run before committing&quot;</td>
<td>&quot;Run the tests before committing&quot;</td>
</tr>
</tbody>
</table>
<p><strong>When passive is acceptable</strong>: when the actor is irrelevant or unknown (&quot;Logs are rotated daily&quot;, &quot;The bug was introduced in v2.3&quot;).</p>
<h4 id="use-imperative-mood-for-instructions">Use imperative mood for instructions</h4>
<p>In tutorials and how-to guides, tell the reader what to do — do not describe what they might do.</p>
<table>
<thead>
<tr>
<th>Descriptive (avoid)</th>
<th>Imperative (prefer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;You can start the server by running...&quot;</td>
<td>&quot;Start the server:&quot;</td>
</tr>
<tr>
<td>&quot;The user should then open the file...&quot;</td>
<td>&quot;Open the file:&quot;</td>
</tr>
<tr>
<td>&quot;It is possible to configure X by...&quot;</td>
<td>&quot;To configure X:&quot;</td>
</tr>
</tbody>
</table>
<h4 id="second-person-you-vs-third-person">Second person (&quot;you&quot;) vs third person</h4>
<p>Use <strong>&quot;you&quot;</strong> when addressing the reader directly. Avoid the detached third person (&quot;the user&quot;, &quot;the developer&quot;, &quot;one&quot;).</p>
<table>
<thead>
<tr>
<th>Third person (avoid)</th>
<th>Second person (prefer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;The developer must install Nix&quot;</td>
<td>&quot;You must install Nix&quot;</td>
</tr>
<tr>
<td>&quot;One can verify the setup by running...&quot;</td>
<td>&quot;Verify the setup by running:&quot;</td>
</tr>
</tbody>
</table>
<p>Exception: reference documentation often uses neutral third person because it describes the system, not the reader.</p>
<h4 id="present-tense-vs-future-tense">Present tense vs future tense</h4>
<p>Write in present tense. Documentation describes how things <strong>are</strong>, not how they will be.</p>
<table>
<thead>
<tr>
<th>Future (avoid)</th>
<th>Present (prefer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;The command will create a new directory&quot;</td>
<td>&quot;The command creates a new directory&quot;</td>
</tr>
<tr>
<td>&quot;The server will respond with a 200 status&quot;</td>
<td>&quot;The server responds with a 200 status&quot;</td>
</tr>
<tr>
<td>&quot;This will fail if the file does not exist&quot;</td>
<td>&quot;This fails if the file does not exist&quot;</td>
</tr>
</tbody>
</table>
<h4 id="sentence-length-and-complexity">Sentence length and complexity</h4>
<ul>
<li>Aim for <strong>15–25 words</strong> per sentence</li>
<li>One idea per sentence</li>
<li>Break long sentences at natural conjunctions (&quot;and&quot;, &quot;but&quot;, &quot;because&quot;)</li>
<li>If a sentence has more than one comma, consider splitting it</li>
</ul>
<table>
<thead>
<tr>
<th>Too long</th>
<th>Better</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;The server reads the configuration file on startup, validates all required fields, logs any missing values, and exits with an error code if the configuration is invalid.&quot;</td>
<td>&quot;The server reads the configuration file on startup. It validates all required fields and logs any missing values. If the configuration is invalid, it exits with an error code.&quot;</td>
</tr>
</tbody>
</table>
<h4 id="avoid-nominalisations">Avoid nominalisations</h4>
<p>A nominalisation turns a verb into a noun, making prose bloated and vague.</p>
<table>
<thead>
<tr>
<th>Nominalised (avoid)</th>
<th>Direct (prefer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;Perform an installation of...&quot;</td>
<td>&quot;Install...&quot;</td>
</tr>
<tr>
<td>&quot;Make a modification to...&quot;</td>
<td>&quot;Modify...&quot;</td>
</tr>
<tr>
<td>&quot;Carry out the execution of...&quot;</td>
<td>&quot;Run...&quot;</td>
</tr>
<tr>
<td>&quot;Conduct an investigation into...&quot;</td>
<td>&quot;Investigate...&quot;</td>
</tr>
</tbody>
</table>
<h4 id="hedging-and-weasel-words">Hedging and weasel words</h4>
<p>Remove words that weaken your statements without adding precision.</p>
<table>
<thead>
<tr>
<th>Hedged (avoid)</th>
<th>Direct (prefer)</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;It is generally recommended to...&quot;</td>
<td>&quot;We recommend...&quot;</td>
</tr>
<tr>
<td>&quot;This can potentially cause...&quot;</td>
<td>&quot;This causes...&quot;</td>
</tr>
<tr>
<td>&quot;It should be noted that...&quot;</td>
<td>(just state the fact)</td>
</tr>
<tr>
<td>&quot;Basically, the system...&quot;</td>
<td>&quot;The system...&quot;</td>
</tr>
</tbody>
</table>
<h4 id="parallel-structure">Parallel structure</h4>
<p>When listing items, use the same grammatical structure for each.</p>
<table>
<thead>
<tr>
<th>Not parallel</th>
<th>Parallel</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;The tool can: lint code, running tests, and the formatting of files&quot;</td>
<td>&quot;The tool can: lint code, run tests, and format files&quot;</td>
</tr>
<tr>
<td>&quot;Prerequisites: install Nix, Docker should be running, you need Git&quot;</td>
<td>&quot;Prerequisites: install Nix, start Docker, install Git&quot;</td>
</tr>
</tbody>
</table>
<h4 id="terminology-consistency">Terminology consistency</h4>
<p>Pick one term and stick with it. Do not alternate between synonyms.</p>
<table>
<thead>
<tr>
<th>Inconsistent</th>
<th>Consistent</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;container&quot; / &quot;Docker image&quot; / &quot;image&quot; (interchangeably)</td>
<td>&quot;container image&quot; (everywhere)</td>
</tr>
<tr>
<td>&quot;repo&quot; / &quot;repository&quot; / &quot;codebase&quot;</td>
<td>&quot;repository&quot; (everywhere)</td>
</tr>
<tr>
<td>&quot;CLI&quot; / &quot;command line&quot; / &quot;terminal&quot;</td>
<td>&quot;command line&quot; (everywhere, or define abbreviation once)</td>
</tr>
</tbody>
</table>
<h4 id="documentation-specific-patterns">Documentation-specific patterns</h4>
<table>
<thead>
<tr>
<th>Pattern</th>
<th>When to use</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Admonitions</strong></td>
<td>Warnings, tips, important notes</td>
<td><code>&gt; **Warning**: This deletes all data.</code></td>
</tr>
<tr>
<td><strong>Code fences with language</strong></td>
<td>Any command or code</td>
<td><code>```bash</code> not <code>```</code></td>
</tr>
<tr>
<td><strong>Placeholder syntax</strong></td>
<td>Values the reader must replace</td>
<td><code>&lt;your-api-key&gt;</code> or <code>${PROJECT_NAME}</code></td>
</tr>
<tr>
<td><strong>Cross-references</strong></td>
<td>Linking related concepts</td>
<td><code>See [ADR-001](./adr/001.md) for context</code></td>
</tr>
<tr>
<td><strong>Changelog-style</strong></td>
<td>Describing what changed</td>
<td>&quot;Added&quot;, &quot;Changed&quot;, &quot;Removed&quot;, &quot;Fixed&quot;</td>
</tr>
</tbody>
</table>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="34" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="documentation-as-code">Documentation as Code</h3>
<p>Treat documentation like source code:</p>
<ul>
<li><strong>Version controlled</strong> — documentation lives in Git alongside the code it describes</li>
<li><strong>Reviewed</strong> — documentation changes go through pull requests</li>
<li><strong>Tested</strong> — link checkers, prose linters, and build checks run in CI</li>
<li><strong>Automated</strong> — generation from source code, diagrams from code, API docs from schemas</li>
</ul>
<p>This ensures documentation stays in sync with the codebase.</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="37" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="why-make-documentation-accessible">Why Make Documentation Accessible?</h3>
<ul>
<li>Inclusion for all users, including those with visual or motor impairments</li>
<li>Compliance with standards (e.g., <a href="https://www.w3.org/WAI/WCAG21/quickref/">WCAG 2.1</a>)</li>
<li>Better documentation for everyone — accessible writing is clearer writing</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="38" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="practices">Practices</h3>
<ul>
<li>Use semantic headings (<code>#</code>, <code>##</code>, <code>###</code>) in proper hierarchy</li>
<li>Provide alt text for images</li>
<li>Ensure sufficient colour contrast</li>
<li>Use descriptive link text (not &quot;click here&quot;)</li>
<li>Test with screen readers</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="41" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="generation-from-source-code">Generation from Source Code</h3>
<p>Good code documentation is extracted, not written separately:</p>
<ul>
<li><a href="https://doc.rust-lang.org/rustdoc/">rustdoc</a> — generates documentation from Rust doc comments, including runnable examples</li>
<li><a href="https://docs.oracle.com/javase/8/docs/technotes/tools/windows/javadoc.html">Javadoc</a> / <a href="https://kotlinlang.org/docs/kotlin-doc.html">KDoc</a> — JVM documentation generation</li>
<li><a href="https://swagger.io/">Swagger / OpenAPI</a> — generates API documentation from specifications</li>
</ul>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-header="Technical Documentation" data-footer="Julien Dauliac -- ynov.casualty925@passfwd.com" data-paginate="true" data-heading-divider="3" lang="en-US" data-marpit-pagination="42" style="--header:Technical Documentation;--footer:Julien Dauliac -- ynov.casualty925@passfwd.com;--paginate:true;--heading-divider:3;" data-marpit-pagination-total="51">
<header>Technical Documentation</header>
<h3 id="interactive-documentation">Interactive Documentation</h3>
<ul>
<li><a href="https://github.com/FauconFan/mdbook-cmdrun">mdBook cmd-run</a> — executes commands within documentation and embeds their output</li>

<header>Technical Documentation</header>
<h2 id="putting-it-all-together">Putting It All Together</h2>
<p>A well-documented repository in 2026 looks like this:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>my-project/
├── AGENTS.md                  # AI agent instructions
├── CLAUDE.md -&gt; AGENTS.md     # Symlink for Claude Code
├── CONTRIBUTING.md            # Human contributor guide
├── CODE_OF_CONDUCT.md         # Behavioural expectations
├── CHANGELOG.md               # Release history
├── LICENSE                    # Legal terms
├── SECURITY.md                # Vulnerability reporting
├── README.md                  # Project overview
├── .claude/
│   └── settings.json          # MCP server configuration
├── .github/
│   ├── ISSUE_TEMPLATE/        # Structured issue templates
│   └── PULL_REQUEST_TEMPLATE.md
├── docs/
│   ├── adr/                   # Architectural Decision Records
│   │   ├── 001-use-mdbook.md
│   │   └── 002-use-nix.md
│   ├── tutorials/             # Diátaxis: learning by doing
│   ├── how-to/                # Diátaxis: working guides
│   ├── reference/             # Diátaxis: factual lookup
│   └── explanation/           # Diátaxis: understanding
└── src/                       # Source code with inline docs
</code></pre>
<p>The key insight: <strong>documentation is not a single thing</strong>. It is a system of interconnected documents, each serving a specific audience and purpose. Diátaxis gives you the framework, community standard files give you the structure, and AI tools (AGENTS.md, MCP, skills) ensure that both humans and machines can navigate and contribute to the project effectively.</p>
<footer>Julien Dauliac -- <a href="mailto:ynov.casualty925@passfwd.com">ynov.casualty925@passfwd.com</a></footer>
</section>
