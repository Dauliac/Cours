<h1 id="tp-1-packaging-with-nix">TP 1: Packaging with Nix</h1>
<h2 id="learning-objectives">Learning Objectives</h2>
<p>By the end of this practical, you will be able to:</p>
<ol>
<li><strong>Understand</strong> what Nix is and why reproducible builds matter</li>
<li><strong>Set up</strong> a Nix flake project from scratch using the course template</li>
<li><strong>Use</strong> a reproducible development environment with <code>devShells</code></li>
<li><strong>Package</strong> a simple application with Nix</li>
<li><strong>Inspect</strong> derivations, dependency trees, and closures to understand Nix artefacts</li>
<li><strong>Use</strong> the Nix REPL to interactively explore packages and flake outputs</li>
<li><strong>Explain</strong> the difference between imperative and declarative package management</li>
</ol>
<h2 id="prerequisites">Prerequisites</h2>
<ul>
<li><a href="../../../nix/INSTALL.md">Nix is installed</a></li>
<li><a href="../../../nix/COMMA.md">Comma is installed</a></li>
<li>Basic command-line skills (cd, ls, cat, git)</li>
<li>A text editor you are comfortable with</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h2 id="part-1-why-nix-15-min">Part 1: Why Nix? (15 min)</h2>
<h3 id="the-problem">The Problem</h3>
<p>Imagine this situation: you join a new team. You clone the project, run <code>npm install</code>, and...<br />
it fails. A colleague says <em>&quot;it works on my machine&quot;</em>. You spend 2 hours debugging.</p>
<p><strong>This is the problem Nix solves.</strong></p>
<h3 id="traditional-package-management-vs-nix">Traditional package management vs Nix</h3>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Traditional (apt, brew, npm)</th>
<th>Nix</th>
</tr>
</thead>
<tbody>
<tr>
<td>Install location</td>
<td>Global (<code>/usr/bin</code>, <code>/usr/lib</code>)</td>
<td>Isolated (<code>/nix/store/...</code>)</td>
</tr>
<tr>
<td>Reproducibility</td>
<td>&quot;It works on my machine&quot;</td>
<td>Same input = same output, always</td>
</tr>
<tr>
<td>Rollback</td>
<td>Difficult or impossible</td>
<td>Built-in, instant</td>
</tr>
<tr>
<td>Multiple versions</td>
<td>Conflicts</td>
<td>No conflicts, all coexist</td>
</tr>
<tr>
<td>Dependency tracking</td>
<td>Partial</td>
<td>Complete dependency graph</td>
</tr>
</tbody>
</table>
<h3 id="key-concepts">Key Concepts</h3>
<p><strong>Derivation</strong>: A Nix derivation is a <em>recipe</em> that describes how to build something. It specifies:</p>
<ul>
<li>The source code</li>
<li>The build dependencies</li>
<li>The build commands</li>
<li>The expected output</li>
</ul>
<p>Think of it like a cooking recipe: given the same ingredients and the same steps, you always get the same dish.</p>
<p><strong>The Nix Store</strong>: Every package built by Nix lives in <code>/nix/store/</code> with a unique hash in its path:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>/nix/store/abc123...-python-3.11.5/
/nix/store/def456...-python-3.12.1/
</code></pre>
<p>Both versions coexist without conflict. The hash ensures that if any input changes, the path changes too.</p>
<p><strong>Flake</strong>: A <code>flake.nix</code> file is the modern entry point for a Nix project. It declares:</p>
<ul>
<li><strong>inputs</strong>: where dependencies come from (e.g., nixpkgs)</li>
<li><strong>outputs</strong>: what the project provides (packages, dev shells, etc.)</li>
</ul>
<h3 id="check-your-understanding">Check Your Understanding</h3>
<p>Before moving on, make sure you can answer:</p>
<ul>
<li>Why can two versions of Python coexist in the Nix store?</li>
<li>What happens to the store path if you change a build dependency?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<h2 id="part-2-setting-up-your-project-20-min">Part 2: Setting Up Your Project (20 min)</h2>
<h3 id="step-1-initialize-the-project">Step 1: Initialize the project</h3>
<p>Create a new directory and initialize it with the course template:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">mkdir</span> -p my-first-nix-project
<span class="hljs-built_in">cd</span> my-first-nix-project
git init  <span class="hljs-comment"># Safe to run multiple times</span>
nix flake init -t <span class="hljs-string">&#x27;github:Dauliac/Cours&#x27;</span>  <span class="hljs-comment"># Skip this if flake.nix already exists</span>
</code></pre>
<blockquote>
<p><strong>If <code>nix flake init</code> fails</strong> with &quot;file already exists&quot;, it means you already ran this step. You can safely move on.</p>
</blockquote>
<h3 id="step-2-explore-what-was-generated">Step 2: Explore what was generated</h3>
<p>List the files:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">find . -<span class="hljs-built_in">type</span> f
</code></pre>
<p>You should see:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>./flake.nix          # The project's entry point
./nix/default.nix    # Auto-imports all .nix files in nix/
./nix/dev-shell.nix  # Development environment definition
./nix/treefmt.nix    # Code formatting configuration
./Taskfile.yaml      # Task runner (like Make, but better)
./.envrc             # Direnv integration (auto-loads the environment)
./lefthook.yaml      # Git hooks configuration
</code></pre>
<h3 id="step-3-understand-the-flake-structure">Step 3: Understand the flake structure</h3>
<p>Open <code>flake.nix</code> and read it carefully:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cat</span> flake.nix
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix">{
  <span class="hljs-attr">description</span> = <span class="hljs-string">&quot;Changeme&quot;</span>;            <span class="hljs-comment"># &lt;- Describe your project here</span>
  <span class="hljs-attr">inputs</span> = {
    nixpkgs.<span class="hljs-attr">url</span> = <span class="hljs-string">&quot;github:NixOS/nixpkgs/nixos-24.11&quot;</span>;  <span class="hljs-comment"># &lt;- Package repository</span>
    flake-parts.<span class="hljs-attr">url</span> = <span class="hljs-string">&quot;github:hercules-ci/flake-parts&quot;</span>;  <span class="hljs-comment"># &lt;- Flake helper</span>
    treefmt-nix.<span class="hljs-attr">url</span> = <span class="hljs-string">&quot;github:numtide/treefmt-nix&quot;</span>;      <span class="hljs-comment"># &lt;- Code formatter</span>
  };
  <span class="hljs-attr">outputs</span> = inputs@{ flake-parts, ... }:
    flake-parts.lib.mkFlake { <span class="hljs-keyword">inherit</span> inputs; } (_: {
      <span class="hljs-attr">systems</span> = [
        <span class="hljs-string">&quot;x86_64-linux&quot;</span>
        <span class="hljs-string">&quot;x86_64-darwin&quot;</span>
        <span class="hljs-string">&quot;aarch64-darwin&quot;</span>
      ];
      <span class="hljs-attr">imports</span> = [ ./nix ];  <span class="hljs-comment"># &lt;- All Nix configuration lives in ./nix/</span>
    });
}
</code></pre>
<p><strong>Key takeaway</strong>: <code>inputs</code> declares <em>where</em> things come from. <code>outputs</code> declares <em>what</em> the project provides. The <code>./nix/</code> directory contains the actual definitions.</p>
<h3 id="step-4-enter-the-development-environment">Step 4: Enter the development environment</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Track all generated files (Nix flakes ONLY see git-tracked files!)</span>
git add .

<span class="hljs-comment"># Enter the development shell</span>
nix develop
</code></pre>
<blockquote>
<p><strong>Why <code>git add</code>?</strong> Nix flakes use git to determine which files exist. If a file is not tracked by git, Nix cannot see it. This is a common source of &quot;file not found&quot; errors. <strong>Always <code>git add</code> new files before running any <code>nix</code> command.</strong></p>
</blockquote>
<p>You are now inside a reproducible shell. Every tool listed in <code>nix/dev-shell.nix</code> is available, regardless of what is installed on your system.</p>
<p>Try it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># These tools are available even if you never installed them:</span>
task --version
vale --version
convco --version
</code></pre>
<h3 id="step-5-understand-the-dev-shell">Step 5: Understand the dev shell</h3>
<p>Open <code>nix/dev-shell.nix</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix">devShells.<span class="hljs-attr">default</span> = pkgs.mkShell {
  <span class="hljs-attr">nativeBuildInputs</span> = <span class="hljs-keyword">with</span> pkgs; [
    go-task       <span class="hljs-comment"># Task runner</span>
    lefthook      <span class="hljs-comment"># Git hooks</span>
    vale          <span class="hljs-comment"># Documentation linter</span>
    trufflehog    <span class="hljs-comment"># Secret scanner</span>
    convco        <span class="hljs-comment"># Conventional commits</span>
    sops          <span class="hljs-comment"># Secret management</span>
  ];
  <span class="hljs-attr">shellHook</span> = <span class="hljs-string">&#x27;&#x27;
    lefthook install --force
  &#x27;&#x27;</span>;
};
</code></pre>
<p><strong><code>nativeBuildInputs</code></strong> lists the tools available in the shell. <strong><code>shellHook</code></strong> runs commands when you enter the shell (here: installing git hooks).</p>
<h3 id="checkpoint">Checkpoint</h3>
<p>Run these commands and verify they work:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">nix develop
task --list
nix flake show
</code></pre>
<p><code>nix flake show</code> displays all the outputs of your project. You should see your <code>devShell</code> listed.</p>
<h3 id="step-5b-discover-the-build-tools">Step 5b: Discover the build tools</h3>
<p>Your dev shell includes two tools that make working with Nix much more pleasant:</p>
<p><strong><code>nom</code> (nix-output-monitor)</strong>: Replaces the default Nix build output with a rich, real-time view showing what's being built, downloaded, and how much is left:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Instead of plain &quot;nix build&quot;:</span>
nom build
</code></pre>
<p>You will see a live progress bar with active builds, downloads, and store paths. This is especially useful when building for the first time (many dependencies to fetch).</p>
<p><strong><code>nix-tree</code></strong>: An interactive terminal tool to explore the dependency tree of any Nix package:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Explore the dev shell&#x27;s dependencies interactively</span>
nix-tree .<span class="hljs-comment">#devShells.x86_64-linux.default</span>
</code></pre>
<p>Navigate with arrow keys, press Enter to expand nodes. This shows you exactly what Nix pulled in and why.</p>
<p>Try both now. You will use them throughout the TPs.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="en-US">
<h2 id="part-3-adding-dependencies-15-min">Part 3: Adding Dependencies (15 min)</h2>
<h3 id="step-6-add-a-tool-to-your-dev-shell">Step 6: Add a tool to your dev shell</h3>
<p>Let's say your project needs <code>jq</code> (a JSON processor) and <code>curl</code>. Edit <code>nix/dev-shell.nix</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix"><span class="hljs-attr">nativeBuildInputs</span> = <span class="hljs-keyword">with</span> pkgs; [
  go-task
  lefthook
  vale
  trufflehog
  convco
  sops
  jq       <span class="hljs-comment"># &lt;- Add this</span>
  curl     <span class="hljs-comment"># &lt;- Add this</span>
];
</code></pre>
<p>Now reload the shell:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># If you are inside a nix develop session, leave it first:</span>
<span class="hljs-comment"># Press Ctrl+D or type &#x27;exit&#x27;</span>
<span class="hljs-comment"># Then re-enter:</span>
nix develop
jq --version   <span class="hljs-comment"># Verify jq is available</span>
curl --version <span class="hljs-comment"># Verify curl is available</span>
</code></pre>
<h3 id="how-to-find-packages">How to find packages</h3>
<p>Search for packages in nixpkgs:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># From the command line</span>
nix search nixpkgs python

<span class="hljs-comment"># Or use the web interface: https://search.nixos.org/packages</span>
</code></pre>
<h3 id="step-7-try-with-direnv-optional-but-recommended">Step 7: Try with direnv (optional but recommended)</h3>
<p>If you have <code>direnv</code> installed, the <code>.envrc</code> file will automatically load your dev shell whenever you <code>cd</code> into the project:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">direnv allow
<span class="hljs-built_in">cd</span> ..
<span class="hljs-built_in">cd</span> my-first-nix-project  <span class="hljs-comment"># Shell loads automatically</span>
</code></pre>
<p>No more <code>nix develop</code> needed. The environment loads and unloads as you navigate.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h2 id="part-4-packaging-a-simple-application-30-min">Part 4: Packaging a Simple Application (30 min)</h2>
<h3 id="step-8-write-a-small-program">Step 8: Write a small program</h3>
<p>Create a simple shell script that we will package with Nix.</p>
<p>Create a file <code>hello.sh</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-meta">#!/usr/bin/env bash</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;Hello from my first Nix package!&quot;</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;Current date: <span class="hljs-subst">$(date)</span>&quot;</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;Built with Nix - reproducible by design.&quot;</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git add hello.sh
</code></pre>
<h3 id="step-9-create-the-nix-package-definition">Step 9: Create the Nix package definition</h3>
<p>Create a file <code>nix/package.nix</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix">{ pkgs, ... }:
{
  config.<span class="hljs-attr">perSystem</span> =
    { pkgs, config, ... }:
    {
      packages.<span class="hljs-attr">default</span> = pkgs.writeShellApplication {
        <span class="hljs-attr">name</span> = <span class="hljs-string">&quot;hello-nix&quot;</span>;
        <span class="hljs-attr">runtimeInputs</span> = <span class="hljs-keyword">with</span> pkgs; [ coreutils ];
        <span class="hljs-attr">text</span> = <span class="hljs-built_in">builtins</span>.readFile ../hello.sh;
      };

      <span class="hljs-comment"># Expose the package as a runnable app</span>
      apps.<span class="hljs-attr">default</span> = {
        <span class="hljs-attr">type</span> = <span class="hljs-string">&quot;app&quot;</span>;
        <span class="hljs-attr">program</span> = <span class="hljs-string">&quot;<span class="hljs-subst">${config.packages.default}</span>/bin/hello-nix&quot;</span>;
      };
    };
}
</code></pre>
<p><strong>Line by line:</strong></p>
<ul>
<li><code>pkgs.writeShellApplication</code> is a Nix helper that creates a proper shell script package</li>
<li><code>name</code> is the name of the resulting binary</li>
<li><code>runtimeInputs</code> are the dependencies available at runtime</li>
<li><code>text</code> reads our script file</li>
<li><code>apps.default</code> exposes the package so you can run it directly with <code>nix run</code></li>
</ul>
<blockquote>
<p><strong>Remember</strong>: after creating any new <code>.nix</code> file, always <code>git add</code> it immediately. Nix flakes ignore untracked files.</p>
</blockquote>
<h3 id="step-10-track-the-new-file-with-git">Step 10: Track the new file with git</h3>
<blockquote>
<p><strong>Critical rule</strong>: Nix flakes can only see files tracked by git. Every time you create a new <code>.nix</code> file, you <strong>must</strong> run <code>git add</code> on it before Nix can use it.</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git add nix/package.nix
</code></pre>
<p>You do <strong>not</strong> need to edit <code>nix/default.nix</code>. The template uses auto-import: any <code>.nix</code> file you add to the <code>nix/</code> directory is automatically picked up, as long as git tracks it.</p>
<p>Open <code>nix/default.nix</code> to see how it works:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix"><span class="hljs-comment"># Auto-import all .nix files in this directory (except default.nix itself).</span>
<span class="hljs-comment"># Just create a new .nix file, run `git add` on it, and it will be picked up automatically.</span>
<span class="hljs-attr">nixFiles</span> = <span class="hljs-built_in">builtins</span>.filter (name: name != <span class="hljs-string">&quot;default.nix&quot;</span>) (
  <span class="hljs-built_in">builtins</span>.filter (name: <span class="hljs-built_in">builtins</span>.match <span class="hljs-string">&quot;.*\\.nix&quot;</span> name != <span class="hljs-literal">null</span>) (
    <span class="hljs-built_in">builtins</span>.attrNames (<span class="hljs-built_in">builtins</span>.readDir ./.)
  )
);
</code></pre>
<p>This reads all <code>.nix</code> files in the directory and imports them. No manual registration needed.</p>
<h3 id="step-11-build-and-run-your-package">Step 11: Build and run your package</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Build the package with fancy output</span>
nom build

<span class="hljs-comment"># The result is a symlink called &quot;result&quot;</span>
<span class="hljs-built_in">ls</span> -la result/

<span class="hljs-comment"># Run it directly from the build output</span>
./result/bin/hello-nix

<span class="hljs-comment"># Or run it with nix run (builds + runs in one step)</span>
nix run
</code></pre>
<p><code>nix run</code> builds the default app and executes it in one command - no need to find the binary yourself. You should see the greeting message. Congratulations, you just built your first Nix package.</p>
<h3 id="step-12-explore-the-build-output">Step 12: Explore the build output</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># See what&#x27;s in the result</span>
tree result/ 2&gt;/dev/null || find result/ -<span class="hljs-built_in">type</span> f

<span class="hljs-comment"># See the actual store path</span>
<span class="hljs-built_in">readlink</span> result
</code></pre>
<p>Notice the <code>/nix/store/HASH-hello-nix</code> path. This is your package in the Nix store. The hash is derived from <strong>all</strong> inputs. If you change the script, the hash changes.</p>
<h3 id="checkpoint-1">Checkpoint</h3>
<p>Verify your understanding by answering:</p>
<ul>
<li>What command builds a Nix flake's default package?</li>
<li>Where does the build output live?</li>
<li>What would happen if you changed the script text?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="part-5-understanding-derivations-and-dependencies-20-min">Part 5: Understanding Derivations and Dependencies (20 min)</h2>
<p>Now that you have a working package, let's look <em>inside</em> it. Nix gives you powerful tools to inspect exactly what was built, how, and why.</p>
<h3 id="step-13-inspect-the-derivation">Step 13: Inspect the derivation</h3>
<p>A <strong>derivation</strong> is the low-level build recipe Nix actually executes. Every <code>nix build</code> produces one. Let's look at yours:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">nix show-derivation .<span class="hljs-comment">#default</span>
</code></pre>
<p>This outputs JSON describing the exact build plan: the builder, arguments, environment variables, input sources, and input derivations. Notice:</p>
<ul>
<li><code>&quot;builder&quot;</code>: the program that runs the build (usually bash)</li>
<li><code>&quot;inputDrvs&quot;</code>: other derivations this one depends on (coreutils, bash, etc.)</li>
<li><code>&quot;env&quot;</code>: the environment variables set during the build</li>
<li><code>&quot;outputs&quot;</code>: where the result will be stored</li>
</ul>
<p>Every field is deterministic. Change any input, and the output hash changes.</p>
<h3 id="step-14-visualize-the-dependency-tree">Step 14: Visualize the dependency tree</h3>
<p>Use <code>nix-tree</code> to interactively explore what your package depends on:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">nix-tree .<span class="hljs-comment">#default</span>
</code></pre>
<p>Navigate with arrow keys and Enter. You will see your package at the top, with its full dependency tree below. Each node shows:</p>
<ul>
<li>The store path and its size</li>
<li>The closure size (total size including all transitive dependencies)</li>
</ul>
<p>This is the <strong>closure</strong> - the complete set of everything needed to run your package. Nothing more, nothing less.</p>
<h3 id="step-15-measure-the-closure">Step 15: Measure the closure</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Show all runtime dependencies with sizes</span>
nix path-info -rsSh .<span class="hljs-comment">#default</span>
</code></pre>
<p>This lists every store path in the closure with:</p>
<ul>
<li><strong>NAR size</strong> (<code>-s</code>): the size of the path itself</li>
<li><strong>Closure size</strong> (<code>-S</code>): total size including dependencies</li>
<li>Human-readable (<code>-h</code>)</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Just the total closure size</span>
nix path-info -Sh .<span class="hljs-comment">#default</span>
</code></pre>
<p>For a simple shell script, you should see a closure of around 30-40 MB (mostly coreutils and bash).</p>
<h3 id="step-16-explore-with-the-nix-repl">Step 16: Explore with the Nix REPL</h3>
<p>The Nix REPL lets you inspect and evaluate Nix expressions interactively. This is the most powerful debugging tool in the Nix ecosystem:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">nix repl
</code></pre>
<p>Inside the REPL, load your flake:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>:lf .
</code></pre>
<p>Now explore:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># See all outputs
outputs

# Inspect your package
outputs.packages.x86_64-linux.default

# See its name
outputs.packages.x86_64-linux.default.name

# See its derivation path
outputs.packages.x86_64-linux.default.drvPath

# List attributes of nixpkgs
builtins.attrNames inputs.nixpkgs.legacyPackages.x86_64-linux

# Check a package version
inputs.nixpkgs.legacyPackages.x86_64-linux.python3.version

# Exit
:q
</code></pre>
<p>The REPL is invaluable for debugging flakes, understanding how packages are composed, and exploring nixpkgs.</p>
<h3 id="step-17-build-and-run-with-style">Step 17: Build and run with style</h3>
<p>Use <code>nom</code> (nix-output-monitor) for a much better build experience:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Build with live progress display</span>
nom build

<span class="hljs-comment"># Build and run in one step</span>
nix run

<span class="hljs-comment"># Or use the task runner</span>
task build
task run
</code></pre>
<p><code>nom</code> replaces the default Nix output with a rich, real-time view showing active builds, downloads, and store paths. The <code>task run</code> command builds and runs the default app in one step.</p>
<h3 id="check-your-understanding-1">Check Your Understanding</h3>
<ul>
<li>What is the difference between a derivation and a package?</li>
<li>How can you find out why a dependency is in your closure?</li>
<li>What does <code>:lf .</code> do in the Nix REPL?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="part-6-code-quality-automation-20-min">Part 6: Code Quality Automation (20 min)</h2>
<h3 id="step-18-use-the-formatter">Step 18: Use the formatter</h3>
<p>The template includes <code>treefmt</code> for automatic code formatting:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Format all code in the project</span>
nix <span class="hljs-built_in">fmt</span>
</code></pre>
<p>This runs all configured formatters (see <code>nix/treefmt.nix</code>): shell formatting, Nix formatting, YAML formatting, and more. All at once, all reproducible.</p>
<h3 id="step-19-use-the-task-runner">Step 19: Use the task runner</h3>
<p>The template already includes a <code>Taskfile.yaml</code> with useful tasks. List them:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">task --list
</code></pre>
<p>You should see tasks like <code>build</code>, <code>run</code>, <code>test</code>, <code>tree</code>, <code>closure</code>, <code>fmt</code>, and <code>check</code>. Try them:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Build with nom (fancy output)</span>
task build

<span class="hljs-comment"># Build and run the default app in one step</span>
task run

<span class="hljs-comment"># Show the dependency tree interactively</span>
task tree

<span class="hljs-comment"># Show closure sizes</span>
task closure

<span class="hljs-comment"># Format all code</span>
task <span class="hljs-built_in">fmt</span>

<span class="hljs-comment"># Run all checks (format + build + test)</span>
task check
</code></pre>
<p>You can customize <code>Taskfile.yaml</code> to add your own tasks. For example, add a test that verifies your package output:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml">  <span class="hljs-attr">test:</span>
    <span class="hljs-attr">deps:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-string">build</span>
    <span class="hljs-attr">desc:</span> <span class="hljs-string">Test</span> <span class="hljs-string">the</span> <span class="hljs-string">package</span> <span class="hljs-string">runs</span> <span class="hljs-string">correctly</span>
    <span class="hljs-attr">cmds:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-string">./result/bin/hello-nix</span> <span class="hljs-string">|</span> <span class="hljs-string">grep</span> <span class="hljs-string">&quot;Hello&quot;</span>
</code></pre>
<h3 id="step-20-understand-git-hooks-with-lefthook">Step 20: Understand git hooks with lefthook</h3>
<p>The <code>lefthook.yaml</code> file ensures code is formatted before every commit:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">pre-commit:</span>
  <span class="hljs-attr">commands:</span>
    <span class="hljs-attr">fmt:</span>
      <span class="hljs-attr">tags:</span> <span class="hljs-string">formatter</span>
      <span class="hljs-attr">run:</span> <span class="hljs-string">nix</span> <span class="hljs-string">fmt</span>
      <span class="hljs-attr">stage_fixed:</span> <span class="hljs-literal">true</span>
</code></pre>
<p>This means: every time you <code>git commit</code>, Nix automatically formats your code. If formatting changes files, they are re-staged. No more &quot;forgot to format&quot; in code reviews.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="part-7-going-further-bonus">Part 7: Going Further (Bonus)</h2>
<p>These exercises are optional, for students who finish early or want to dig deeper.</p>
<h3 id="challenge-1-package-a-real-program">Challenge 1: Package a real program</h3>
<p>Instead of a shell script, try packaging a simple Python or Go program:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix"><span class="hljs-comment"># Example: a Python script</span>
packages.<span class="hljs-attr">default</span> = pkgs.writers.writePython3Bin <span class="hljs-string">&quot;my-tool&quot;</span> {
  <span class="hljs-attr">libraries</span> = <span class="hljs-keyword">with</span> pkgs.python3Packages; [ requests ];
} <span class="hljs-string">&#x27;&#x27;
  import requests
  r = requests.get(&quot;https://httpbin.org/ip&quot;)
  print(f&quot;Your IP: {r.json()[&#x27;origin&#x27;]}&quot;)
&#x27;&#x27;</span>;
</code></pre>
<h3 id="challenge-2-add-a-second-package">Challenge 2: Add a second package</h3>
<p>Create a <code>packages.other</code> in addition to <code>packages.default</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Build a specific package</span>
nix build .<span class="hljs-comment">#other</span>
</code></pre>
<h3 id="challenge-3-pin-a-specific-nixpkgs-version">Challenge 3: Pin a specific nixpkgs version</h3>
<p>Change the <code>nixpkgs</code> input in <code>flake.nix</code> to a specific commit and observe how <code>flake.lock</code> changes:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-nix">nixpkgs.<span class="hljs-attr">url</span> = <span class="hljs-string">&quot;github:NixOS/nixpkgs/nixos-24.11&quot;</span>;
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">nix flake update
git diff flake.lock
</code></pre>

<h2 id="summary">Summary</h2>
<p>In this practical, you learned:</p>
<table>
<thead>
<tr>
<th>Concept</th>
<th>What you did</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Nix flakes</strong></td>
<td>Initialized a project with <code>nix flake init</code></td>
</tr>
<tr>
<td><strong>Dev shells</strong></td>
<td>Created a reproducible development environment</td>
</tr>
<tr>
<td><strong>Package management</strong></td>
<td>Added/removed tools declaratively</td>
</tr>
<tr>
<td><strong>Auto-import</strong></td>
<td>New <code>.nix</code> files are picked up automatically (just <code>git add</code>)</td>
</tr>
<tr>
<td><strong>Packaging</strong></td>
<td>Built a shell script into a Nix package</td>
</tr>
<tr>
<td><strong>Derivations</strong></td>
<td>Inspected build recipes with <code>nix show-derivation</code></td>
</tr>
<tr>
<td><strong>Dependency analysis</strong></td>
<td>Explored closures with <code>nix-tree</code> and <code>nix path-info</code></td>
</tr>
<tr>
<td><strong>Nix REPL</strong></td>
<td>Interactively explored flake outputs and nixpkgs</td>
</tr>
<tr>
<td><strong>Build UX</strong></td>
<td>Used <code>nom</code> for fancy builds and <code>nix run</code> for instant execution</td>
</tr>
<tr>
<td><strong>Code quality</strong></td>
<td>Used formatters, linters, and git hooks</td>
</tr>
<tr>
<td><strong>Task automation</strong></td>
<td>Used pre-built tasks with <code>task</code></td>
</tr>
</tbody>
</table>
<h3 id="key-commands-reference">Key Commands Reference</h3>
<table>
<thead>
<tr>
<th>Command</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>nix flake init -t &lt;template&gt;</code></td>
<td>Initialize a project from a template</td>
</tr>
<tr>
<td><code>nix develop</code></td>
<td>Enter the development shell</td>
</tr>
<tr>
<td><code>nom build</code></td>
<td>Build the default package with fancy output</td>
</tr>
<tr>
<td><code>nix run</code></td>
<td>Build and run the default app in one step</td>
</tr>
<tr>
<td><code>nix fmt</code></td>
<td>Format all code</td>
</tr>
<tr>
<td><code>nix flake show</code></td>
<td>Show all flake outputs</td>
</tr>
<tr>
<td><code>nix search nixpkgs &lt;name&gt;</code></td>
<td>Search for packages</td>
</tr>
<tr>
<td><code>nix show-derivation .#default</code></td>
<td>Inspect the build recipe (derivation)</td>
</tr>
<tr>
<td><code>nix-tree .#default</code></td>
<td>Interactive dependency tree explorer</td>
</tr>
<tr>
<td><code>nix path-info -rsSh .#default</code></td>
<td>Show closure size and dependencies</td>
</tr>
<tr>
<td><code>nix repl</code> then <code>:lf .</code></td>
<td>Interactive Nix expression explorer</td>
</tr>
</tbody>
</table>
<h3 id="whats-next">What's Next?</h3>
<p>In the next TP, you will learn how to build <strong>container images</strong> and understand why reproducibility matters even more in that context.</p>
