<h2 id="part-6-gitops-with-argo-cd-40-min">Part 6: GitOps with Argo CD (40 min)</h2>
<h3 id="the-gitops-workflow">The GitOps Workflow</h3>
<p>In GitOps, deployments work like this:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">sequenceDiagram
    participant Dev as Developer
    participant Git as Git Repository
    participant Argo as Argo CD
    participant K8s as Kubernetes Cluster

    Dev-&gt;&gt;Git: 1. Push manifest changes
    Note over Git: Desired state updated

    loop Every 3 minutes (or webhook)
        Argo-&gt;&gt;Git: 2. Poll for changes
        Argo-&gt;&gt;Argo: Compare Git state vs Cluster state
    end

    alt Drift detected
        Argo-&gt;&gt;K8s: 3. Sync: apply changes
        K8s--&gt;&gt;Argo: 4. Report status
        Note over Argo: Status: Synced ✓
    end

    Note over Dev,K8s: Someone manually scales to 5 replicas...

    Argo-&gt;&gt;K8s: 5. Detect drift (5 ≠ 3 in Git)
    Argo-&gt;&gt;K8s: 6. Self-heal: revert to 3 replicas
</code></pre>
<ol>
<li>You define your desired state in a <strong>Git repository</strong></li>
<li>Argo CD <strong>watches</strong> the repository (polls every 3 minutes by default)</li>
<li>When Git changes, Argo CD <strong>syncs</strong> the cluster to match</li>
<li>If someone manually changes the cluster, Argo CD <strong>detects the drift</strong> and auto-corrects</li>
</ol>
<p>No more <code>kubectl apply</code> from your laptop. No more &quot;who deployed what and when?&quot; -- Git log is your audit trail.</p>
<h3 id="step-20-create-a-gitops-repository">Step 20: Create a GitOps repository</h3>
<p>Create a new Git repository to hold your Kubernetes manifests. This is separate from your application code -- it is your <strong>deployment configuration</strong> repository.</p>
<blockquote>
<p><strong>Why a separate repository?</strong> In GitOps, you typically have two repositories:</p>
<ul>
<li><strong>Application repo</strong>: your source code (Go, Python, Java...). CI builds and pushes container images from this.</li>
<li><strong>GitOps repo</strong>: your Kubernetes manifests. Argo CD watches this and deploys whatever is defined here.</li>
</ul>
<p>This separation means application developers don't need cluster access, and infrastructure changes go through their own review process.</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;App Repo&quot;
        CODE[Source Code] --&gt;|&quot;CI builds&quot;| IMG[&quot;Container Image&lt;br/&gt;registry/app:v2&quot;]
    end

    subgraph &quot;GitOps Repo&quot;
        MANIFESTS[&quot;Kubernetes Manifests&lt;br/&gt;image: registry/app:v2&quot;]
    end

    subgraph &quot;Cluster&quot;
        ARGO[Argo CD] --&gt;|&quot;watches&quot;| MANIFESTS
        ARGO --&gt;|&quot;deploys&quot;| PODS[Running Pods]
        PODS --&gt;|&quot;pulls&quot;| IMG
    end

    IMG -.-&gt;|&quot;update image tag&quot;| MANIFESTS

    style ARGO fill:#f9f,stroke:#333
    style MANIFESTS fill:#bfb,stroke:#333
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ~
<span class="hljs-built_in">mkdir</span> -p gitops-demo
<span class="hljs-built_in">cd</span> gitops-demo
git init
</code></pre>
<p>Create the directory structure:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">mkdir</span> -p apps/hello
</code></pre>
<p>Create <code>apps/hello/deployment.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apps/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">labels:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">replicas:</span> <span class="hljs-number">2</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">matchLabels:</span>
      <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">template:</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">labels:</span>
        <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
    <span class="hljs-attr">spec:</span>
      <span class="hljs-attr">containers:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
          <span class="hljs-attr">image:</span> <span class="hljs-string">traefik/whoami:v1.10</span>
          <span class="hljs-attr">args:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-string">&quot;--name=GitOps v1&quot;</span>
          <span class="hljs-attr">ports:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">80</span>
          <span class="hljs-attr">resources:</span>
            <span class="hljs-attr">requests:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">50m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">32Mi</span>
            <span class="hljs-attr">limits:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">100m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">64Mi</span>
</code></pre>
<p>Create <code>apps/hello/service.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Service</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">ports:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>
      <span class="hljs-attr">targetPort:</span> <span class="hljs-number">80</span>
  <span class="hljs-attr">type:</span> <span class="hljs-string">ClusterIP</span>
</code></pre>
<p>Commit and push to GitHub:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git add .
git commit -m <span class="hljs-string">&quot;feat: initial hello deployment&quot;</span>

<span class="hljs-comment"># Create a repository on GitHub and push</span>
<span class="hljs-comment"># Replace &lt;your-username&gt; with your GitHub username</span>
gh repo create gitops-demo --public --<span class="hljs-built_in">source</span>=. --push
<span class="hljs-comment"># Or: git remote add origin git@github.com:&lt;your-username&gt;/gitops-demo.git</span>
<span class="hljs-comment">#     git push -u origin main</span>
</code></pre>
<blockquote>
<p><strong>If you do not have <code>gh</code> installed</strong>: create the repository manually on GitHub, add the remote, and push.</p>
</blockquote>
<h3 id="step-21-create-an-argo-cd-application">Step 21: Create an Argo CD Application</h3>
<p>An Argo CD &quot;Application&quot; is the central concept -- it connects a <strong>Git repository path</strong> to a <strong>Kubernetes namespace</strong>. Think of it as a rule: &quot;whatever YAML is in <em>this directory</em> of <em>this repo</em>, deploy it to <em>this namespace</em>.&quot;</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Argo CD Application&quot;
        SOURCE[&quot;Source&lt;br/&gt;repo: github.com/.../gitops-demo&lt;br/&gt;path: apps/hello&lt;br/&gt;branch: main&quot;]
        DEST[&quot;Destination&lt;br/&gt;server: local cluster&lt;br/&gt;namespace: gitops&quot;]
        POLICY[&quot;Sync Policy&lt;br/&gt;automated + self-heal + auto-prune&quot;]
    end

    SOURCE --&gt;|&quot;reads manifests&quot;| DEST
    POLICY --&gt;|&quot;controls behavior&quot;| DEST

    style SOURCE fill:#bfb,stroke:#333
    style DEST fill:#bbf,stroke:#333
    style POLICY fill:#ff9,stroke:#333
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">argocd app create hello \
  --plaintext --grpc-web --insecure \
  --repo https://github.com/&lt;your-username&gt;/gitops-demo.git \
  --path apps/hello \
  --dest-server https://kubernetes.default.svc \
  --dest-namespace gitops \
  --sync-policy automated \
  --auto-prune \
  --self-heal \
  --sync-option CreateNamespace=<span class="hljs-literal">true</span>
</code></pre>
<p>Replace <code>&lt;your-username&gt;</code> with your GitHub username.</p>
<blockquote>
<p><strong>Note</strong>: all <code>argocd</code> CLI commands need <code>--plaintext --grpc-web --insecure</code> when using the Ingress setup. You can set these permanently with:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">export</span> ARGOCD_OPTS=<span class="hljs-string">&quot;--plaintext --grpc-web --insecure&quot;</span>
</code></pre>
</blockquote>
<p>Flags explained:</p>
<table>
<thead>
<tr>
<th>Flag</th>
<th>Meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>--repo</code></td>
<td>The Git repository to watch</td>
</tr>
<tr>
<td><code>--path</code></td>
<td>The directory within the repo containing manifests</td>
</tr>
<tr>
<td><code>--dest-server</code></td>
<td>The Kubernetes cluster (here: the local cluster)</td>
</tr>
<tr>
<td><code>--dest-namespace</code></td>
<td>The target namespace</td>
</tr>
<tr>
<td><code>--sync-policy automated</code></td>
<td>Automatically sync when Git changes</td>
</tr>
<tr>
<td><code>--auto-prune</code></td>
<td>Delete resources that were removed from Git</td>
</tr>
<tr>
<td><code>--self-heal</code></td>
<td>Revert manual changes made directly to the cluster</td>
</tr>
</tbody>
</table>
<p>Alternatively, you can define the Application as YAML. Create <code>apps/hello-app.yaml</code> in the gitops-demo repo:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">argoproj.io/v1alpha1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Application</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">argocd</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">project:</span> <span class="hljs-string">default</span>
  <span class="hljs-attr">source:</span>
    <span class="hljs-attr">repoURL:</span> <span class="hljs-string">https://github.com/&lt;your-username&gt;/gitops-demo.git</span>
    <span class="hljs-attr">targetRevision:</span> <span class="hljs-string">main</span>
    <span class="hljs-attr">path:</span> <span class="hljs-string">apps/hello</span>
  <span class="hljs-attr">destination:</span>
    <span class="hljs-attr">server:</span> <span class="hljs-string">https://kubernetes.default.svc</span>
    <span class="hljs-attr">namespace:</span> <span class="hljs-string">gitops</span>
  <span class="hljs-attr">syncPolicy:</span>
    <span class="hljs-attr">automated:</span>
      <span class="hljs-attr">prune:</span> <span class="hljs-literal">true</span>
      <span class="hljs-attr">selfHeal:</span> <span class="hljs-literal">true</span>
    <span class="hljs-attr">syncOptions:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-string">CreateNamespace=true</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f apps/hello-app.yaml
</code></pre>
<h3 id="step-22-watch-argo-cd-sync">Step 22: Watch Argo CD sync</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Check the application status</span>
argocd app get hello

<span class="hljs-comment"># Watch the sync in real time</span>
argocd app <span class="hljs-built_in">wait</span> hello --<span class="hljs-built_in">sync</span>
</code></pre>
<p>Open the Argo CD UI at <a href="http://argocd.localhost:8080">http://argocd.localhost:8080</a>. You should see the <code>hello</code> application with a green &quot;Synced&quot; status. Click on it to see the resource tree.</p>
<p>Verify the deployment:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get all -n gitops
</code></pre>
<h3 id="step-23-deploy-by-pushing-to-git">Step 23: Deploy by pushing to Git</h3>
<p>This is the GitOps magic. Change the deployment in Git and watch Argo CD deploy it automatically.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ~/gitops-demo
</code></pre>
<p>Edit <code>apps/hello/deployment.yaml</code> -- change the message:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml">          <span class="hljs-attr">args:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-string">&quot;--name=GitOps v2 - Updated via Git push!&quot;</span>
</code></pre>
<p>Commit and push:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git add .
git commit -m <span class="hljs-string">&quot;feat: update greeting to v2&quot;</span>
git push
</code></pre>
<p>Watch Argo CD detect and deploy the change:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Watch the sync (Argo CD polls every 3 minutes by default, or you can force it)</span>
argocd app <span class="hljs-built_in">sync</span> hello

<span class="hljs-comment"># Verify the new version</span>
kubectl port-forward svc/hello -n gitops 9091:80 &amp;
curl http://localhost:9091
<span class="hljs-built_in">kill</span> %2  <span class="hljs-comment"># or whatever job number</span>
</code></pre>
<p>You should see the updated message.</p>
<h3 id="step-24-test-self-healing">Step 24: Test self-healing</h3>
<p>Argo CD with <code>--self-heal</code> reverts unauthorised changes. Try it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Manually scale the deployment (bypassing Git)</span>
kubectl scale deployment hello -n gitops --replicas=5

<span class="hljs-comment"># Watch Argo CD revert it back to 2 replicas</span>
kubectl get pods -n gitops -w
</code></pre>
<p>Within seconds, Argo CD detects the drift and scales back to 2 replicas (as defined in Git). Press <code>Ctrl+C</code>.</p>
<h3 id="step-25-deploy-a-helm-chart-with-argo-cd">Step 25: Deploy a Helm chart with Argo CD</h3>
<p>Argo CD can also deploy Helm charts from Git. Create a Helm-based app in your gitops repo:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ~/gitops-demo
<span class="hljs-built_in">mkdir</span> -p apps/nginx-helm
</code></pre>
<p>Create <code>apps/nginx-helm/Chart.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v2</span>
<span class="hljs-attr">name:</span> <span class="hljs-string">nginx-helm</span>
<span class="hljs-attr">version:</span> <span class="hljs-number">1.0</span><span class="hljs-number">.0</span>
<span class="hljs-attr">dependencies:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">nginx</span>
    <span class="hljs-attr">version:</span> <span class="hljs-string">&quot;18.3.1&quot;</span>
    <span class="hljs-attr">repository:</span> <span class="hljs-string">https://charts.bitnami.com/bitnami</span>
</code></pre>
<p>Create <code>apps/nginx-helm/values.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">nginx:</span>
  <span class="hljs-attr">service:</span>
    <span class="hljs-attr">type:</span> <span class="hljs-string">ClusterIP</span>
  <span class="hljs-attr">replicaCount:</span> <span class="hljs-number">1</span>
</code></pre>
<p>Commit and push:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git add .
git commit -m <span class="hljs-string">&quot;feat: add nginx helm chart&quot;</span>
git push
</code></pre>
<p>Create the Argo CD application:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">argocd app create nginx-helm \
  --plaintext --grpc-web --insecure \
  --repo https://github.com/&lt;your-username&gt;/gitops-demo.git \
  --path apps/nginx-helm \
  --dest-server https://kubernetes.default.svc \
  --dest-namespace nginx-helm \
  --sync-policy automated \
  --auto-prune \
  --self-heal \
  --sync-option CreateNamespace=<span class="hljs-literal">true</span>
</code></pre>
<p>Watch it deploy in the Argo CD UI.</p>
<h3 id="step-26-deploy-a-kustomize-app-with-argo-cd">Step 26: Deploy a Kustomize app with Argo CD</h3>
<p>Argo CD natively supports Kustomize -- it detects the <code>kustomization.yaml</code> file and applies the overlay automatically.</p>
<p>Add a Kustomize-based app to your gitops repo:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ~/gitops-demo
<span class="hljs-built_in">mkdir</span> -p apps/hello-kustomize/base
<span class="hljs-built_in">mkdir</span> -p apps/hello-kustomize/overlays/dev
</code></pre>
<p>Create <code>apps/hello-kustomize/base/deployment.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apps/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello-kustomize</span>
  <span class="hljs-attr">labels:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello-kustomize</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">replicas:</span> <span class="hljs-number">1</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">matchLabels:</span>
      <span class="hljs-attr">app:</span> <span class="hljs-string">hello-kustomize</span>
  <span class="hljs-attr">template:</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">labels:</span>
        <span class="hljs-attr">app:</span> <span class="hljs-string">hello-kustomize</span>
    <span class="hljs-attr">spec:</span>
      <span class="hljs-attr">containers:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
          <span class="hljs-attr">image:</span> <span class="hljs-string">traefik/whoami:v1.10</span>
          <span class="hljs-attr">args:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-string">&quot;--name=hello-kustomize&quot;</span>
          <span class="hljs-attr">ports:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">80</span>
</code></pre>
<p>Create <code>apps/hello-kustomize/base/service.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Service</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello-kustomize</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello-kustomize</span>
  <span class="hljs-attr">ports:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>
      <span class="hljs-attr">targetPort:</span> <span class="hljs-number">80</span>
</code></pre>
<p>Create <code>apps/hello-kustomize/base/kustomization.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">kustomize.config.k8s.io/v1beta1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Kustomization</span>
<span class="hljs-attr">resources:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">deployment.yaml</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">service.yaml</span>
</code></pre>
<p>Create <code>apps/hello-kustomize/overlays/dev/kustomization.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">kustomize.config.k8s.io/v1beta1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Kustomization</span>
<span class="hljs-attr">resources:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">../../base</span>
<span class="hljs-attr">patches:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">target:</span>
      <span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
      <span class="hljs-attr">name:</span> <span class="hljs-string">hello-kustomize</span>
    <span class="hljs-attr">patch:</span> <span class="hljs-string">|-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/args
        value: [&quot;--name=hello-kustomize-dev&quot;]
</span></code></pre>
<p>Commit and push:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git add .
git commit -m <span class="hljs-string">&quot;feat: add kustomize-based hello app&quot;</span>
git push
</code></pre>
<p>Create the Argo CD application pointing at the <strong>overlay</strong> directory:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">argocd app create hello-kustomize \
  --plaintext --grpc-web --insecure \
  --repo https://github.com/&lt;your-username&gt;/gitops-demo.git \
  --path apps/hello-kustomize/overlays/dev \
  --dest-server https://kubernetes.default.svc \
  --dest-namespace kustomize-demo \
  --sync-policy automated \
  --auto-prune \
  --self-heal \
  --sync-option CreateNamespace=<span class="hljs-literal">true</span>
</code></pre>
<p>Argo CD detects the <code>kustomization.yaml</code>, applies the overlay on top of the base, and deploys the result. Check it in the UI -- you should see 2 replicas running.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get all -n kustomize-demo
</code></pre>
<blockquote>
<p><strong>Key insight</strong>: Argo CD supports raw manifests, Helm charts, <strong>and</strong> Kustomize out of the box. Choose the tool that fits your use case:</p>
<ul>
<li><strong>Raw manifests</strong>: simple apps, learning</li>
<li><strong>Helm</strong>: third-party charts, heavily templated configs</li>
<li><strong>Kustomize</strong>: environment-specific patches for your own services</li>
</ul>
</blockquote>
<h3 id="checkpoint-4">Checkpoint</h3>
<p>At this point:</p>
<ul>
<li>Argo CD is running and managing deployments</li>
<li>Pushing to Git triggers automatic deployments</li>
<li>Manual cluster changes are reverted (self-heal)</li>
<li>Raw manifests, Helm charts, <strong>and</strong> Kustomize overlays all work with Argo CD</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">argocd app list
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="part-7-local-development-with-skaffold-40-min">Part 7: Local Development with Skaffold (40 min)</h2>
<h3 id="the-inner-loop-problem">The Inner Loop Problem</h3>
<p>In software development, there are two loops:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Outer Loop (CI/CD — minutes to hours)&quot;
        OL1[Push code] --&gt; OL2[CI builds &amp; tests]
        OL2 --&gt; OL3[Push image to registry]
        OL3 --&gt; OL4[Update GitOps repo]
        OL4 --&gt; OL5[Argo CD deploys]
        OL5 --&gt; OL6[Production running]
    end

    subgraph &quot;Inner Loop (local dev — seconds)&quot;
        IL1[Edit code] --&gt; IL2[Skaffold detects change]
        IL2 --&gt; IL3[Rebuild container]
        IL3 --&gt; IL4[Redeploy to local cluster]
        IL4 --&gt; IL5[Test locally]
        IL5 --&gt; IL1
    end

    style IL1 fill:#bfb,stroke:#333
    style IL2 fill:#bfb,stroke:#333
    style IL3 fill:#bfb,stroke:#333
    style IL4 fill:#bfb,stroke:#333
    style IL5 fill:#bfb,stroke:#333
</code></pre>
<p>So far, every change requires: edit code &gt; build image &gt; push &gt; update manifest &gt; wait for sync.<br />
For local development, this is too slow. You want to edit a file and see the change in seconds.</p>
<p><a href="https://skaffold.dev/">Skaffold</a> solves this. It watches your source code, rebuilds the container, and redeploys -- all automatically. <strong>The inner loop should feel as fast as saving a file.</strong></p>
<blockquote>
<p><strong>Why not just use <code>docker compose</code>?</strong> Docker Compose doesn't run Kubernetes. If your production uses Kubernetes, testing locally with Docker Compose means you're testing a different system. Skaffold lets you develop against a real Kubernetes cluster (k3d), so what works locally will work in production.</p>
</blockquote>
<h3 id="step-26-install-skaffold">Step 26: Install Skaffold</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Using nix</span>
nix profile install <span class="hljs-string">&#x27;nixpkgs#skaffold&#x27;</span>

<span class="hljs-comment"># Or download directly</span>
<span class="hljs-comment"># curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64</span>
<span class="hljs-comment"># chmod +x skaffold &amp;&amp; sudo mv skaffold /usr/local/bin/</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">skaffold version
</code></pre>
<h3 id="step-27-create-a-sample-application">Step 27: Create a sample application</h3>
<p>Create a new project directory:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ~
<span class="hljs-built_in">mkdir</span> -p skaffold-demo
<span class="hljs-built_in">cd</span> skaffold-demo
</code></pre>
<p>Create a simple Go application. Create <code>main.go</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-go"><span class="hljs-keyword">package</span> main

<span class="hljs-keyword">import</span> (
	<span class="hljs-string">&quot;fmt&quot;</span>
	<span class="hljs-string">&quot;net/http&quot;</span>
	<span class="hljs-string">&quot;os&quot;</span>
)

<span class="hljs-function"><span class="hljs-keyword">func</span> <span class="hljs-title">handler</span><span class="hljs-params">(w http.ResponseWriter, r *http.Request)</span></span> {
	hostname, _ := os.Hostname()
	fmt.Fprintf(w, <span class="hljs-string">&quot;Hello from Skaffold! Hostname: %s\n&quot;</span>, hostname)
}

<span class="hljs-function"><span class="hljs-keyword">func</span> <span class="hljs-title">main</span><span class="hljs-params">()</span></span> {
	http.HandleFunc(<span class="hljs-string">&quot;/&quot;</span>, handler)
	fmt.Println(<span class="hljs-string">&quot;Server starting on :8080...&quot;</span>)
	http.ListenAndServe(<span class="hljs-string">&quot;:8080&quot;</span>, <span class="hljs-literal">nil</span>)
}
</code></pre>
<p>Create <code>go.mod</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>module skaffold-demo

go 1.22
</code></pre>
<p>Create a <code>Dockerfile</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dockerfile"><span class="hljs-keyword">FROM</span> golang:<span class="hljs-number">1.22</span> AS builder
<span class="hljs-keyword">WORKDIR</span><span class="language-bash"> /app</span>
<span class="hljs-keyword">COPY</span><span class="language-bash"> go.mod .</span>
<span class="hljs-keyword">COPY</span><span class="language-bash"> main.go .</span>
<span class="hljs-keyword">RUN</span><span class="language-bash"> CGO_ENABLED=0 go build -o server .</span>

<span class="hljs-keyword">FROM</span> scratch
<span class="hljs-keyword">COPY</span><span class="language-bash"> --from=builder /app/server /server</span>
<span class="hljs-keyword">EXPOSE</span> <span class="hljs-number">8080</span>
<span class="hljs-keyword">CMD</span><span class="language-bash"> [<span class="hljs-string">&quot;/server&quot;</span>]</span>
</code></pre>
<h3 id="step-28-create-kubernetes-manifests-for-skaffold">Step 28: Create Kubernetes manifests for Skaffold</h3>
<p>Create <code>k8s/deployment.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">mkdir</span> -p k8s
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apps/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">skaffold-demo</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">replicas:</span> <span class="hljs-number">1</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">matchLabels:</span>
      <span class="hljs-attr">app:</span> <span class="hljs-string">skaffold-demo</span>
  <span class="hljs-attr">template:</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">labels:</span>
        <span class="hljs-attr">app:</span> <span class="hljs-string">skaffold-demo</span>
    <span class="hljs-attr">spec:</span>
      <span class="hljs-attr">containers:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">skaffold-demo</span>
          <span class="hljs-attr">image:</span> <span class="hljs-string">skaffold-demo</span>
          <span class="hljs-attr">ports:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">8080</span>
          <span class="hljs-attr">resources:</span>
            <span class="hljs-attr">requests:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">50m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">32Mi</span>
            <span class="hljs-attr">limits:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">100m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">64Mi</span>
</code></pre>
<p>Create <code>k8s/service.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Service</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">skaffold-demo</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">skaffold-demo</span>
  <span class="hljs-attr">ports:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>
      <span class="hljs-attr">targetPort:</span> <span class="hljs-number">8080</span>
  <span class="hljs-attr">type:</span> <span class="hljs-string">ClusterIP</span>
</code></pre>
<h3 id="step-29-configure-skaffold">Step 29: Configure Skaffold</h3>
<p>Create <code>skaffold.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">skaffold/v4beta11</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Config</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">skaffold-demo</span>
<span class="hljs-attr">build:</span>
  <span class="hljs-attr">artifacts:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">image:</span> <span class="hljs-string">skaffold-demo</span>
      <span class="hljs-attr">docker:</span>
        <span class="hljs-attr">dockerfile:</span> <span class="hljs-string">Dockerfile</span>
  <span class="hljs-attr">local:</span>
    <span class="hljs-attr">push:</span> <span class="hljs-literal">false</span>
<span class="hljs-attr">manifests:</span>
  <span class="hljs-attr">rawYaml:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-string">k8s/*.yaml</span>
<span class="hljs-attr">deploy:</span>
  <span class="hljs-attr">kubectl:</span> {}
<span class="hljs-attr">portForward:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">resourceType:</span> <span class="hljs-string">service</span>
    <span class="hljs-attr">resourceName:</span> <span class="hljs-string">skaffold-demo</span>
    <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>
    <span class="hljs-attr">localPort:</span> <span class="hljs-number">9092</span>
</code></pre>
<blockquote>
<p><strong>No registry needed.</strong> Skaffold automatically detects k3d and uses <code>k3d image import</code> to load images directly into the cluster nodes. This avoids the complexity of setting up a local container registry.</p>
</blockquote>
<h3 id="step-30-run-skaffold-in-dev-mode">Step 30: Run Skaffold in dev mode</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">skaffold dev
</code></pre>
<p>Skaffold will:</p>
<ol>
<li>Build the Docker image locally</li>
<li>Import it directly into the k3d cluster nodes (no registry needed!)</li>
<li>Deploy the manifests to the cluster</li>
<li>Set up port-forwarding</li>
<li><strong>Watch for file changes</strong> and re-do everything automatically</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">sequenceDiagram
    participant You as Your Editor
    participant Skaffold as Skaffold (watching)
    participant Docker as Docker (build)
    participant k3d as k3d Cluster

    Note over Skaffold: skaffold dev starts

    Skaffold-&gt;&gt;Docker: 1. Build image from Dockerfile
    Docker--&gt;&gt;Skaffold: Image built: skaffold-demo:abc123
    Skaffold-&gt;&gt;k3d: 2. k3d image import (no push!)
    Skaffold-&gt;&gt;k3d: 3. kubectl apply k8s/*.yaml
    Skaffold-&gt;&gt;Skaffold: 4. Port-forward localhost:9092 → service:80
    Note over Skaffold: Watching for file changes...

    You-&gt;&gt;You: Edit main.go, save

    Skaffold-&gt;&gt;Skaffold: 5. Detects file change!
    Skaffold-&gt;&gt;Docker: 6. Rebuild image
    Docker--&gt;&gt;Skaffold: New image: skaffold-demo:def456
    Skaffold-&gt;&gt;k3d: 7. Import + redeploy
    Note over k3d: New version running in seconds
</code></pre>
<p>In another terminal:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl http://localhost:9092
</code></pre>
<p>You should see <code>Hello from Skaffold!</code>.</p>
<h3 id="step-31-experience-the-live-reload">Step 31: Experience the live reload</h3>
<p>Edit <code>main.go</code> -- change the greeting:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-go">fmt.Fprintf(w, <span class="hljs-string">&quot;Hello from Skaffold -- LIVE UPDATED! Hostname: %s\n&quot;</span>, hostname)
</code></pre>
<p>Save the file. Watch the Skaffold terminal -- it detects the change, rebuilds, and redeploys. After a few seconds:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl http://localhost:9092
</code></pre>
<p>You should see the updated message. <strong>This is the inner loop.</strong> Edit, save, see results in seconds.</p>
<p>Press <code>Ctrl+C</code> in the Skaffold terminal to stop. Skaffold cleans up all deployed resources.</p>
<h3 id="step-32-combine-skaffold-with-argo-cd-bonus">Step 32: Combine Skaffold with Argo CD (bonus)</h3>
<p>For a complete workflow, use Skaffold for <strong>local development</strong> and Argo CD for <strong>deployment to shared environments</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Local Development (Inner Loop)&quot;
        DEV[Developer] --&gt;|&quot;edits code&quot;| CODE[Source Code]
        CODE --&gt;|&quot;watches&quot;| SKAFFOLD[Skaffold]
        SKAFFOLD --&gt;|&quot;build + deploy&quot;| LOCAL[k3d Local Cluster]
        LOCAL --&gt;|&quot;test&quot;| DEV
    end

    subgraph &quot;Production Deployment (Outer Loop)&quot;
        DEV --&gt;|&quot;git push&quot;| APPREPO[App Repository]
        APPREPO --&gt;|&quot;triggers&quot;| CI[CI Pipeline]
        CI --&gt;|&quot;build &amp; push&quot;| REGISTRY[Container Registry]
        CI --&gt;|&quot;update image tag&quot;| GITOPSREPO[GitOps Repository]
        GITOPSREPO --&gt;|&quot;watched by&quot;| ARGOCD[Argo CD]
        ARGOCD --&gt;|&quot;sync&quot;| PROD[Production Cluster]
    end

    style SKAFFOLD fill:#bfb,stroke:#333
    style ARGOCD fill:#f9f,stroke:#333
    style LOCAL fill:#bbf,stroke:#333
    style PROD fill:#fbb,stroke:#333
</code></pre>
<ol>
<li>Develop locally with <code>skaffold dev</code> (fast inner loop)</li>
<li>When ready, push code to the app repo (CI builds and pushes the image)</li>
<li>Update the image tag in the gitops repo</li>
<li>Argo CD deploys to staging/production</li>
</ol>
<p>This separation means developers get fast feedback locally while production deployments go through a controlled GitOps pipeline.</p>
</section>

<h2 id="exercises">Exercises</h2>
<h3 id="exercise-1-add-resource-limits-and-health-checks">Exercise 1: Add resource limits and health checks</h3>
<p>Add <code>livenessProbe</code> and <code>readinessProbe</code> to your Deployment. What happens when the health check fails? Experiment with different <code>initialDelaySeconds</code> and <code>failureThreshold</code> values.</p>
<h3 id="exercise-2-rolling-updates">Exercise 2: Rolling updates</h3>
<p>Change the container image version in your Deployment and observe how Kubernetes performs a rolling update. Use <code>kubectl rollout status</code> and <code>kubectl rollout history</code> to monitor it.</p>
<h3 id="exercise-3-argo-cd-app-of-apps">Exercise 3: Argo CD App of Apps</h3>
<p>Create an &quot;App of Apps&quot; pattern: a single Argo CD Application that manages other Applications. This is how real teams manage dozens of services.</p>
<h3 id="exercise-4-skaffold-with-helm">Exercise 4: Skaffold with Helm</h3>
<p>Modify your Skaffold configuration to deploy using Helm instead of raw manifests. Use the <code>deploy.helm</code> section in <code>skaffold.yaml</code>.</p>
<h3 id="exercise-5-multi-environment-gitops">Exercise 5: Multi-environment GitOps</h3>
<p>Extend your Kustomize setup from Part 4 and Part 6 by adding a <code>production</code> overlay with stricter resource limits and more replicas. Deploy <code>dev</code>, <code>staging</code>, and <code>production</code> as three separate Argo CD Applications from the same gitops repo. Verify that each environment has different configuration while sharing the same base.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="troubleshooting">Troubleshooting</h2>
<h3 id="common-issues">Common issues</h3>
<table>
<thead>
<tr>
<th>Problem</th>
<th>Solution</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>k3d cluster create</code> fails</td>
<td>Ensure Docker is running: <code>docker ps</code></td>
</tr>
<tr>
<td><code>k3d cluster create</code> hangs</td>
<td>Another cluster may be using the same ports. Run <code>k3d cluster list</code> and delete stale clusters.</td>
</tr>
<tr>
<td><code>kubectl</code> cannot connect</td>
<td>Run <code>k3d kubeconfig merge my-cluster --kubeconfig-switch-context</code></td>
</tr>
<tr>
<td>Pods stuck in <code>Pending</code></td>
<td>Check node resources: <code>kubectl describe pod &lt;name&gt; -n &lt;ns&gt;</code></td>
</tr>
<tr>
<td>Pods stuck in <code>ImagePullBackOff</code></td>
<td>Check image name/tag. For local images use k3d registry.</td>
</tr>
<tr>
<td>Argo CD UI not loading</td>
<td>Check Ingress: <code>kubectl get ingress -n argocd</code>. Ensure <code>argocd.localhost</code> resolves to 127.0.0.1.</td>
</tr>
<tr>
<td><code>argocd</code> CLI connection refused</td>
<td>Set <code>export ARGOCD_OPTS=&quot;--plaintext --grpc-web --insecure&quot;</code> and use <code>argocd.localhost:8080</code></td>
</tr>
<tr>
<td>Skaffold: image can't be pulled</td>
<td>Ensure <code>push: false</code> in skaffold.yaml. Skaffold auto-imports to k3d.</td>
</tr>
<tr>
<td>WSL: Docker not found</td>
<td>Enable WSL integration in Docker Desktop settings</td>
</tr>
<tr>
<td>Port already in use</td>
<td>Find and kill: <code>lsof -i :8080</code> or change the port</td>
</tr>
</tbody>
</table>
<h3 id="useful-debug-commands">Useful debug commands</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Describe a resource (shows events and conditions)</span>
kubectl describe pod &lt;pod-name&gt; -n &lt;namespace&gt;

<span class="hljs-comment"># View container logs</span>
kubectl logs &lt;pod-name&gt; -n &lt;namespace&gt;

<span class="hljs-comment"># Follow logs in real time</span>
kubectl logs -f &lt;pod-name&gt; -n &lt;namespace&gt;

<span class="hljs-comment"># Open a shell in a running container</span>
kubectl <span class="hljs-built_in">exec</span> -it &lt;pod-name&gt; -n &lt;namespace&gt; -- /bin/sh

<span class="hljs-comment"># View all events in a namespace</span>
kubectl get events -n &lt;namespace&gt; --sort-by=<span class="hljs-string">&#x27;.lastTimestamp&#x27;</span>

<span class="hljs-comment"># Check Argo CD application details</span>
argocd app get &lt;app-name&gt; --show-operation
</code></pre>
</section>

<h2 id="grading-criteria">Grading Criteria</h2>
<table>
<thead>
<tr>
<th>Criterion</th>
<th>Weight</th>
</tr>
</thead>

<h2 id="summary">Summary</h2>
<table>
<thead>
<tr>
<th>What you learned</th>
<th>Key takeaway</th>
</tr>
</thead>
<tbody>
<tr>
<td>Nix dev environment</td>
<td>All tools declared in a flake, reproducible across machines</td>
</tr>
<tr>
<td>k3d cluster management</td>
<td>Full Kubernetes in Docker, starts in seconds, works on WSL</td>
</tr>
<tr>
<td>Kubernetes fundamentals</td>
<td>Pods, Deployments, Services, Ingress, ConfigMaps, Namespaces</td>
</tr>
<tr>
<td>k9s cluster exploration</td>
<td>Terminal UI for navigating and debugging Kubernetes in real time</td>
</tr>
<tr>
<td>Raw manifest deployment</td>
<td><code>kubectl apply</code> for direct, imperative control</td>
</tr>
<tr>
<td>Helm charts</td>
<td>Templated, versioned, reusable Kubernetes packages</td>
</tr>
<tr>
<td>Kustomize overlays</td>
<td>Environment-specific config without templates, built into kubectl</td>
</tr>
<tr>
<td>Argo CD</td>
<td>Declarative GitOps -- Git as the single source of truth</td>
</tr>
<tr>
<td>GitOps workflow</td>
<td>Push to Git = deploy to cluster, with self-healing and audit trail</td>
</tr>
<tr>
<td>Skaffold</td>
<td>Fast inner-loop development with live code reload in the cluster</td>
</tr>
</tbody>
</table>
<h3 id="the-big-picture">The Big Picture</h3>
<p>This TP ties into the rest of the course:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    TP1[&quot;TP 1&lt;br/&gt;Nix&lt;br/&gt;&lt;i&gt;Reproducible builds&lt;/i&gt;&quot;] --&gt; TP2[&quot;TP 2&lt;br/&gt;Containers&lt;br/&gt;&lt;i&gt;Package apps&lt;/i&gt;&quot;]
    TP2 --&gt; TP3[&quot;TP 3&lt;br/&gt;Nix + Containers&lt;br/&gt;&lt;i&gt;Minimal images&lt;/i&gt;&quot;]
    TP3 --&gt; TP4[&quot;TP 4&lt;br/&gt;CI Pipeline&lt;br/&gt;&lt;i&gt;Automated testing&lt;/i&gt;&quot;]
    TP4 --&gt; TP5[&quot;TP 5&lt;br/&gt;Kubernetes + GitOps&lt;br/&gt;&lt;i&gt;Automated deployment&lt;/i&gt;&quot;]

    style TP5 fill:#bfb,stroke:#333,stroke-width:3px
</code></pre>
<p>The full chain is now: <strong>build reproducibly &gt; package in a minimal container &gt; deploy via GitOps &gt; develop with fast feedback</strong>. This is how modern software delivery works.</p>
<h3 id="key-commands-reference">Key Commands Reference</h3>
<table>
<thead>
<tr>
<th>Command</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>nix develop</code></td>
<td>Enter the Nix shell with all workshop tools</td>
</tr>
<tr>
<td><code>k3d cluster create</code></td>
<td>Create a local Kubernetes cluster</td>
</tr>
<tr>
<td><code>k3d cluster list</code></td>
<td>List clusters</td>
</tr>
<tr>
<td><code>kubectl apply -f file.yaml</code></td>
<td>Deploy a manifest</td>
</tr>
<tr>
<td><code>kubectl apply -k dir/</code></td>
<td>Deploy a Kustomize directory</td>
</tr>
<tr>
<td><code>kubectl get pods -n &lt;ns&gt;</code></td>
<td>List pods in a namespace</td>
</tr>
<tr>
<td><code>kubectl logs &lt;pod&gt;</code></td>
<td>View pod logs</td>
</tr>
<tr>
<td><code>kubectl port-forward</code></td>
<td>Forward a port from cluster to localhost</td>
</tr>
<tr>
<td><code>k9s</code></td>
<td>Launch the terminal cluster UI</td>
</tr>
<tr>
<td><code>helm install &lt;name&gt; &lt;chart&gt;</code></td>
<td>Install a Helm release</td>
</tr>
<tr>
<td><code>helm upgrade --install</code></td>
<td>Install or upgrade a Helm release</td>
</tr>
<tr>
<td><code>helm list</code></td>
<td>List installed releases</td>
</tr>
<tr>
<td><code>kustomize build dir/</code></td>
<td>Render a Kustomize overlay to YAML</td>
</tr>
<tr>
<td><code>argocd app create</code></td>
<td>Create an Argo CD application</td>
</tr>
<tr>
<td><code>argocd app sync</code></td>
<td>Force-sync an application</td>
</tr>
<tr>
<td><code>argocd app list</code></td>
<td>List all applications</td>
</tr>
<tr>
<td><code>skaffold dev</code></td>
<td>Start live development mode</td>
</tr>
<tr>
<td><code>skaffold run</code></td>
<td>Build and deploy once</td>
</tr>
</tbody>
</table>
</section>
