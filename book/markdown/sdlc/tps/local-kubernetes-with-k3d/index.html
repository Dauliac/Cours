<h1 id="tp-5-local-kubernetes-with-k3d">TP 5: Local Kubernetes with k3d</h1>
<h2 id="learning-objectives">Learning Objectives</h2>
<p>By the end of this practical, you will be able to:</p>
<ol>
<li><strong>Create</strong> a local Kubernetes cluster with k3d that runs inside Docker</li>
<li><strong>Understand</strong> core Kubernetes concepts: Pods, Deployments, Services, Namespaces, Ingress</li>
<li><strong>Navigate</strong> the cluster visually with k9s</li>
<li><strong>Deploy</strong> applications using raw YAML manifests and <code>kubectl</code></li>
<li><strong>Package</strong> and deploy applications using Helm charts</li>
<li><strong>Manage</strong> environment-specific configurations with Kustomize overlays</li>
<li><strong>Install</strong> Argo CD and manage it through its web UI and CLI</li>
<li><strong>Implement</strong> a GitOps workflow where Git is the single source of truth for deployments</li>
<li><strong>Set up</strong> a fast local development loop with Skaffold that live-syncs code into the cluster</li>
</ol>
<h2 id="prerequisites">Prerequisites</h2>
<ul>
<li>Completed <a href="../perfect-container-with/README.md">TP 2: Building Containers</a> (you need to understand container basics)</li>
<li>Docker installed and running (Docker Desktop on WSL/macOS, Docker Engine on Linux)</li>
<li>Nix installed (from TP 1) with flakes enabled</li>
<li>Git installed</li>
<li>A GitHub account (for the GitOps section)</li>
</ul>
<blockquote>
<p><strong>WSL users</strong>: all commands in this TP run inside your WSL terminal. Docker Desktop must have WSL integration enabled (Settings &gt; Resources &gt; WSL Integration).</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h2 id="overview">Overview</h2>
<p>This workshop takes you from zero Kubernetes knowledge to a full local GitOps workflow.<br />
You will progress through increasingly sophisticated deployment methods:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    A[&quot;Raw Manifests&lt;br/&gt;&lt;i&gt;manual kubectl apply&lt;/i&gt;&quot;] --&gt; B[&quot;Helm&lt;br/&gt;&lt;i&gt;templated packages&lt;/i&gt;&quot;]
    B --&gt; B2[&quot;Kustomize&lt;br/&gt;&lt;i&gt;environment overlays&lt;/i&gt;&quot;]
    B2 --&gt; C[&quot;Argo CD&lt;br/&gt;&lt;i&gt;declarative sync&lt;/i&gt;&quot;]
    C --&gt; D[&quot;GitOps&lt;br/&gt;&lt;i&gt;Git-driven deploys&lt;/i&gt;&quot;]
    D --&gt; E[&quot;Skaffold&lt;br/&gt;&lt;i&gt;live dev loop&lt;/i&gt;&quot;]

    style A fill:#f9f,stroke:#333
    style B fill:#bbf,stroke:#333
    style B2 fill:#adf,stroke:#333
    style C fill:#bfb,stroke:#333
    style D fill:#fbb,stroke:#333
    style E fill:#ff9,stroke:#333
</code></pre>
<p>Each step builds on the previous one. By the end, you will have a local cluster<br />
where pushing to Git automatically deploys your application, and editing code locally<br />
instantly reflects in the cluster.</p>
<h3 id="what-is-kubernetes">What is Kubernetes?</h3>
<p>Before we dive in, let's understand <strong>why Kubernetes exists</strong>. Imagine you have a web application running in a container. That works fine on one machine. But what happens when:</p>
<ul>
<li>The container crashes? Nobody restarts it.</li>
<li>You need 10 copies to handle traffic? You manage them manually.</li>
<li>You want to update without downtime? You have to orchestrate it yourself.</li>
</ul>
<p><strong>Kubernetes solves all of this.</strong> It is a <strong>container orchestrator</strong> -- you tell it <em>what you want</em> (e.g. &quot;run 3 copies of my app&quot;), and it figures out <em>how to make it happen</em> (scheduling containers, restarting crashed ones, rolling out updates).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Without Kubernetes&quot;
        U1[You] --&gt;|&quot;manually start&quot;| C1[Container 1]
        U1 --&gt;|&quot;manually start&quot;| C2[Container 2]
        U1 --&gt;|&quot;manually restart&lt;br/&gt;if it crashes&quot;| C1
    end

    subgraph &quot;With Kubernetes&quot;
        U2[You] --&gt;|&quot;declare: I want 3 replicas&quot;| K[Kubernetes]
        K --&gt;|&quot;schedules &amp; manages&quot;| P1[Container 1]
        K --&gt;|&quot;schedules &amp; manages&quot;| P2[Container 2]
        K --&gt;|&quot;schedules &amp; manages&quot;| P3[Container 3]
        K --&gt;|&quot;auto-restarts if crash&quot;| P1
    end
</code></pre>
<p>Think of Kubernetes as a <strong>declarative system</strong>: you describe the desired state, and Kubernetes continuously works to make reality match that description.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<h2 id="part-1-setting-up-k3d-20-min">Part 1: Setting Up k3d (20 min)</h2>
<h3 id="what-is-k3d">What is k3d?</h3>
<p><a href="https://k3d.io/">k3d</a> runs <a href="https://k3s.io/">k3s</a> (a lightweight Kubernetes distribution) inside Docker containers.<br />
This means you get a fully functional Kubernetes cluster without needing a VM or cloud provider.</p>
<p>In production, Kubernetes runs on real servers (physical or virtual machines). Each server is a <strong>node</strong>. But for learning and development, we don't need real servers -- k3d <strong>simulates</strong> a multi-node cluster by running each node as a Docker container on your laptop:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Production Cluster&quot;
        direction TB
        PM1[Physical Server 1&lt;br/&gt;Control Plane Node]
        PM2[Physical Server 2&lt;br/&gt;Worker Node]
        PM3[Physical Server 3&lt;br/&gt;Worker Node]
    end

    subgraph &quot;k3d on your laptop&quot;
        direction TB
        D[Docker Engine]
        D --&gt; DC1[&quot;Container: k3d-server-0&lt;br/&gt;(simulates Control Plane)&quot;]
        D --&gt; DC2[&quot;Container: k3d-agent-0&lt;br/&gt;(simulates Worker Node)&quot;]
        D --&gt; DC3[&quot;Container: k3d-agent-1&lt;br/&gt;(simulates Worker Node)&quot;]
        D --&gt; DC4[&quot;Container: k3d-serverlb&lt;br/&gt;(Load Balancer)&quot;]
    end

    style PM1 fill:#f9f,stroke:#333
    style PM2 fill:#bbf,stroke:#333
    style PM3 fill:#bbf,stroke:#333
    style DC1 fill:#f9f,stroke:#333
    style DC2 fill:#bbf,stroke:#333
    style DC3 fill:#bbf,stroke:#333
    style DC4 fill:#ff9,stroke:#333
</code></pre>
<p><strong>Key insight</strong>: it's containers all the way down. Your application containers run <em>inside</em> the k3d node containers. This is &quot;Docker-in-Docker&quot; -- and it works perfectly for local development.</p>
<p>Why k3d over alternatives?</p>
<table>
<thead>
<tr>
<th>Tool</th>
<th>How it works</th>
<th>Pros</th>
<th>Cons</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>k3d</strong></td>
<td>k3s in Docker containers</td>
<td>Fast startup, multi-node, works in WSL</td>
<td>Needs Docker</td>
</tr>
<tr>
<td>minikube</td>
<td>VM or Docker</td>
<td>Many addons</td>
<td>Heavier, slower</td>
</tr>
<tr>
<td>kind</td>
<td>Kubernetes in Docker</td>
<td>Official K8s conformance</td>
<td>Slower than k3d</td>
</tr>
<tr>
<td>Docker Desktop K8s</td>
<td>Built-in</td>
<td>Zero setup</td>
<td>Single node, not configurable</td>
</tr>
</tbody>
</table>
<p>k3d starts a cluster in seconds and works everywhere Docker runs -- including WSL 2.</p>
<h3 id="step-1-set-up-your-environment-with-nix">Step 1: Set up your environment with Nix</h3>
<p>All the tools for this workshop are packaged in a Nix flake template. This gives you a <strong>reproducible, declarative</strong> development environment -- no manual installation of individual tools.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">mkdir</span> -p k8s-workshop
<span class="hljs-built_in">cd</span> k8s-workshop
nix flake init -t github:Dauliac/Cours<span class="hljs-comment">#tp5-k8s</span>
</code></pre>
<p>This creates a <code>flake.nix</code> and Nix modules that declare all the tools you need. Enter the development shell:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># If you have direnv installed (recommended):</span>
direnv allow

<span class="hljs-comment"># Otherwise, enter the shell manually:</span>
nix develop
</code></pre>
<p>Verify that all tools are available:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">k3d version
kubectl version --client
helm version
k9s version
argocd version --client
kustomize version
skaffold version
</code></pre>
<blockquote>
<p><strong>What just happened?</strong> The Nix flake declared all workshop dependencies (<code>k3d</code>, <code>kubectl</code>, <code>helm</code>, <code>k9s</code>, <code>argocd</code>, <code>kustomize</code>, <code>skaffold</code>) in a single file. <code>nix develop</code> downloads and makes them available in an isolated shell -- nothing is installed globally, and everyone gets the exact same versions. This is the same reproducibility approach from TP 1, applied to infrastructure tooling.</p>
</blockquote>
<h3 id="step-2-create-your-first-cluster">Step 2: Create your first cluster</h3>
<blockquote>
<p><strong>Before creating</strong>: if you have an existing k3d cluster using ports 8080 or 8443, the creation will hang silently. Check with <code>k3d cluster list</code> and delete stale clusters with <code>k3d cluster delete &lt;name&gt;</code> first.</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">k3d cluster create my-cluster \
  --image rancher/k3s:v1.31.6-k3s1 \
  --port <span class="hljs-string">&quot;8080:80@loadbalancer&quot;</span> \
  --port <span class="hljs-string">&quot;8443:443@loadbalancer&quot;</span> \
  --agents 2
</code></pre>
<blockquote>
<p><strong>Why <code>--image</code>?</strong> The default k3s version bundled with k3d can be very old. Pinning a recent k3s release avoids compatibility issues with newer Kubernetes APIs and ensures images pull correctly.</p>
</blockquote>
<p>Let's break down what each flag does:</p>
<table>
<thead>
<tr>
<th>Flag</th>
<th>What it does</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>my-cluster</code></td>
<td>The name of your cluster (you can choose any name)</td>
</tr>
<tr>
<td><code>--image rancher/k3s:v1.31.6-k3s1</code></td>
<td>Pin a specific Kubernetes version (avoids surprises)</td>
</tr>
<tr>
<td><code>--port &quot;8080:80@loadbalancer&quot;</code></td>
<td>Map your machine's port 8080 to the cluster's port 80</td>
</tr>
<tr>
<td><code>--port &quot;8443:443@loadbalancer&quot;</code></td>
<td>Map your machine's port 8443 to the cluster's port 443</td>
</tr>
<tr>
<td><code>--agents 2</code></td>
<td>Create 2 worker nodes (in addition to 1 control plane node)</td>
</tr>
</tbody>
</table>
<p>This creates:</p>
<ul>
<li><strong>1 server node</strong> (control plane): runs the Kubernetes API server, scheduler, and etcd</li>
<li><strong>2 agent nodes</strong> (workers): run your workloads</li>
<li><strong>1 load balancer</strong>: forwards ports 8080 and 8443 from your machine into the cluster</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Your Machine&quot;
        Browser[&quot;Browser / curl&quot;]
    end

    subgraph &quot;Docker Network&quot;
        LB[&quot;k3d-my-cluster-serverlb&lt;br/&gt;Load Balancer&lt;br/&gt;:8080 → :80&lt;br/&gt;:8443 → :443&quot;]

        subgraph &quot;Control Plane&quot;
            S0[&quot;k3d-my-cluster-server-0&lt;br/&gt;API Server + Scheduler + etcd&quot;]
        end

        subgraph &quot;Workers&quot;
            A0[&quot;k3d-my-cluster-agent-0&lt;br/&gt;Runs your Pods&quot;]
            A1[&quot;k3d-my-cluster-agent-1&lt;br/&gt;Runs your Pods&quot;]
        end
    end

    Browser --&gt;|&quot;:8080&quot;| LB
    LB --&gt;|&quot;:80&quot;| S0
    S0 --&gt; A0
    S0 --&gt; A1

    style LB fill:#ff9,stroke:#333
    style S0 fill:#f9f,stroke:#333
    style A0 fill:#bbf,stroke:#333
    style A1 fill:#bbf,stroke:#333
</code></pre>
<p><strong>What happens behind the scenes</strong> when you run this command:</p>
<ol>
<li>k3d pulls the <code>rancher/k3s</code> Docker image</li>
<li>It creates a Docker network so all nodes can communicate</li>
<li>It starts 4 Docker containers (1 server + 2 agents + 1 load balancer)</li>
<li>The server node bootstraps Kubernetes (starts the API server, etcd database, scheduler)</li>
<li>The agent nodes register themselves with the server</li>
<li>k3d writes a <strong>kubeconfig</strong> file so <code>kubectl</code> knows how to connect to the cluster</li>
<li>The load balancer starts forwarding your ports into the cluster</li>
</ol>
<p>All of this happens in a few seconds.</p>
<h3 id="step-3-verify-the-cluster">Step 3: Verify the cluster</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># k3d automatically configures kubectl to point at your cluster</span>
kubectl cluster-info

<span class="hljs-comment"># List the nodes</span>
kubectl get nodes
</code></pre>
<p>You should see three nodes with status <code>Ready</code>. Your cluster is running.</p>
<blockquote>
<p><strong>What is a kubeconfig?</strong> When k3d creates a cluster, it writes connection details (server address, certificates) to a file called <code>~/.kube/config</code>. This file can contain configurations for <em>multiple</em> clusters. A <strong>context</strong> is a named entry in this file that points to a specific cluster. <code>kubectl</code> always talks to whichever context is currently selected.</p>
</blockquote>
<blockquote>
<p><strong>Important</strong>: if you have other Kubernetes clusters configured (e.g. from work), make sure your context points at k3d:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl config current-context    <span class="hljs-comment"># Should show: k3d-my-cluster</span>
kubectl config use-context k3d-my-cluster   <span class="hljs-comment"># Switch if needed</span>
</code></pre>
</blockquote>
<h3 id="step-4-explore-cluster-management">Step 4: Explore cluster management</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># List all clusters</span>
k3d cluster list

<span class="hljs-comment"># Stop the cluster (preserves state)</span>
k3d cluster stop my-cluster

<span class="hljs-comment"># Start it again</span>
k3d cluster start my-cluster

<span class="hljs-comment"># Delete the cluster entirely</span>
<span class="hljs-comment"># k3d cluster delete my-cluster    # Don&#x27;t run this yet!</span>
</code></pre>
<h3 id="checkpoint">Checkpoint</h3>
<p>Run these commands and verify they work:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get nodes          <span class="hljs-comment"># 3 nodes, all Ready</span>
kubectl get namespaces     <span class="hljs-comment"># default, kube-system, kube-public, kube-node-lease</span>
docker ps                  <span class="hljs-comment"># 4 containers (server, 2 agents, loadbalancer)</span>
</code></pre>
<h3 id="step-5-meet-k9s----your-visual-cluster-explorer">Step 5: Meet k9s -- your visual cluster explorer</h3>
<p><a href="https://k9scli.io/">k9s</a> is a terminal UI that makes it much easier to understand what is happening in your cluster. Instead of typing <code>kubectl get</code> commands repeatedly, k9s gives you a live, interactive view.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">k9s
</code></pre>
<p>You will see a full-screen terminal interface showing your cluster resources. Key navigation:</p>
<table>
<thead>
<tr>
<th>Key</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>:pods</code></td>
<td>View all pods (type any resource name)</td>
</tr>
<tr>
<td><code>:deploy</code></td>
<td>View deployments</td>
</tr>
<tr>
<td><code>:svc</code></td>
<td>View services</td>
</tr>
<tr>
<td><code>:ns</code></td>
<td>View namespaces</td>
</tr>
<tr>
<td><code>/</code></td>
<td>Filter/search</td>
</tr>
<tr>
<td><code>d</code></td>
<td>Describe selected resource</td>
</tr>
<tr>
<td><code>l</code></td>
<td>View logs of selected pod</td>
</tr>
<tr>
<td><code>s</code></td>
<td>Shell into selected pod</td>
</tr>
<tr>
<td><code>Ctrl+C</code> or <code>:q</code></td>
<td>Quit k9s</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>Tip</strong>: keep k9s running in a separate terminal throughout this workshop. It updates in real time, so you can watch pods being created, scaled, and deleted as you run commands in another terminal. This is much more intuitive than repeatedly running <code>kubectl get pods</code>.</p>
</blockquote>

<h2 id="part-2-kubernetes-fundamentals-with-raw-manifests-40-min">Part 2: Kubernetes Fundamentals with Raw Manifests (40 min)</h2>
<h3 id="core-concepts">Core Concepts</h3>
<p>Before deploying anything, understand the building blocks. Kubernetes has many resource types, but you only need a handful to get started. Here is how they relate to each other:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;What you define&quot;
        NS[Namespace&lt;br/&gt;&lt;i&gt;Isolation boundary&lt;/i&gt;]
        CM[ConfigMap&lt;br/&gt;&lt;i&gt;Configuration data&lt;/i&gt;]
        SEC[Secret&lt;br/&gt;&lt;i&gt;Sensitive data&lt;/i&gt;]
        DEP[Deployment&lt;br/&gt;&lt;i&gt;Desired state: 3 replicas&lt;/i&gt;]
        SVC[Service&lt;br/&gt;&lt;i&gt;Stable network endpoint&lt;/i&gt;]
        ING[Ingress&lt;br/&gt;&lt;i&gt;External HTTP routing&lt;/i&gt;]
    end

    subgraph &quot;What Kubernetes creates&quot;
        RS[ReplicaSet&lt;br/&gt;&lt;i&gt;Maintains Pod count&lt;/i&gt;]
        P1[Pod 1]
        P2[Pod 2]
        P3[Pod 3]
    end

    subgraph &quot;External&quot;
        USER[User / Browser]
    end

    DEP --&gt;|&quot;creates &amp; manages&quot;| RS
    RS --&gt;|&quot;creates&quot;| P1
    RS --&gt;|&quot;creates&quot;| P2
    RS --&gt;|&quot;creates&quot;| P3
    CM -.-&gt;|&quot;injects config&quot;| P1
    CM -.-&gt;|&quot;injects config&quot;| P2
    CM -.-&gt;|&quot;injects config&quot;| P3
    SEC -.-&gt;|&quot;injects secrets&quot;| P1
    SVC --&gt;|&quot;load-balances to&quot;| P1
    SVC --&gt;|&quot;load-balances to&quot;| P2
    SVC --&gt;|&quot;load-balances to&quot;| P3
    ING --&gt;|&quot;routes to&quot;| SVC
    USER --&gt;|&quot;HTTP request&quot;| ING

    style DEP fill:#f9f,stroke:#333
    style RS fill:#fdf,stroke:#333
    style P1 fill:#bbf,stroke:#333
    style P2 fill:#bbf,stroke:#333
    style P3 fill:#bbf,stroke:#333
    style SVC fill:#bfb,stroke:#333
    style ING fill:#ff9,stroke:#333
</code></pre>
<table>
<thead>
<tr>
<th>Concept</th>
<th>What it is</th>
<th>Analogy</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Pod</strong></td>
<td>Smallest deployable unit. One or more containers.</td>
<td>A single process</td>
</tr>
<tr>
<td><strong>Deployment</strong></td>
<td>Manages Pods. Handles scaling, rolling updates, rollbacks.</td>
<td>A process supervisor</td>
</tr>
<tr>
<td><strong>ReplicaSet</strong></td>
<td>Created by Deployment. Ensures N pods are always running.</td>
<td>The supervisor's checklist</td>
</tr>
<tr>
<td><strong>Service</strong></td>
<td>Stable network endpoint for a set of Pods.</td>
<td>A DNS entry + load balancer</td>
</tr>
<tr>
<td><strong>Namespace</strong></td>
<td>Virtual cluster within a cluster. Isolates resources.</td>
<td>A folder</td>
</tr>
<tr>
<td><strong>Ingress</strong></td>
<td>Routes external HTTP traffic to Services.</td>
<td>A reverse proxy rule</td>
</tr>
<tr>
<td><strong>ConfigMap</strong></td>
<td>Key-value configuration injected into Pods.</td>
<td>Environment variables file</td>
</tr>
<tr>
<td><strong>Secret</strong></td>
<td>Like ConfigMap, but for sensitive data (base64-encoded).</td>
<td>An encrypted env file</td>
</tr>
</tbody>
</table>
<p><strong>The declarative model</strong>: notice that you never say &quot;start a container&quot;. You say &quot;I want a Deployment with 3 replicas&quot;. Kubernetes then figures out what needs to happen -- creating Pods, scheduling them on nodes, restarting crashed ones. This is the fundamental difference from Docker Compose where you describe <em>how</em> to run things.</p>
<h3 id="step-5-create-a-namespace">Step 5: Create a namespace</h3>
<p>Create a working directory for this TP:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">mkdir</span> -p k8s-workshop
<span class="hljs-built_in">cd</span> k8s-workshop
</code></pre>
<p>Create <code>namespace.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Namespace</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">workshop</span>
</code></pre>
<p>Apply it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f namespace.yaml
kubectl get namespaces
</code></pre>
<p>You should see <code>workshop</code> in the list. From now on, we will deploy everything into this namespace.</p>
<blockquote>
<p><strong>What just happened?</strong> You sent a YAML file to the Kubernetes API server using <code>kubectl apply</code>. The API server validated it, stored the desired state in etcd (its database), and created the namespace. This is the pattern for <em>everything</em> in Kubernetes: write YAML, apply it, Kubernetes makes it real.</p>
</blockquote>
<h3 id="step-6-deploy-a-pod-directly">Step 6: Deploy a Pod directly</h3>
<p>Create <code>pod.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Pod</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello-pod</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">workshop</span>
  <span class="hljs-attr">labels:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">containers:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
      <span class="hljs-attr">image:</span> <span class="hljs-string">traefik/whoami:v1.10</span>
      <span class="hljs-attr">ports:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">80</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f pod.yaml
kubectl get pods -n workshop
</code></pre>
<p>Wait until <code>STATUS</code> shows <code>Running</code>. Then test it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Forward the pod&#x27;s port to your machine</span>
kubectl port-forward -n workshop pod/hello-pod 9090:80 &amp;

<span class="hljs-comment"># Test it</span>
curl http://localhost:9090

<span class="hljs-comment"># Stop the port-forward</span>
<span class="hljs-built_in">kill</span> %1
</code></pre>
<p>You should see a response showing the hostname, IP address, and request headers. <a href="https://github.com/traefik/whoami">traefik/whoami</a> is a tiny Go server (Apache 2.0 license) that echoes back request information -- perfect for testing.</p>
<blockquote>
<p><strong>What is port-forwarding?</strong> Your Pod runs <em>inside</em> the cluster, on the cluster's internal network. Your laptop cannot reach it directly. <code>kubectl port-forward</code> creates a tunnel from your machine (port 9090) into the Pod (port 8080):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Your laptop:9090 ──tunnel──→ Pod hello-pod:80
</code></pre>
<p>This is useful for debugging but not how you'd expose services in production.</p>
</blockquote>
<p>Now delete the Pod:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl delete -f pod.yaml
kubectl get pods -n workshop
</code></pre>
<p>The Pod is gone. <strong>Nobody recreates it.</strong> This is the problem -- raw Pods have no self-healing. That is what Deployments solve.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Raw Pod (no self-healing)&quot;
        P[&quot;Pod: hello-pod&quot;]
        X[&quot;<img class="emoji" draggable="false" alt="💀" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/1f480.svg" data-marp-twemoji=""/> Deleted&quot;]
        P --&gt;|&quot;kubectl delete&quot;| X
        X --&gt;|&quot;nothing happens&quot;| GONE[&quot;Gone forever&quot;]
    end
</code></pre>
<h3 id="step-7-deploy-with-a-deployment">Step 7: Deploy with a Deployment</h3>
<p>Create <code>deployment.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apps/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">workshop</span>
  <span class="hljs-attr">labels:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">replicas:</span> <span class="hljs-number">3</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">matchLabels:</span>
      <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">template:</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">labels:</span>
        <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
    <span class="hljs-attr">spec:</span>
      <span class="hljs-attr">containers:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
          <span class="hljs-attr">image:</span> <span class="hljs-string">traefik/whoami:v1.10</span>
          <span class="hljs-attr">ports:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">80</span>
          <span class="hljs-attr">resources:</span>
            <span class="hljs-attr">requests:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">50m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">32Mi</span>
            <span class="hljs-attr">limits:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">100m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">64Mi</span>
</code></pre>
<p>Let's understand the YAML structure before applying it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;deployment.yaml structure&quot;
        META[&quot;metadata:&lt;br/&gt;name: hello&lt;br/&gt;namespace: workshop&quot;]
        SPEC[&quot;spec.replicas: 3&lt;br/&gt;&lt;i&gt;How many Pods to run&lt;/i&gt;&quot;]
        SEL[&quot;spec.selector:&lt;br/&gt;matchLabels: app=hello&lt;br/&gt;&lt;i&gt;Which Pods belong to this Deployment&lt;/i&gt;&quot;]
        TPL[&quot;spec.template:&lt;br/&gt;&lt;i&gt;The Pod blueprint&lt;/i&gt;&quot;]
        CONT[&quot;containers:&lt;br/&gt;- name: hello&lt;br/&gt;  image: traefik/whoami&lt;br/&gt;&lt;i&gt;What container to run&lt;/i&gt;&quot;]
        RES[&quot;resources:&lt;br/&gt;requests: cpu=50m, mem=32Mi&lt;br/&gt;limits: cpu=100m, mem=64Mi&lt;br/&gt;&lt;i&gt;How much CPU/RAM to allocate&lt;/i&gt;&quot;]
    end

    META --&gt; SPEC
    SPEC --&gt; SEL
    SEL --&gt; TPL
    TPL --&gt; CONT
    CONT --&gt; RES
</code></pre>
<blockquote>
<p><strong>What are resource requests and limits?</strong></p>
<ul>
<li><strong>Requests</strong> = the minimum resources guaranteed to your container. Kubernetes uses this to decide which node has enough room.</li>
<li><strong>Limits</strong> = the maximum resources your container can use. If it exceeds memory limits, Kubernetes kills it (OOMKilled).</li>
<li><code>50m</code> CPU = 0.05 CPU cores (1000m = 1 full core). <code>32Mi</code> memory = 32 mebibytes.</li>
</ul>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f deployment.yaml
kubectl get deployments -n workshop
kubectl get pods -n workshop
</code></pre>
<p>You should see 3 Pods running. Notice that each Pod has a unique name like <code>hello-7d4b8c6f9-x2k4m</code> -- Kubernetes generates these names automatically.</p>
<p>Now try killing one:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Delete one pod (replace with an actual pod name from `kubectl get pods`)</span>
kubectl delete pod -n workshop -l app=hello --field-selector=status.phase=Running --<span class="hljs-built_in">wait</span>=<span class="hljs-literal">false</span> | <span class="hljs-built_in">head</span> -1

<span class="hljs-comment"># Watch what happens</span>
kubectl get pods -n workshop -w
</code></pre>
<p>The Deployment automatically creates a new Pod to maintain 3 replicas. Press <code>Ctrl+C</code> to stop watching.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">sequenceDiagram
    participant You
    participant Deployment
    participant ReplicaSet
    participant Pods

    You-&gt;&gt;Deployment: kubectl apply (replicas: 3)
    Deployment-&gt;&gt;ReplicaSet: Create ReplicaSet
    ReplicaSet-&gt;&gt;Pods: Create Pod 1, Pod 2, Pod 3
    Note over Pods: 3 Pods running ✓

    You-&gt;&gt;Pods: kubectl delete Pod 2
    Note over Pods: Only 2 Pods running!
    ReplicaSet-&gt;&gt;ReplicaSet: Detects: 2/3 Pods running
    ReplicaSet-&gt;&gt;Pods: Create Pod 4 (replacement)
    Note over Pods: 3 Pods running again ✓
</code></pre>
<p><strong>This is self-healing in action.</strong> The Deployment's ReplicaSet continuously watches the actual state (how many Pods are running) and compares it to the desired state (3 replicas). When they differ, it takes action to reconcile. This is called the <strong>reconciliation loop</strong> -- the core pattern of Kubernetes.</p>
<h3 id="step-8-expose-with-a-service">Step 8: Expose with a Service</h3>
<p>Create <code>service.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Service</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">workshop</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">ports:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>
      <span class="hljs-attr">targetPort:</span> <span class="hljs-number">80</span>
  <span class="hljs-attr">type:</span> <span class="hljs-string">ClusterIP</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f service.yaml
kubectl get services -n workshop
</code></pre>
<p><strong>Why do we need a Service?</strong> Pods are ephemeral -- they can be killed, rescheduled, and get new IP addresses at any time. If your frontend tried to talk to a Pod's IP directly, it would break whenever the Pod restarts. A Service provides a <strong>stable address</strong> that never changes, and automatically load-balances traffic across all matching Pods:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;The Problem: Pod IPs change&quot;
        Client1[Client] --&gt;|&quot;10.42.1.5?&quot;| PodA[&quot;Pod (IP: 10.42.1.5)&quot;]
        PodA --&gt;|&quot;Pod restarts&quot;| PodB[&quot;New Pod (IP: 10.42.2.8)&quot;]
        Client1 -.-&gt;|&quot;<img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/274c.svg" data-marp-twemoji=""/> Connection lost!&quot;| PodB
    end
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;The Solution: Service&quot;
        Client2[Client] --&gt;|&quot;hello:80&quot;| SVC[&quot;Service: hello&lt;br/&gt;ClusterIP: 10.43.0.42&lt;br/&gt;&lt;i&gt;stable address&lt;/i&gt;&quot;]
        SVC --&gt;|&quot;routes to&quot;| Pod1[&quot;Pod 1&lt;br/&gt;10.42.1.5&quot;]
        SVC --&gt;|&quot;routes to&quot;| Pod2[&quot;Pod 2&lt;br/&gt;10.42.1.6&quot;]
        SVC --&gt;|&quot;routes to&quot;| Pod3[&quot;Pod 3&lt;br/&gt;10.42.2.3&quot;]
    end
</code></pre>
<p>The Service creates a stable DNS name (<code>hello.workshop.svc.cluster.local</code>) that load-balances across all 3 Pods.</p>
<blockquote>
<p><strong>How does the Service find the right Pods?</strong> Through <strong>labels</strong>. The Service has <code>selector: app: hello</code> and the Pods have <code>labels: app: hello</code>. Kubernetes matches them automatically. If a Pod doesn't have the right label, the Service ignores it. If a new Pod appears with the right label, the Service starts sending traffic to it.</p>
</blockquote>
<p>Test it from inside the cluster:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl run curl --<span class="hljs-built_in">rm</span> -i --<span class="hljs-built_in">tty</span> --image=curlimages/curl -n workshop -- \
  curl -s http://hello.workshop.svc.cluster.local
</code></pre>
<blockquote>
<p><strong>Why &quot;from inside the cluster&quot;?</strong> A <code>ClusterIP</code> Service is only reachable from within the cluster's network. That's why we launch a temporary <code>curl</code> Pod inside the cluster to test it. To make it reachable from your laptop, you need either port-forwarding or an Ingress (next step).</p>
</blockquote>
<h3 id="step-9-expose-externally-with-ingress">Step 9: Expose externally with Ingress</h3>
<p><strong>What is an Ingress?</strong> While a Service makes your app reachable inside the cluster, an Ingress makes it reachable from outside -- it acts like a reverse proxy (think nginx) that routes HTTP traffic based on hostnames and paths.</p>
<p>An Ingress needs an <strong>Ingress Controller</strong> to work -- a program that reads Ingress resources and configures the actual routing. k3d ships with <strong>Traefik</strong> as its Ingress controller, pre-installed and ready to use.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Outside the cluster&quot;
        User[&quot;Your browser&lt;br/&gt;localhost:8080&quot;]
    end

    subgraph &quot;Inside the cluster&quot;
        LB[&quot;k3d Load Balancer&lt;br/&gt;:8080 → :80&quot;]
        IC[&quot;Traefik&lt;br/&gt;(Ingress Controller)&lt;br/&gt;Reads Ingress rules&quot;]
        ING[&quot;Ingress: hello&lt;br/&gt;path: / → service: hello&quot;]
        SVC[&quot;Service: hello&lt;br/&gt;:80 → :8080&quot;]
        P1[Pod 1]
        P2[Pod 2]
        P3[Pod 3]
    end

    User --&gt; LB
    LB --&gt; IC
    IC --&gt;|&quot;matches rule&quot;| ING
    ING --&gt; SVC
    SVC --&gt; P1
    SVC --&gt; P2
    SVC --&gt; P3

    style IC fill:#ff9,stroke:#333
    style ING fill:#bfb,stroke:#333
</code></pre>
<p>Create <code>ingress.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">networking.k8s.io/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Ingress</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">workshop</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">rules:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">http:</span>
        <span class="hljs-attr">paths:</span>
          <span class="hljs-bullet">-</span> <span class="hljs-attr">path:</span> <span class="hljs-string">/</span>
            <span class="hljs-attr">pathType:</span> <span class="hljs-string">Prefix</span>
            <span class="hljs-attr">backend:</span>
              <span class="hljs-attr">service:</span>
                <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
                <span class="hljs-attr">port:</span>
                  <span class="hljs-attr">number:</span> <span class="hljs-number">80</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f ingress.yaml
</code></pre>
<p>Now access it through the k3d load balancer:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl http://localhost:8080
</code></pre>
<p>You should see a response with the pod's hostname, IP, and request headers.</p>
<p><strong>Trace the full request path</strong> to understand what happened:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">sequenceDiagram
    participant Browser as Your Browser
    participant LB as k3d Load Balancer
    participant Traefik as Traefik (Ingress Controller)
    participant Service as Service: hello
    participant Pod as Pod (one of 3)

    Browser-&gt;&gt;LB: GET http://localhost:8080/
    LB-&gt;&gt;Traefik: Forward to port 80
    Traefik-&gt;&gt;Traefik: Match Ingress rule (path: /)
    Traefik-&gt;&gt;Service: Route to service &quot;hello&quot; port 80
    Service-&gt;&gt;Pod: Load-balance to one Pod, port 80
    Pod--&gt;&gt;Browser: Hostname, IP, request headers
</code></pre>
<p>Every layer adds a capability: the load balancer maps external ports, Traefik routes by URL path, the Service load-balances across Pods, and the Pod runs your container.</p>
<h3 id="step-10-use-configmaps-for-configuration">Step 10: Use ConfigMaps for configuration</h3>
<p><strong>The problem</strong>: you don't want to hardcode configuration (database URLs, feature flags, API keys) inside your container image. That would mean rebuilding the image every time you change a setting. Instead, Kubernetes lets you inject configuration at deploy time using <strong>ConfigMaps</strong> (for non-sensitive data) and <strong>Secrets</strong> (for passwords, tokens, etc.).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Without ConfigMap&quot;
        IMG1[&quot;Image v1&lt;br/&gt;GREETING=Hello&quot;]
        IMG2[&quot;Image v2&lt;br/&gt;GREETING=Bonjour&quot;]
        Note1[&quot;<img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/274c.svg" data-marp-twemoji=""/> Must rebuild image&lt;br/&gt;to change config&quot;]
    end

    subgraph &quot;With ConfigMap&quot;
        IMG3[&quot;Same image&lt;br/&gt;(reads from env vars)&quot;]
        CM1[&quot;ConfigMap dev&lt;br/&gt;GREETING=Hello&quot;]
        CM2[&quot;ConfigMap prod&lt;br/&gt;GREETING=Bonjour&quot;]
        CM1 -.-&gt;|&quot;inject&quot;| IMG3
        CM2 -.-&gt;|&quot;inject&quot;| IMG3
        Note2[&quot;<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/2705.svg" data-marp-twemoji=""/> Same image,&lt;br/&gt;different config&quot;]
    end
</code></pre>
<p>Create <code>configmap.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">ConfigMap</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello-config</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">workshop</span>
<span class="hljs-attr">data:</span>
  <span class="hljs-attr">GREETING:</span> <span class="hljs-string">&quot;Hello from ConfigMap!&quot;</span>
</code></pre>
<p>Update the Deployment to use an image that reads environment variables. Replace the deployment with <code>deployment-v2.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apps/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">namespace:</span> <span class="hljs-string">workshop</span>
  <span class="hljs-attr">labels:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">replicas:</span> <span class="hljs-number">3</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">matchLabels:</span>
      <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">template:</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">labels:</span>
        <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
    <span class="hljs-attr">spec:</span>
      <span class="hljs-attr">containers:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
          <span class="hljs-attr">image:</span> <span class="hljs-string">nginx:1.27-alpine</span>
          <span class="hljs-attr">ports:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">80</span>
          <span class="hljs-attr">envFrom:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">configMapRef:</span>
                <span class="hljs-attr">name:</span> <span class="hljs-string">hello-config</span>
          <span class="hljs-attr">resources:</span>
            <span class="hljs-attr">requests:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">50m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">32Mi</span>
            <span class="hljs-attr">limits:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">100m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">64Mi</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f configmap.yaml
kubectl apply -f deployment-v2.yaml

<span class="hljs-comment"># Verify the env var is injected</span>
kubectl <span class="hljs-built_in">exec</span> -n workshop deploy/hello -- <span class="hljs-built_in">env</span> | grep GREETING
</code></pre>
<h3 id="checkpoint-1">Checkpoint</h3>
<p>At this point you have deployed:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get all -n workshop
</code></pre>
<p>You should see: 1 Deployment, 1 Service, 3 Pods, 1 ReplicaSet.</p>
<h3 id="what-you-have-built-so-far">What you have built so far</h3>
<p>Let's take a moment to review the full architecture you've created with raw manifests:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Namespace: workshop&quot;
        ING[&quot;Ingress: hello&lt;br/&gt;path: / → service hello&quot;]
        SVC[&quot;Service: hello&lt;br/&gt;ClusterIP, port 80→8080&quot;]
        DEP[&quot;Deployment: hello&lt;br/&gt;replicas: 3&quot;]
        CM[&quot;ConfigMap: hello-config&lt;br/&gt;GREETING=Hello from ConfigMap!&quot;]
        RS[&quot;ReplicaSet&quot;]
        P1[&quot;Pod 1&lt;br/&gt;nginx:1.27-alpine&quot;]
        P2[&quot;Pod 2&lt;br/&gt;nginx:1.27-alpine&quot;]
        P3[&quot;Pod 3&lt;br/&gt;nginx:1.27-alpine&quot;]
    end

    ING --&gt; SVC
    SVC --&gt; P1
    SVC --&gt; P2
    SVC --&gt; P3
    DEP --&gt; RS
    RS --&gt; P1
    RS --&gt; P2
    RS --&gt; P3
    CM -.-&gt;|&quot;env vars&quot;| P1
    CM -.-&gt;|&quot;env vars&quot;| P2
    CM -.-&gt;|&quot;env vars&quot;| P3
</code></pre>
<p>You created <strong>6 YAML files</strong> and applied them one by one. This works for learning, but imagine managing 50 services with 3 environments each -- that's 900 YAML files! The next section introduces <strong>Helm</strong> to solve this.</p>
<h3 id="step-11-clean-up-raw-manifests">Step 11: Clean up raw manifests</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl delete namespace workshop
</code></pre>
<p>This deletes everything in the namespace. A clean slate for the next section.</p>
<blockquote>
<p><strong>Why does deleting the namespace delete everything inside it?</strong> Namespaces are an ownership boundary. Every resource belongs to a namespace, and when the namespace is deleted, Kubernetes garbage-collects all resources inside it. This is similar to deleting a directory and all its files.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h2 id="part-3-deploying-with-helm-30-min">Part 3: Deploying with Helm (30 min)</h2>
<h3 id="why-helm">Why Helm?</h3>
<p>Raw manifests work, but they have problems:</p>
<ul>
<li><strong>No templating</strong>: you copy-paste for each environment (dev, staging, prod)</li>
<li><strong>No versioning</strong>: you cannot roll back to a previous set of manifests</li>
<li><strong>No dependency management</strong>: complex apps need many manifests in the right order</li>
</ul>
<p><a href="https://helm.sh/">Helm</a> solves these. It is the package manager for Kubernetes -- think <code>apt</code> for Ubuntu or <code>npm</code> for Node.js, but for Kubernetes applications.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Without Helm&quot;
        M1[&quot;deployment-dev.yaml&quot;]
        M2[&quot;deployment-staging.yaml&quot;]
        M3[&quot;deployment-prod.yaml&quot;]
        M4[&quot;service-dev.yaml&quot;]
        M5[&quot;service-staging.yaml&quot;]
        M6[&quot;service-prod.yaml&quot;]
    end

    subgraph &quot;With Helm&quot;
        CH[&quot;Chart&lt;br/&gt;(templates)&quot;]
        V1[&quot;values-dev.yaml&lt;br/&gt;replicas: 1&quot;]
        V2[&quot;values-staging.yaml&lt;br/&gt;replicas: 2&quot;]
        V3[&quot;values-prod.yaml&lt;br/&gt;replicas: 5&quot;]
        CH --&gt; |&quot;+| V1&quot;| R1[&quot;Dev deployment&quot;]
        CH --&gt; |&quot;+| V2&quot;| R2[&quot;Staging deployment&quot;]
        CH --&gt; |&quot;+| V3&quot;| R3[&quot;Prod deployment&quot;]
    end

    style CH fill:#f9f,stroke:#333
    style V1 fill:#bbf,stroke:#333
    style V2 fill:#bfb,stroke:#333
    style V3 fill:#fbb,stroke:#333
</code></pre>
<p><strong>One chart, many configurations.</strong> You write your Kubernetes manifests once as templates, then provide different <code>values.yaml</code> files for each environment.</p>
<table>
<thead>
<tr>
<th>Concept</th>
<th>What it is</th>
<th>Analogy</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Chart</strong></td>
<td>A package of Kubernetes manifests with templating</td>
<td>A package (like an npm package)</td>
</tr>
<tr>
<td><strong>Release</strong></td>
<td>A deployed instance of a chart</td>
<td>An installed package</td>
</tr>
<tr>
<td><strong>Values</strong></td>
<td>Configuration that customises a chart</td>
<td>Package configuration</td>
</tr>
<tr>
<td><strong>Repository</strong></td>
<td>A collection of charts (like a package registry)</td>
<td>npm registry</td>
</tr>
</tbody>
</table>
<h3 id="step-12-use-an-existing-helm-chart">Step 12: Use an existing Helm chart</h3>
<p>Deploy nginx using the official Bitnami chart:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Add the Bitnami repository</span>
helm repo add bitnami https://charts.bitnami.com/bitnami
helm repo update

<span class="hljs-comment"># Install nginx</span>
helm install my-nginx bitnami/nginx \
  --create-namespace \
  --namespace helm-demo \
  --<span class="hljs-built_in">set</span> service.type=ClusterIP

<span class="hljs-comment"># Watch the deployment</span>
kubectl get pods -n helm-demo -w
</code></pre>
<p>Press <code>Ctrl+C</code> when the Pod is <code>Running</code>. Inspect what Helm created:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># List releases</span>
helm list -n helm-demo

<span class="hljs-comment"># See all resources created by the chart</span>
kubectl get all -n helm-demo

<span class="hljs-comment"># See the values used</span>
helm get values my-nginx -n helm-demo --all
</code></pre>
<h3 id="step-13-create-your-own-helm-chart">Step 13: Create your own Helm chart</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">helm create hello-chart
</code></pre>
<p>This generates a chart skeleton. Let's explore and customise it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">tree hello-chart/
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>hello-chart/
├── Chart.yaml          # Chart metadata (name, version, description)
├── values.yaml         # Default configuration values
├── templates/          # Kubernetes manifest templates
│   ├── deployment.yaml
│   ├── service.yaml
│   ├── ingress.yaml
│   ├── hpa.yaml
│   ├── serviceaccount.yaml
│   ├── _helpers.tpl    # Template helpers
│   ├── NOTES.txt       # Post-install message
│   └── tests/
│       └── test-connection.yaml
└── charts/             # Sub-chart dependencies
</code></pre>
<p><strong>How Helm templating works</strong>: templates contain Go template placeholders like <code>{{ .Values.replicaCount }}</code> that get replaced with actual values at install time:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph LR
    subgraph &quot;Input&quot;
        T[&quot;templates/deployment.yaml&lt;br/&gt;&lt;code&gt;replicas: {{ .Values.replicaCount }}&lt;/code&gt;&quot;]
        V[&quot;values.yaml&lt;br/&gt;&lt;code&gt;replicaCount: 3&lt;/code&gt;&quot;]
    end

    H[&quot;helm install&quot;]

    subgraph &quot;Output&quot;
        O[&quot;Generated deployment.yaml&lt;br/&gt;&lt;code&gt;replicas: 3&lt;/code&gt;&quot;]
    end

    T --&gt; H
    V --&gt; H
    H --&gt; O

    style H fill:#f9f,stroke:#333
</code></pre>
<p>Edit <code>hello-chart/values.yaml</code> to configure our app:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">replicaCount:</span> <span class="hljs-number">3</span>

<span class="hljs-attr">image:</span>
  <span class="hljs-attr">repository:</span> <span class="hljs-string">traefik/whoami</span>
  <span class="hljs-attr">pullPolicy:</span> <span class="hljs-string">IfNotPresent</span>
  <span class="hljs-attr">tag:</span> <span class="hljs-string">&quot;v1.10&quot;</span>

<span class="hljs-attr">service:</span>
  <span class="hljs-attr">type:</span> <span class="hljs-string">ClusterIP</span>
  <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>

<span class="hljs-attr">ingress:</span>
  <span class="hljs-attr">enabled:</span> <span class="hljs-literal">true</span>
  <span class="hljs-attr">className:</span> <span class="hljs-string">&quot;&quot;</span>
  <span class="hljs-attr">hosts:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">host:</span> <span class="hljs-string">hello.local</span>
      <span class="hljs-attr">paths:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">path:</span> <span class="hljs-string">/</span>
          <span class="hljs-attr">pathType:</span> <span class="hljs-string">Prefix</span>

<span class="hljs-attr">whoamiName:</span> <span class="hljs-string">&quot;hello-from-helm&quot;</span>
</code></pre>
<p>Edit <code>hello-chart/templates/deployment.yaml</code> to pass the <code>whoamiName</code> value as an environment variable. Find the <code>containers</code> section and add after <code>ports</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml">          <span class="hljs-attr">env:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">WHOAMI_NAME</span>
              <span class="hljs-attr">value:</span> {{ <span class="hljs-string">.Values.whoamiName</span> <span class="hljs-string">|</span> <span class="hljs-string">default</span> <span class="hljs-string">&quot;hello-chart&quot;</span> <span class="hljs-string">|</span> <span class="hljs-string">quote</span> }}
</code></pre>
<h3 id="step-14-install-your-chart">Step 14: Install your chart</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Preview what will be deployed (dry run — renders templates without applying)</span>
helm template hello ./hello-chart --namespace helm-demo
</code></pre>
<blockquote>
<p><strong>Always preview first.</strong> <code>helm template</code> renders your templates with the values and prints the resulting YAML -- without sending anything to the cluster. Read the output carefully: this is exactly what Helm will send to Kubernetes. This is like a &quot;what would happen if...&quot; check.</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Install it (upgrade --install creates the release if it doesn&#x27;t exist, or upgrades it)</span>
helm upgrade --install hello ./hello-chart \
  --create-namespace \
  --namespace helm-demo

<span class="hljs-comment"># Check the deployment</span>
kubectl get all -n helm-demo -l app.kubernetes.io/name=hello-chart
</code></pre>
<h3 id="step-15-override-values">Step 15: Override values</h3>
<p>Helm charts are designed to be customised. Create <code>values-staging.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">replicaCount:</span> <span class="hljs-number">1</span>

<span class="hljs-attr">whoamiName:</span> <span class="hljs-string">&quot;hello-from-staging&quot;</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">helm upgrade --install hello-staging ./hello-chart \
  --create-namespace \
  --namespace staging \
  -f values-staging.yaml
</code></pre>
<p>Now you have two environments running different configurations from the same chart:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">helm list --all-namespaces
</code></pre>
<h3 id="step-16-manage-releases">Step 16: Manage releases</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># See release history</span>
helm <span class="hljs-built_in">history</span> hello -n helm-demo

<span class="hljs-comment"># Rollback to a previous version</span>
<span class="hljs-comment"># helm rollback hello 1 -n helm-demo</span>

<span class="hljs-comment"># Uninstall a release</span>
helm uninstall hello-staging -n staging
kubectl delete namespace staging
</code></pre>
<h3 id="checkpoint-2">Checkpoint</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">helm list --all-namespaces
kubectl get pods -n helm-demo
</code></pre>
<p>Clean up before the next section:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">helm uninstall my-nginx -n helm-demo
helm uninstall hello -n helm-demo
kubectl delete namespace helm-demo
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="part-4-managing-environments-with-kustomize-30-min">Part 4: Managing Environments with Kustomize (30 min)</h2>
<h3 id="what-is-kustomize">What is Kustomize?</h3>
<p><a href="https://kustomize.io/">Kustomize</a> is a configuration management tool built into <code>kubectl</code>. It lets you customise Kubernetes manifests <strong>without templates</strong>. Instead of injecting variables into YAML (like Helm), you write plain YAML and layer modifications on top.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Helm approach:          Kustomize approach:
  template + values       base manifests + overlays (patches)
  → rendered YAML         → merged YAML
</code></pre>
<table>
<thead>
<tr>
<th>Feature</th>
<th>Helm</th>
<th>Kustomize</th>
</tr>
</thead>
<tbody>
<tr>
<td>Templating</td>
<td>Go templates (<code>{{ .Values.x }}</code>)</td>
<td>None -- plain YAML</td>
</tr>
<tr>
<td>Customisation</td>
<td>Values files</td>
<td>Overlays and patches</td>
</tr>
<tr>
<td>Packaging</td>
<td>Charts with dependencies</td>
<td>Directories with <code>kustomization.yaml</code></td>
</tr>
<tr>
<td>Built into kubectl</td>
<td>No (separate binary)</td>
<td>Yes (<code>kubectl apply -k</code>)</td>
</tr>
<tr>
<td>Best for</td>
<td>Reusable packages, third-party apps</td>
<td>Environment-specific config, in-house apps</td>
</tr>
</tbody>
</table>
<p>In practice, teams often use <strong>both</strong>: Helm for third-party charts and Kustomize for their own services.</p>
<h3 id="step-17-create-a-kustomize-base">Step 17: Create a Kustomize base</h3>
<p>A Kustomize project has a <strong>base</strong> (shared resources) and <strong>overlays</strong> (environment-specific patches).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">mkdir</span> -p kustomize-demo/base
<span class="hljs-built_in">mkdir</span> -p kustomize-demo/overlays/dev
<span class="hljs-built_in">mkdir</span> -p kustomize-demo/overlays/staging
</code></pre>
<p>Create <code>kustomize-demo/base/deployment.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apps/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">labels:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">replicas:</span> <span class="hljs-number">1</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">matchLabels:</span>
      <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">template:</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">labels:</span>
        <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
    <span class="hljs-attr">spec:</span>
      <span class="hljs-attr">containers:</span>
        <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
          <span class="hljs-attr">image:</span> <span class="hljs-string">traefik/whoami:v1.10</span>
          <span class="hljs-attr">args:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-string">&quot;--name=hello-base&quot;</span>
          <span class="hljs-attr">ports:</span>
            <span class="hljs-bullet">-</span> <span class="hljs-attr">containerPort:</span> <span class="hljs-number">80</span>
          <span class="hljs-attr">resources:</span>
            <span class="hljs-attr">requests:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">50m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">32Mi</span>
            <span class="hljs-attr">limits:</span>
              <span class="hljs-attr">cpu:</span> <span class="hljs-string">100m</span>
              <span class="hljs-attr">memory:</span> <span class="hljs-string">64Mi</span>
</code></pre>
<p>Create <code>kustomize-demo/base/service.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Service</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">selector:</span>
    <span class="hljs-attr">app:</span> <span class="hljs-string">hello</span>
  <span class="hljs-attr">ports:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-attr">port:</span> <span class="hljs-number">80</span>
      <span class="hljs-attr">targetPort:</span> <span class="hljs-number">80</span>
  <span class="hljs-attr">type:</span> <span class="hljs-string">ClusterIP</span>
</code></pre>
<p>Create <code>kustomize-demo/base/kustomization.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">kustomize.config.k8s.io/v1beta1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Kustomization</span>
<span class="hljs-attr">resources:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">deployment.yaml</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">service.yaml</span>
</code></pre>
<p>Test the base renders correctly:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl kustomize kustomize-demo/base
</code></pre>
<p>This outputs the merged YAML. No templating -- just plain Kubernetes manifests.</p>
<h3 id="step-18-create-environment-overlays">Step 18: Create environment overlays</h3>
<p><strong>Dev overlay</strong> -- 1 replica, dev-specific name:</p>
<p>Create <code>kustomize-demo/overlays/dev/kustomization.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">kustomize.config.k8s.io/v1beta1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Kustomization</span>
<span class="hljs-attr">resources:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">../../base</span>
<span class="hljs-attr">namePrefix:</span> <span class="hljs-string">dev-</span>
<span class="hljs-attr">namespace:</span> <span class="hljs-string">dev</span>
<span class="hljs-attr">patches:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">target:</span>
      <span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
      <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
    <span class="hljs-attr">patch:</span> <span class="hljs-string">|-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/args
        value: [&quot;--name=hello-dev&quot;]
</span></code></pre>
<p><strong>Staging overlay</strong> -- 3 replicas, staging-specific name:</p>
<p>Create <code>kustomize-demo/overlays/staging/kustomization.yaml</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">kustomize.config.k8s.io/v1beta1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Kustomization</span>
<span class="hljs-attr">resources:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">../../base</span>
<span class="hljs-attr">namePrefix:</span> <span class="hljs-string">staging-</span>
<span class="hljs-attr">namespace:</span> <span class="hljs-string">staging</span>
<span class="hljs-attr">patches:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">target:</span>
      <span class="hljs-attr">kind:</span> <span class="hljs-string">Deployment</span>
      <span class="hljs-attr">name:</span> <span class="hljs-string">hello</span>
    <span class="hljs-attr">patch:</span> <span class="hljs-string">|-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/args
        value: [&quot;--name=hello-staging&quot;]
</span></code></pre>
<h3 id="step-19-deploy-with-kustomize">Step 19: Deploy with Kustomize</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Preview what each environment produces</span>
kubectl kustomize kustomize-demo/overlays/dev
kubectl kustomize kustomize-demo/overlays/staging
</code></pre>
<p>Notice how each overlay adds a namespace, a name prefix, and different replica counts -- all <strong>without modifying the base</strong> files.</p>
<p>Deploy the dev overlay:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl create namespace dev
kubectl apply -k kustomize-demo/overlays/dev

kubectl get all -n dev
</code></pre>
<p>Deploy the staging overlay:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl create namespace staging
kubectl apply -k kustomize-demo/overlays/staging

kubectl get all -n staging
</code></pre>
<blockquote>
<p><strong><code>-k</code> vs <code>-f</code></strong>: <code>kubectl apply -f</code> applies a single file. <code>kubectl apply -k</code> applies a Kustomize directory -- it reads the <code>kustomization.yaml</code>, merges the base with the overlay, and applies the result.</p>
</blockquote>
<h3 id="step-20-verify-the-environments">Step 20: Verify the environments</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Dev: 1 replica</span>
kubectl get pods -n dev

<span class="hljs-comment"># Staging: 3 replicas</span>
kubectl get pods -n staging
</code></pre>
<blockquote>
<p><strong>Tip</strong>: if you have k9s running, press <code>:ns</code> to see all namespaces, then select <code>dev</code> or <code>staging</code> to see the pods. Much faster than typing kubectl commands!</p>
</blockquote>
<h3 id="checkpoint-3">Checkpoint</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get all -n dev
kubectl get all -n staging
</code></pre>
<p>You should see different replica counts and name prefixes for each environment, all from the same base manifests.</p>
<p>Clean up:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl delete namespace dev staging
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="part-5-installing-argo-cd-30-min">Part 5: Installing Argo CD (30 min)</h2>
<h3 id="what-is-argo-cd">What is Argo CD?</h3>
<p><a href="https://argo-cd.readthedocs.io/">Argo CD</a> is a declarative GitOps continuous delivery tool for Kubernetes.</p>
<p>The key idea: <strong>Git is the single source of truth.</strong> You describe what should run in Git, and Argo CD continuously ensures the cluster matches.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;Traditional deployment (push-based)&quot;
        Dev1[Developer] --&gt;|&quot;1. git push&quot;| CI1[CI Pipeline]
        CI1 --&gt;|&quot;2. kubectl apply&quot;| Cluster1[Kubernetes Cluster]
        Note1[&quot;<img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/274c.svg" data-marp-twemoji=""/> Who deployed what? When?&lt;br/&gt;<img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/274c.svg" data-marp-twemoji=""/> CI has cluster credentials&lt;br/&gt;<img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/274c.svg" data-marp-twemoji=""/> No drift detection&quot;]
    end
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-mermaid">graph TB
    subgraph &quot;GitOps with Argo CD (pull-based)&quot;
        Dev2[Developer] --&gt;|&quot;1. git push&quot;| Git[Git Repository&lt;br/&gt;&lt;i&gt;Single source of truth&lt;/i&gt;]
        ArgoCD[Argo CD&lt;br/&gt;&lt;i&gt;Runs inside cluster&lt;/i&gt;] --&gt;|&quot;2. polls for changes&quot;| Git
        ArgoCD --&gt;|&quot;3. syncs&quot;| Cluster2[Kubernetes Cluster]
        Cluster2 --&gt;|&quot;4. reports status&quot;| ArgoCD
        Note2[&quot;<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/2705.svg" data-marp-twemoji=""/> Git log = audit trail&lt;br/&gt;<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/2705.svg" data-marp-twemoji=""/> No external cluster access needed&lt;br/&gt;<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@14.1.2/assets/svg/2705.svg" data-marp-twemoji=""/> Drift detection + self-healing&quot;]
    end

    style Git fill:#bfb,stroke:#333
    style ArgoCD fill:#f9f,stroke:#333
</code></pre>
<p><strong>Why is GitOps better?</strong> Three key advantages:</p>
<ol>
<li><strong>Audit trail</strong>: every change is a Git commit -- you know who changed what, when, and why</li>
<li><strong>Security</strong>: no one needs <code>kubectl</code> access to production -- only Argo CD (running inside the cluster) applies changes</li>
<li><strong>Self-healing</strong>: if someone manually changes the cluster, Argo CD detects the drift and reverts it to match Git</li>
</ol>
<h3 id="step-17-install-argo-cd-with-helm">Step 17: Install Argo CD with Helm</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Add the Argo Helm repository</span>
helm repo add argo https://argoproj.github.io/argo-helm
helm repo update

<span class="hljs-comment"># Install Argo CD</span>
helm install argocd argo/argo-cd \
  --create-namespace \
  --namespace argocd \
  --<span class="hljs-built_in">set</span> <span class="hljs-string">&#x27;configs.params.server\.insecure=true&#x27;</span> \
  --<span class="hljs-built_in">set</span> server.service.type=ClusterIP \
  --<span class="hljs-built_in">wait</span>
</code></pre>
<p>Wait for all pods to be ready:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get pods -n argocd -w
</code></pre>
<p>Press <code>Ctrl+C</code> when all pods show <code>Running</code> and <code>READY</code> is <code>1/1</code>.</p>
<h3 id="step-18-access-the-argo-cd-ui">Step 18: Access the Argo CD UI</h3>
<p>Expose Argo CD through an Ingress so both the browser and CLI can access it reliably:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl apply -f - &lt;&lt;<span class="hljs-string">&#x27;EOF&#x27;</span>
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    ingress.kubernetes.io/ssl-redirect: <span class="hljs-string">&quot;false&quot;</span>
spec:
  rules:
    - host: argocd.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
EOF
</code></pre>
<blockquote>
<p><strong>Why an Ingress instead of port-forward?</strong> The <code>argocd</code> CLI uses gRPC (HTTP/2), which causes <code>kubectl port-forward</code> to crash. An Ingress avoids this problem entirely and is closer to how you would access Argo CD in production.</p>
</blockquote>
<p>Get the initial admin password:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl get secret argocd-initial-admin-secret -n argocd \
  -o jsonpath=<span class="hljs-string">&quot;{.data.password}&quot;</span> | <span class="hljs-built_in">base64</span> -d; <span class="hljs-built_in">echo</span>
</code></pre>
<p>Open <a href="http://argocd.localhost:8080">http://argocd.localhost:8080</a> in your browser.</p>
<ul>
<li><strong>Username</strong>: <code>admin</code></li>
<li><strong>Password</strong>: the output of the command above</li>
</ul>
<blockquote>
<p><strong>Note</strong>: <code>argocd.localhost</code> resolves to <code>127.0.0.1</code> on most systems. If it does not work, add <code>127.0.0.1 argocd.localhost</code> to your <code>/etc/hosts</code> file.</p>
</blockquote>
<p>You should see the Argo CD dashboard. It is empty for now -- we have not configured any applications yet.</p>
<h3 id="step-19-install-the-argo-cd-cli">Step 19: Install the Argo CD CLI</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Using nix</span>
nix profile install <span class="hljs-string">&#x27;nixpkgs#argocd&#x27;</span>

<span class="hljs-comment"># Or download directly</span>
<span class="hljs-comment"># curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64</span>
<span class="hljs-comment"># chmod +x argocd &amp;&amp; sudo mv argocd /usr/local/bin/</span>
</code></pre>
<p>Log in:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">argocd login argocd.localhost:8080 --plaintext --grpc-web --insecure --username admin \
  --password <span class="hljs-string">&quot;<span class="hljs-subst">$(kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath=&#x27;{.data.password}&#x27; | base64 -d)</span>&quot;</span>
</code></pre>
<blockquote>
<p><strong>Flags explained</strong>: <code>--plaintext</code> disables TLS (we are on localhost), <code>--grpc-web</code> uses HTTP/1.1 for gRPC which works through the Traefik Ingress, <code>--insecure</code> skips the TLS certificate verification prompt caused by Traefik's self-signed certificate.</p>
</blockquote>
</section>
